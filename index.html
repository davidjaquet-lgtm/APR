on européenne — vision APR pour une Europe plus souveraine","c":"Défense","e":"🇪🇺🔧","s":"sensible","a":"➖ Contribution française UE : 26 Md€/an — objectif : meilleur rapport valeur/coût","sig":"moins","sit":"La France est le 2e contributeur net de l'UE après l'Allemagne. La position APR n'est ni le fédéralisme inconditionnel (Macron) ni le souverainisme anti-européen (LFI, RN). C'est une Europe de la subsidiarité forte : chaque pays décide ce qui lui appartient, l'Europe agit là où elle crée de la valeu","sol":"Cette mesure (Réforme de l'Union européenne) répond à une défaillance documentée. La France est le 2e contributeur net de l'UE après l'Allemagne. La position APR n'est ni le fédéralisme inconditionnel (Macron) ni le souverainisme an. L'impact estimé est Contribution française UE : 26 Md€/an — object","l":"⚠️ Position diplomatique — révisions de traités nécessaires pour les réformes structurelles","k":["🛡️ Europe de la défense : porter le projet de commandement militaire européen autonome — priorité absolue avec l'Allemagne, la Pologne et l'Italie","🌾 Clause miroir universelle : tout accord commercial UE doit respecter nos normes sociales, environnementales et sanitaires — refuser le Mercosur sans réciprocité","✂️ Principe de subsidiarité renforcé : toute nouvelle norme européenne doit prouver qu'elle ne peut pas être traitée au niveau national — réduire le droit dérivé de 20%","🗳️ Démocratisation de la Commission : la Commission européenne doit être responsable devant le Parlement et les Parlements nationaux — fin de la technocratie irresponsable","💶 Réforme du Pacte de stabilité : les investissements stratégiques (défense, transition écologique, éducation) exclus du calcul du déficit — doctrine APR"],"con":[{"q":"Cela fragilise la sécurité collective","r":"La France indépendante avec 3% du PIB en défense est plus forte. L'Alliance politique article 5 est maintenue. Seul le commandement intégré change — comme de Gaulle de 1966 à 2009."},{"q":"C'est une position pro-russe","r":"De Gaulle a sorti la France du commandement intégré pendant la Guerre froide, face à l'URSS. La souveraineté militaire n'est pas un alignement géopolitique — c'est l'exercice de l'indépendance nationale."},{"q":"Le budget défense à 3% du PIB est impossible","r":"L'Allemagne est passée de 1,4% à 2,1% en 2 ans. La Pologne est à 4%. La France peut atteindre 3% avec une montée progressive sur 5 ans financée par les recettes nouvelles."}]},{"id":116,"t":"Plan filières industrielles souveraines — 10 secteurs stratégiques à reconquérir","c":"Économie","e":"🏭🎯","s":"urgent","a":"⚖️ +2 à 4 Md€/an — France 2030 à amplifier et cibler","sig":"neutre","sit":"La France dépend de l'étranger pour des secteurs vitaux. Médicaments : 80% des principes actifs produits hors UE (Chine, Inde). Semi-conducteurs : 0 production en France, 100% importés. Batteries : usines en cours (Dunkirk, Douvrin) mais retard sur l'Allemagne et le Royaume-Uni. Terres rares : 100%","sol":"Cette mesure (Plan filières industrielles souveraines) répond à une défaillance documentée. La France dépend de l'étranger pour des secteurs vitaux. Médicaments : 80% des principes actifs produits hors UE (Chine, Inde). Semi-conducteurs : 0 p. L'impact estimé est +2 à 4 Md€/an — France 2030 à amplif","l":"✅ Légal — France 2030 amplifiée + politique industrielle nationale","k":["💊 Souveraineté pharmaceutique : 193 molécules essentielles relocalisées — déjà dans le programme, l'accélérer","🔋 Batteries : soutenir les gigafactories françaises (Dunkirk, Douvrin) jusqu'à 100 GWh de capacité nationale d'ici 2030","💻 Semi-conducteurs : contribuer massivement au Chips Act européen — objectif 1 usine de puces en France d'ici 2028","🌍 Terres rares : explorer le sous-sol français (Massif Central) + partenariats miniers en Afrique et Amérique du Sud — réduire la dépendance à la Chine","🚀 Hydrogène industriel : 10 hubs d'hydrogène vert d'ici 2030 — décarboner la sidérurgie, la chimie et le transport lourd"],"con":[{"q":"Le coût est trop élevé pour les finances publiques","r":"Cette mesure (+2 à 4 Md€/an) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde budgétaire global reste excédentaire dès 2026."},{"q":"Cela va créer de l'inflation","r":"La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le cas ici."},{"q":"Ce n'est pas le rôle de l'État","r":"L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger."}]},{"id":117,"t":"Intelligence artificielle souveraine — la France dans la course mondiale","c":"République","e":"🤖🇫🇷","s":"urgent","a":"⚖️ +500 M€ à 1 Md€/an — marché mondial IA : 15 000 Md€ en 2030","sig":"neutre","sit":"La France a une carte à jouer dans l'IA : Mistral AI (valorisé 6 Md€ en 2024), LeCun (directeur IA de Meta, Français), laboratoires de recherche de rang mondial (Inria, ENS). Mais les moyens sont insuffisants face aux USA (OpenAI, Google, Meta) et à la Chine. L'IA va transformer profondément l'emplo","sol":"Cette mesure (Intelligence artificielle souveraine) répond à une défaillance documentée. La France a une carte à jouer dans l'IA : Mistral AI (valorisé 6 Md€ en 2024), LeCun (directeur IA de Meta, Français), laboratoires de recherche de ra. L'impact estimé est +500 M€ à 1 Md€/an — marché mondial IA","l":"✅ Légal — France 2030 IA + AI Act européen","k":["💰 Tripler le budget IA national : de 500 M€ à 1,5 Md€/an — gap avec l'Allemagne à combler","🤖 Soutien massif à Mistral AI et champions IA français : 500 M€ via BpiFrance pour éviter le rachat américain ou chinois","🎓 Formation IA obligatoire : initiation à l'IA et à ses enjeux dans tous les lycées dès 2026 — préparer les citoyens","🏛️ IA dans les services publics : déployer l'IA pour réduire les délais administratifs de 50% — les assistants IA remplacent la paperasse, pas les agents","🛡️ IA de confiance : positionner la France comme leader mondial de l'IA éthique et explicable — avantage compétitif vs IA américaines et chinoises opaques"],"con":[{"q":"C'est populiste","r":"Rendre les comptes publics transparents, permettre aux citoyens de s'exprimer directement sur les grandes questions — c'est de la démocratie, pas du populisme. Le populisme c'est promettre sans compter. Nous chiffrons tout."},{"q":"Ça va créer de l'instabilité","r":"La Suisse pratique le RIC depuis 1891 et est la démocratie la plus stable et la plus compétitive du monde. L'instabilité ne vient pas de la démocratie directe — elle vient des promesses sans contrepartie."},{"q":"Les citoyens ne sont pas compétents pour voter sur des sujets complexes","r":"Les citoyens suisses votent régulièrement sur des sujets complexes (énergie, fiscalité, immigration) avec des résultats souvent plus sages que les décisions parlementaires. Et les sujets techniques sont exclus du RIC — seules les grandes orientations sont soumises."}]},{"id":118,"t":"Défense — stratégie face aux menaces hybrides et réserve opérationnelle","c":"Défense","e":"🛡️🔐","s":"urgent","a":"➖ +500 M€ à 1 Md€/an — dans le cadre du budget défense 3% du PIB","sig":"moins","sit":"Au-delà du budget (déjà dans le programme), la défense française souffre de lacunes spécifiques. Réserve opérationnelle : objectif 100 000 réservistes — actuellement 40 000. La France est vulnérable aux menaces hybrides : désinformation (RT Sputnik en Afrique), cyberattaques (hôpitaux, infrastructur","sol":"Cette mesure (Défense) répond à une défaillance documentée. Au-delà du budget (déjà dans le programme), la défense française souffre de lacunes spécifiques. Réserve opérationnelle : objectif 100 000 réservistes. L'impact estimé est +500 M€ à 1 Md€/an — dans le cadre du budget défense 3% du PIB. La p","l":"✅ Légal — LPM 2024-2030 + décrets réserve + stratégie nationale","k":["👥 Réserve opérationnelle à 100 000 : objectif atteint en 2027 — formation accélérée, incitations financières, droits des employeurs","🎓 SNU obligatoire à 16 ans : 1 mois de formation civique et militaire de base — créer le lien Nation-Armée rompu depuis 1996","🌐 Agence nationale anti-désinformation : détecter et contrer les campagnes d'influence étrangères — modèle estonien","🔌 Plan résilience des infrastructures critiques : protéger les câbles sous-marins, réseaux électriques, eau, télécommunications contre le sabotage","📚 Guide de résilience civile distribué à tous les foyers : que faire en cas de crise majeure (panne électrique, cyberattaque, conflit) — modèle suédois"],"con":[{"q":"Cela fragilise la sécurité collective","r":"La France indépendante avec 3% du PIB en défense est plus forte. L'Alliance politique article 5 est maintenue. Seul le commandement intégré change — comme de Gaulle de 1966 à 2009."},{"q":"C'est une position pro-russe","r":"De Gaulle a sorti la France du commandement intégré pendant la Guerre froide, face à l'URSS. La souveraineté militaire n'est pas un alignement géopolitique — c'est l'exercice de l'indépendance nationale."},{"q":"Le budget défense à 3% du PIB est impossible","r":"L'Allemagne est passée de 1,4% à 2,1% en 2 ans. La Pologne est à 4%. La France peut atteindre 3% avec une montée progressive sur 5 ans financée par les recettes nouvelles."}]},{"id":119,"t":"Plan national de renouvellement des infrastructures — 100 Md€ de retard à combler","c":"Énergie","e":"🌉🔧","s":"urgent","a":"➕ +3 à 5 Md€/an supplémentaires — financement : recettes péages 2031 + obligations vertes","sig":"plus","sit":"La France a accumulé un retard estimé à 100 Md€ dans l'entretien de ses infrastructures. Ponts : 25 000 ponts nécessitent des réparations urgentes selon le rapport Vilboux 2019 — peu a été fait depuis. Routes nationales : 30% du réseau en mauvais état. Réseaux d'eau : 20% de pertes en fuites (déjà d","sol":"Cette mesure (Plan national de renouvellement des infrastructures) répond à une défaillance documentée. La France a accumulé un retard estimé à 100 Md€ dans l'entretien de ses infrastructures. Ponts : 25 000 ponts nécessitent des réparations urgentes sel. L'impact estimé est +3 à 5 Md€/an supplément","l":"✅ Légal — loi de programmation des infrastructures + obligations vertes d'État","k":["🌉 Plan d'urgence ponts : audit et réparation des 25 000 ponts dégradés en 5 ans — sécurité publique non négociable","📋 Loi de programmation des infrastructures 2026-2035 : 30 Md€ fléchés, visibilité sur 10 ans — comme la LPM pour la défense","💶 Obligations vertes dédiées infrastructures : émission de 5 Md€/an d'OAT vertes fléchées vers l'entretien — financement hors déficit","🏫 Rénovation des bâtiments scolaires : 40% construits avant 1970 — plan national de rénovation thermique + mise aux normes","🔧 'Règle d'or des infrastructures' : chaque infrastructure publique doit être entretenue avec 1% de sa valeur/an — obligation budgétaire"],"con":[{"q":"C'est trop coûteux et trop long","r":"Le nucléaire est l'investissement le plus rentable sur 60 ans de durée de vie. Chaque EPR2 produit de l'électricité pendant 60 ans à 70€/MWh — sans carbone, sans dépendance aux cours du gaz."},{"q":"L'éolien et le solaire sont moins chers","r":"Moins chers à construire, mais intermittents. Sans le nucléaire pour produire quand il ne fait pas vent ou soleil, il faut des centrales à gaz en backup — qui coûtent cher et émettent du CO2. Le nucléaire est la seule énergie pilotable et décarbonée."},{"q":"Les déchets nucléaires sont insolubles","r":"Cigéo (enfouissement géologique profond) est en cours d'autorisation. La France maîtrise le retraitement des combustibles usés — 96% sont recyclés par Orano. Et les RNR de 4e génération 'brûleront' les déchets existants."}]},{"id":121,"t":"Revalorisation salariale des infirmières — à la hauteur de leurs nouvelles responsabilités","c":"Santé","e":"👩‍⚕️💶","s":"urgent","a":"➖ +2 à 4 Md€/an — compensé par la réduction des coûts urgences et des arrêts maladie soignants","sig":"moins","sit":"Le paradoxe français : on veut confier aux infirmières les responsabilités d'un médecin finlandais mais on les paie comme des aides-soignantes. Salaires actuels : infirmière débutante à l'hôpital public = 1 900€ net/mois après le Ségur. Infirmière libérale = 2 200€ net en moyenne mais avec des charg","sol":"Cette mesure (Revalorisation salariale des infirmières) répond à une défaillance documentée. Le paradoxe français : on veut confier aux infirmières les responsabilités d'un médecin finlandais mais on les paie comme des aides-soignantes. Salair. L'impact estimé est +2 à 4 Md€/an — compensé par la réd","l":"✅ Légal — PLFSS + grille indiciaire de la fonction publique hospitalière","k":["💰 Infirmière débutante : 1 900€ → 2 500€ net/mois — alignement sur la médiane européenne","💰 Infirmière expérimentée (10 ans) : 2 200€ → 3 000€ net/mois — fidélisation et réduction du turnover","💰 Infirmière en pratique avancée (IPA) : 2 600€ → 3 500€ net/mois — rémunérer les responsabilités finlandaises","💰 Infirmière coordinatrice de soins primaires (nouveau statut APR) : 3 800€ net/mois — équivalent du rôle finlandais de chef de centre de santé infirmier","🏥 Nouveau statut : Infirmière de soins primaires (ISP) — entre l'infirmière diplômée et l'IPA, avec formation complémentaire de 1 an et compétences élargies sur les 50 pathologies"],"con":[{"q":"Le coût pour la Sécurité sociale est insoutenable","r":"Le coût de l'inaction est supérieur : un passage aux urgences non justifié coûte 250€, une consultation préventive 30€. Le programme de prévention est un investissement à ROI de 3 à 7 pour 1."},{"q":"Les professionnels de santé s'y opposeront","r":"Les jeunes médecins et infirmières plébiscitent les nouvelles formes d'exercice. Les syndicats des anciens s'opposent à chaque réforme depuis 50 ans. On négocie ET on avance."},{"q":"La qualité des soins va baisser","r":"La qualité est déjà dégradée par les déserts médicaux et la surcharge hospitalière. Un système avec 18 mois d'attente et des urgences saturées n'est pas un système de qualité."}]},{"id":122,"t":"Bouclier carburant et remise rurale — protéger les captifs de la voiture","c":"Pouvoir d'achat","e":"⛽🛡️","s":"urgent","a":"➖ 800 M€ à 1,2 Md€/an — financé par la taxe surprofits raffineurs — coût net État quasi nul","sig":"moins","sit":"Le litre de SP95-E10 est passé de 1,69€ en 2025 à 1,98€ en avril 2026 (+17%) suite au blocage du détroit d'Ormuz et à la guerre en Iran. Le baril de Brent a quasi doublé à 120$ depuis fin février 2026. Les taxes représentent 55 à 60% du prix final : TICPE à 0,69€/L + TVA à 20% appliquée même sur la","sol":"Cette mesure (Bouclier carburant et remise rurale) répond à une défaillance documentée. Le litre de SP95-E10 est passé de 1,69€ en 2025 à 1,98€ en avril 2026 (+17%) suite au blocage du détroit d'Ormuz et à la guerre en Iran. Le baril de B. L'impact estimé est 800 M€ à 1,2 Md€/an — financé par la tax","l":"✅ Légal — loi de finances + mécanisme remise 2022 à pérenniser","k":["⛽ OPTION A — Remise rurale permanente de 10c/L : pour les 8 millions de ménages habitant à plus de 15 km d'une gare ou d'un arrêt de bus desservi 3 fois/jour — les 'captifs' de la ","🗺️ Critère géographique objectif : basé sur l'adresse fiscale et la carte des transports en commun de l'ARAFER — pas de démarche administrative, attribution automatique","💳 Mécanisme : carte carburant dédiée rechargée mensuellement OU remboursement annuel automatique sur déclaration de revenus — sans paperasse supplémentaire","💰 Financement Option A : taxe pérenne de 0,5c/L sur les marges de raffinage au-delà de 60$/tonne — prélevée sur les raffineurs, pas sur les consommateurs ni sur l'État","🛡️ OPTION B — Bouclier carburant activé si baril > 100$ : plafonnement du prix à la pompe à 1,80€/L — le niveau de 2024 avant la crise géopolitique"],"con":[{"q":"Ces mesures ne profiteront qu'aux riches","r":"La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order pro mazon, Apple, Fiat — optimisation fiscale mas. L'impact estimé est Coût faible — gain : chaque lanceur d'alerte peut rapporte","l":"✅ Légal — renforcement loi Waserman 2022 + création récompense financière","k":["💰 Récompense financière : 10 à 20% des sommes récupérées grâce au signalement — modèle IRS américain","⚖️ Protection anti-SLAPP renforcée : procédure accélérée pour écarter les poursuites judiciaires abusives contre les lanceurs d'alerte","🏛️ Autorité indépendante de protection : création d'un Défenseur des lanceurs d'alerte — budget propre, indépendant de l'exécutif","🔒 Anonymat garanti : signalement anonyme avec protection juridique même en cas de révélation ultérieure de l'identité","📢 Extension aux fraudes environnementales et sanitaires : les lanceurs d'alerte qui révèlent des pollutions ou des risques pour la santé bénéficient du même régime"],"con":[{"q":"Le coût est trop élevé pour les finances publiques","r":"Cette mesure (Coût faible) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde budgétaire global reste excédentaire dès 2026."},{"q":"Cela va créer de l'inflation","r":"La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le cas ici."},{"q":"Ce n'est pas le rôle de l'État","r":"L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger."}]},{"id":127,"t":"Plan contre la désertification des centres-villes","c":"Économie","e":"🏪🌆","s":"ambitieux","a":"➕ +200 à 400 M€/an — économies : éviter la mort économique de 5 000 communes","sig":"plus","sit":"60% des communes de moins de 10 000 habitants ont perdu leur dernier commerce de proximité depuis 2000. Les taux de vacance commerciale dans les centres-villes atteignent 15 à 20% dans les villes moyennes (Roanne, Châteauroux, Alençon). Amazon et la grande distribution en périphérie ont capté la con","sol":"Cette mesure (Plan contre la désertification des centres-villes) répond à une défaillance documentée. 60% des communes de moins de 10 000 habitants ont perdu leur dernier commerce de proximité depuis 2000. Les taux de vacance commerciale dans les centr. L'impact estimé est +200 à 400 M€/an — économi","l":"✅ Légal — loi ordinaire + fiscalité locale","k":["📦 Taxe entrepôts logistiques : extension de la TASCOM aux surfaces d'entrepôts > 1 000 m² — Amazon, Cdiscount, Zalando contribuent enfin","🏪 Prime à l'installation commerce essentiel : 15 000€ pour tout artisan qui s'installe dans une commune sans boulangerie, pharmacie ou épicerie depuis plus de 2 ans","🚫 Moratoire sur les grandes surfaces en périphérie : interdiction de nouvelles autorisations dans les communes dont le taux de vacance commerciale dépasse 15%","💻 TVA équitable sur le e-commerce : appliquer les mêmes taux de TVA réels aux plateformes étrangères qu'aux commerçants français — fin de la distorsion via les micro-franchises","🏙️ Fonds ORT abondé : doubler le budget des Opérations de Revitalisation du Territoire pour les villes moyennes"],"con":[{"q":"Le coût est trop élevé pour les finances publiques","r":"Cette mesure (+200 à 400 M€/an) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde budgétaire global reste excédentaire dès 2026."},{"q":"Cela va créer de l'inflation","r":"La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le cas ici."},{"q":"Ce n'est pas le rôle de l'État","r":"L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger."}]},{"id":128,"t":"Réforme de l'assurance habitation — sinistres climatiques remboursés dignement","c":"Pouvoir d'achat","e":"🏠⛈️","s":"ambitieux","a":"➕ Coût assuré : recalibrage des primes — gain ménages : certitude du remboursement","sig":"plus","sit":"Les catastrophes naturelles se multiplient : tempêtes, inondations, sécheresses, feux de forêt. En 2024, les sinistres climatiques ont coûté 6,5 Md€ aux assureurs en France. Pourtant les délais de remboursement s'allongent (6 à 18 mois dans les cas complexes), les franchises augmentent, et les refus","sol":"Cette mesure (Réforme de l'assurance habitation) répond à une défaillance documentée. Les catastrophes naturelles se multiplient : tempêtes, inondations, sécheresses, feux de forêt. En 2024, les sinistres climatiques ont coûté 6,5 Md€ a. L'impact estimé est Coût assuré : recalibrage des primes — gai","l":"✅ Légal — réforme loi Cat Nat + délais imposés par loi ordinaire","k":["⏰ Délai légal de remboursement : 30 jours pour les sinistres < 50 000€, 90 jours pour les sinistres complexes — amende assureur si dépassé","🚫 Interdiction des refus de couverture dans les zones à risque identifiées par l'État — l'assurance est obligatoire, elle doit être accessible","🔍 Expertise contradictoire obligatoire : le sinistré peut faire appel à son propre expert aux frais de l'assurance si le montant proposé est contesté","📋 Arrêté Cat Nat automatique : déclenchement dans les 5 jours suivant l'événement — fin des délais administratifs qui laissent les sinistrés sans recours","💰 Fonds de solidarité climatique : prélèvement de 0,5% sur les primes d'assurance habitation pour un fonds national d'indemnisation complémentaire"],"con":[{"q":"Ces mesures ne profiteront qu'aux riches","r":"La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coûtant concerne les produits de base. Ce sont des mesures universelles à effet proportionnellement plus fort pour les ménages modeste"},{"q":"Cela va alimenter l'inflation","r":"Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop peu de biens — ici on augmente le pouvoir d'achat réel sans création monétaire."},{"q":"L'État ne peut pas intervenir sur les prix","r":"L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autres secteurs en défaillance de marché est légal et légitime."}]},{"id":129,"t":"Réforme de la succession — protéger les familles modestes qui héritent","c":"Outre-mer","e":"🏠👨‍👩‍","s":"ambitieux","a":"➖ Manque à gagner : 2 à 3 Md€/an — compensé par le renforcement de la taxation des très grandes successions","sig":"moins","sit":"Le paradoxe français des successions : une famille modeste qui hérite d'un appartement à 200 000€ paie des droits de succession. Une famille très aisée qui a organisé des donations anticipées et des montages patrimoniaux (assurance-vie, SCI, démembrement) paie très peu. L'abattement en ligne directe","sol":"Cette mesure (Réforme de la succession) répond à une défaillance documentée. Le paradoxe français des successions : une famille modeste qui hérite d'un appartement à 200 000€ paie des droits de succession. Une famille très aisé. L'impact estimé est Manque à gagner : 2 à 3 Md€/an — compensé par le re","l":"✅ Légal — loi de finances ordinaire","k":["💰 Abattement relevé à 200 000€ par enfant en ligne directe (vs 100 000€ actuellement) — indexé sur l'inflation désormais","🏠 Abattement résidence principale renforcé : exonération totale pour la transmission de la résidence principale aux enfants si valeur < 300 000€","📊 Compensation : fermer les niches patrimoniales — assurance-vie au-delà de 500 000€, SCI familiales, démembrement abusif","💎 Rehausser la tranche maximale à 50% au-delà de 5 M€ (vs 45% actuellement) — les très grandes fortunes contribuent davantage","📋 Délai de paiement facilité : 5 ans pour payer les droits quand le patrimoine est principalement immobilier — éviter les ventes forcées"],"con":[{"q":"C'est trop coûteux pour la métropole","r":"Les Outre-mer donnent à la France la 2e zone économique exclusive mondiale. Sans eux, la France n'est pas une puissance mondiale. L'investissement est stratégique."},{"q":"Les problèmes de l'Outre-mer sont structurels et insolubles","r":"La Guadeloupe sans eau courante n'est pas une fatalité — c'est un déficit d'investissement. L'eau potable universelle en Guadeloupe coûte 800 M€ d'investissement — moins que 2 EPR2."},{"q":"Les collectivités locales doivent gérer elles-mêmes","r":"Les collectivités ultramarines n'ont pas les moyens fiscaux pour des investissements de cette ampleur. Un financement national pour les infrastructures de base est normal — comme en métropole."}]},{"id":130,"t":"Plan contre la précarité étudiante — étudier sans avoir faim","c":"Éducation","e":"🎓🍽️","s":"urgent","a":"➖ +500 M€ à 1 Md€/an — investissement dans le capital humain de demain","sig":"moins","sit":"1 étudiant sur 5 saute des repas régulièrement selon l'enquête OVE 2024. 37% des étudiants vivent sous le seuil de pauvreté. Le repas CROUS à 3,30€ existe mais les restaurants universitaires sont insuffisants (1 place pour 7 étudiants). 200 000 logements étudiants manquent. Les jobs étudiants (40% d","sol":"Cette mesure (Plan contre la précarité étudiante) répond à une défaillance documentée. 1 étudiant sur 5 saute des repas régulièrement selon l'enquête OVE 2024. 37% des étudiants vivent sous le seuil de pauvreté. Le repas CROUS à 3,30€ ex. L'impact estimé est +500 M€ à 1 Md€/an — investissement dans","l":"✅ Légal — budget CROUS + PLF","k":["🍽️ Repas CROUS à 1€ pour tous les étudiants — universalisation du dispositif actuel réservé aux boursiers","🏠 Plan 100 000 logements étudiants en 5 ans : partenariat public-privé, résidences sur les campus universitaires","💰 Bourse sur critères sociaux revalorisée : montant maximum à 800€/mois (vs 600€ actuellement)","🎓 APL étudiants revalorisée : indexation sur l'inflation des loyers — l'APL n'a pas suivi la hausse des loyers","💼 Encadrement des jobs étudiants : plafond de 15h/semaine pendant les périodes d'examen — l'université passe avant le job"],"con":[{"q":"Les enseignants s'y opposeront","r":"Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'évaluation des résultats. C'est une position minoritaire."},{"q":"Les résultats ne seront visibles qu'en 10 ans","r":"Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commencer maintenant."},{"q":"Ce n'est pas une question de moyens mais de méthodes","r":"C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. On change les deux."}]},{"id":131,"t":"Droit à la déconnexion numérique renforcé — le repos est un droit","c":"Emploi","e":"📴⚖️","s":"ambitieux","a":"➕ Coût nul — gain : réduction burn-out estimée à 2 à 3 Md€/an pour la Sécurité sociale","sig":"plus","sit":"Le droit à la déconnexion existe depuis la loi El Khomri de 2016 — sans sanction réelle. Résultat : 67% des cadres consultent leurs emails professionnels après 20h selon une étude Ipsos 2024. 42% le week-end. Le burn-out touche 2,5 millions de personnes par an. Les outils numériques professionnels (","sol":"Cette mesure (Droit à la déconnexion numérique renforcé) répond à une défaillance documentée. Le droit à la déconnexion existe depuis la loi El Khomri de 2016 — sans sanction réelle. Résultat : 67% des cadres consultent leurs emails professionn. L'impact estimé est Coût nul — gain : réduction burn-o","l":"✅ Légal — renforcement loi El Khomri + sanctions dans le code du travail","k":["📵 Coupure serveur automatique obligatoire après 22h dans les entreprises > 200 salariés — emails envoyés après 22h livrés le lendemain matin","💰 Amende 1% de la masse salariale pour les entreprises qui ne disposent pas d'accord de déconnexion contraignant","📱 Droit au téléphone professionnel séparé : toute entreprise > 50 salariés qui exige la joignabilité hors temps de travail fournit un téléphone dédié","🏖️ Déconnexion totale pendant les congés : interdiction légale d'exiger la joignabilité pendant les congés payés — sauf cadres dirigeants contractuellement","📊 Indicateur de déconnexion dans le bilan social annuel : taux de réponse aux emails hors temps de travail publié par les entreprises > 300 salariés"],"con":[{"q":"Cela va augmenter le coût du travail","r":"La mesure est conçue pour être neutre sur le coût total du travail — redistribution entre types de coûts, pas augmentation nette. L'effet sur l'emploi est positif selon les modélisations."},{"q":"Les syndicats refuseront","r":"Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On négocie en bonne foi et on avance."},{"q":"Ça ne marche pas en France","r":"L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fonctionne dans le contexte français."}]},{"id":132,"t":"Stocks stratégiques nationaux — 3 mois d'autonomie en cas de crise majeure","c":"Défense","e":"🏭📦🛡️","s":"urgent","a":"⚖️ +2 à 3 Md€/an de constitution — puis 500 M€/an de rotation et maintenance","sig":"neutre","sit":"La France ne dispose pas de stocks suffisants pour tenir en cas de rupture d'approvisionnement majeure. Scénario concret : guerre Taiwan-Chine en 2026 → rupture des semi-conducteurs en 3 semaines, rupture des principes actifs médicamenteux en 6 semaines, rupture des composants électroniques critique","sol":"Cette mesure (Stocks stratégiques nationaux) répond à une défaillance documentée. La France ne dispose pas de stocks suffisants pour tenir en cas de rupture d'approvisionnement majeure. Scénario concret : guerre Taiwan-Chine en 2026. L'impact estimé est +2 à 3 Md€/an de constitution — puis 500 M€/an","l":"✅ Légal — décision gouvernementale + plan de programmation des stocks stratégiques","k":["💊 Médicaments essentiels : stocks 6 mois pour les 193 molécules critiques (déjà dans prop 59) + extension à 500 médicaments supplémentaires","⛽ Carburants : porter les stocks de 90 jours à 6 mois — doubler la capacité de stockage nationale","🌾 Alimentation de base : stocks nationaux de 90 jours pour blé, sucre, huile, protéines végétales, sel — dans des silos publics régionaux","💻 Composants électroniques critiques : stocks 6 mois pour les puces et composants utilisés dans les infrastructures vitales (hôpitaux, défense, transport, énergie)","🔋 Matériaux critiques industriels : stocks 3 mois de terres rares, cobalt, lithium pour les industries de défense et de santé"],"con":[{"q":"Cela fragilise la sécurité collective","r":"La France indépendante avec 3% du PIB en défense est plus forte. L'Alliance politique article 5 est maintenue. Seul le commandement intégré change — comme de Gaulle de 1966 à 2009."},{"q":"C'est une position pro-russe","r":"De Gaulle a sorti la France du commandement intégré pendant la Guerre froide, face à l'URSS. La souveraineté militaire n'est pas un alignement géopolitique — c'est l'exercice de l'indépendance nationale."},{"q":"Le budget défense à 3% du PIB est impossible","r":"L'Allemagne est passée de 1,4% à 2,1% en 2 ans. La Pologne est à 4%. La France peut atteindre 3% avec une montée progressive sur 5 ans financée par les recettes nouvelles."}]},{"id":133,"t":"Plan terres rares et matériaux critiques — sortir de la dépendance chinoise","c":"Économie","e":"⛏️🌍","s":"urgent","a":"➖ +500 M€ à 1 Md€/an — investissement dans la souveraineté industrielle","sig":"moins","sit":"La Chine contrôle 85% de la production mondiale de terres rares (néodyme, cobalt, dysprosium, gallium, germanium, graphite). Ces matériaux sont indispensables pour : les batteries des véhicules électriques, les moteurs des éoliennes, les systèmes d'armes (missiles guidés, avions de chasse, drones),","sol":"Cette mesure (Plan terres rares et matériaux critiques) répond à une défaillance documentée. La Chine contrôle 85% de la production mondiale de terres rares (néodyme, cobalt, dysprosium, gallium, germanium, graphite). Ces matériaux sont indisp. L'impact estimé est +500 M€ à 1 Md€/an — investissement","l":"✅ Légal — code minier + partenariats bilatéraux + politique d'exploration","k":["⛏️ Réouverture de la mine de Salau (tungstène, Ariège) : 7 000 tonnes de réserves — financement public-privé, 300 emplois directs","🔋 Accélérer le projet Emili (lithium breton, Imerys) : première production visée en 2027 — potentiellement le plus grand gisement de lithium d'Europe occidentale","🌊 Cobalt de Nouvelle-Calédonie : développer l'extraction et la transformation locale — sortir de l'exportation du minerai brut vers la Chine","♻️ Plan recyclage terres rares : obligation de filière de recyclage des terres rares pour tous les équipements électroniques — objectif 20% de recyclage en 2030 (vs 1% actuellement","🤝 Partenariats miniers souverains : accords avec 5 pays (Maroc, Mozambique, Namibie, Chili, Canada) avec clauses de livraison prioritaire à la France en cas de tension — diplomati"],"con":[{"q":"Le coût est trop élevé pour les finances publiques","r":"Cette mesure (+500 M€ à 1 Md€/an) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde budgétaire global reste excédentaire dès 2026."},{"q":"Cela va créer de l'inflation","r":"La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le cas ici."},{"q":"Ce n'est pas le rôle de l'État","r":"L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger."}]},{"id":134,"t":"Observatoire national des dépendances stratégiques — cartographier pour agir","c":"Défense","e":"🔭📊🛡️","s":"ambitieux","a":"⚖️ 20 à 30 M€/an — structure légère mais impact massif sur la décision publique","sig":"neutre","sit":"Aucun gouvernement français ne dispose aujourd'hui d'une cartographie exhaustive, actualisée et publique des dépendances stratégiques nationales. Résultat : on découvre que le Doliprane est sous contrôle américain quand la vente est annoncée. On découvre que nos données de santé sont hébergées sur d","sol":"Cette mesure (Observatoire national des dépendances stratégiques) répond à une défaillance documentée. Aucun gouvernement français ne dispose aujourd'hui d'une cartographie exhaustive, actualisée et publique des dépendances stratégiques nationales. Résu. L'impact estimé est 20 à 30 M€/an — structure","l":"✅ Légal — création par décret d'une autorité administrative indépendante","k":["📋 Rapport annuel public des dépendances stratégiques : classement par criticité (rouge/orange/vert) de 200 biens et technologies stratégiques — rendu au Parlement et publié","🚨 Seuils d'alerte automatiques : si la dépendance envers un pays unique dépasse 60% pour un bien critique, déclenchement automatique d'un plan de réduction","🔍 Audit des filières : chaque filière industrielle stratégique auditée tous les 3 ans — identification des maillons faibles dans les chaînes d'approvisionnement","💼 Screening des investissements étrangers renforcé : l'ODS conseille le gouvernement sur chaque OPA étrangère dans un secteur stratégique — complémentaire du régime IEF (prop 99)","🌐 Coopération européenne : partager la cartographie des dépendances avec les partenaires UE — coordination des plans de réduction pour les dépendances communes"],"con":[{"q":"Cela fragilise la sécurité collective","r":"La France indépendante avec 3% du PIB en défense est plus forte. L'Alliance politique article 5 est maintenue. Seul le commandement intégré change — comme de Gaulle de 1966 à 2009."},{"q":"C'est une position pro-russe","r":"De Gaulle a sorti la France du commandement intégré pendant la Guerre froide, face à l'URSS. La souveraineté militaire n'est pas un alignement géopolitique — c'est l'exercice de l'indépendance nationale."},{"q":"Le budget défense à 3% du PIB est impossible","r":"L'Allemagne est passée de 1,4% à 2,1% en 2 ans. La Pologne est à 4%. La France peut atteindre 3% avec une montée progressive sur 5 ans financée par les recettes nouvelles."}]},{"id":135,"t":"Protection des salaires contre l'inflation — sans spirale prix-salaires","c":"Emploi","e":"💶📈","s":"ambitieux","a":"➖ +2 à 4 Md€/an pour le point d'indice FP — coût privé nul pour l'État","sig":"moins","sit":"Le problème est documenté : en fin 2025, le niveau de vie réel des salariés avait à peine rattrapé celui de 2021 selon l'OFCE. Les salaires n'ont pas compensé l'inflation 2022-2024 — une première depuis l'après-guerre. La France s'est smicardisée : 17,3% des travailleurs au SMIC en 2025 contre 12% e","sol":"Cette mesure (Protection des salaires contre l'inflation) répond à une défaillance documentée. Le problème est documenté : en fin 2025, le niveau de vie réel des salariés avait à peine rattrapé celui de 2021 selon l'OFCE. Les salaires n'ont pas . L'impact estimé est +2 à 4 Md€/an pour le point d'ind","l":"✅ Légal — décret pour le point d'indice + loi ordinaire pour les NAO + loi déjà existante pour la participation","k":["🏛️ MÉCANISME 1 — Point d'indice fonction publique indexé sur l'inflation : 5,7 millions de fonctionnaires protégés automatiquement. L'État doit être exemplaire — il ne peut pas de","🤝 MÉCANISME 2 — NAO avec plancher inflation dans les entreprises bénéficiaires : toute entreprise rentable (bénéfice net > 5% du CA) doit obligatoirement proposer en NAO une reval","💰 MÉCANISME 3 — Participation universelle aux bénéfices (prop 27) : déjà dans le programme — extension aux entreprises de +10 salariés. Quand l'entreprise gagne, le salarié gagne.","📊 Rapport annuel public des évolutions salariales : l'INSEE publie chaque année par secteur et taille d'entreprise l'évolution des salaires vs inflation — transparence et pression","🚫 Ce que l'APR refuse — l'indexation automatique totale : risque documenté de spirale prix-salaires. Etude Belgique (De Economist 2023) : -0,6% d'emploi pour chaque +1% de coûts s"],"con":[{"q":"Cela va augmenter le coût du travail","r":"La mesure est conçue pour être neutre sur le coût total du travail — redistribution entre types de coûts, pas augmentation nette. L'effet sur l'emploi est positif selon les modélisations."},{"q":"Les syndicats refuseront","r":"Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On négocie en bonne foi et on avance."},{"q":"Ça ne marche pas en France","r":"L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fonctionne dans le contexte français."}]},{"id":136,"t":"Soldats, pompiers, policiers morts en service — leurs enfants pupilles de la Nation avec droits renforcés","c":"République","e":"🎖️👶","s":"urgent","a":"➖ +30 à 50 M€/an — signal républicain fort pour un coût très modeste","sig":"moins","sit":"Chaque année en France : 10 à 15 militaires morts en opération, 10 à 15 pompiers (professionnels et volontaires), 5 à 10 policiers et gendarmes — soit 30 à 40 familles touchées par an, avec des enfants qui perdent un parent qui servait la France. Le cadre juridique existe depuis 2012 (mention Mort p","sol":"Cette mesure (Soldats, pompiers, policiers morts en service) répond à une défaillance documentée. Chaque année en France : 10 à 15 militaires morts en opération, 10 à 15 pompiers (professionnels et volontaires), 5 à 10 policiers et gendarmes — soit. L'impact estimé est +30 à 50 M€/an — signal républ","l":"✅ Légal — loi ordinaire modifiant le CPMIVG + décret sur les délais","k":["⚡ Reconnaissance immédiate : délai plafonné à 30 jours pour l'attribution du statut pupille de la Nation dès le décès en service constaté — fin du vide juridique de 6 à 18 mois","🏫 Gratuité totale des études jusqu'à bac+5 : frais de scolarité, logement étudiant CROUS, livres, transports — pris en charge à 100% par l'État pour tous les enfants de morts en s","🧠 Accompagnement psychologique garanti : cellule de soutien psychologique déclenchée automatiquement dans les 48h suivant le décès — pour l'enfant ET le conjoint survivant","🔗 Égalité pompiers volontaires/professionnels : même procédure, mêmes droits, même automaticité — les 197 000 pompiers volontaires risquent leur vie comme les professionnels","🏥 Maladies professionnelles létales reconnues automatiquement : cancer lié aux fumées toxiques chez les pompiers, maladie contractée en OPEX pour les militaires — présomption d'im"],"con":[{"q":"C'est populiste","r":"Rendre les comptes publics transparents, permettre aux citoyens de s'exprimer directement sur les grandes questions — c'est de la démocratie, pas du populisme. Le populisme c'est promettre sans compter. Nous chiffrons tout."},{"q":"Ça va créer de l'instabilité","r":"La Suisse pratique le RIC depuis 1891 et est la démocratie la plus stable et la plus compétitive du monde. L'instabilité ne vient pas de la démocratie directe — elle vient des promesses sans contrepartie."},{"q":"Les citoyens ne sont pas compétents pour voter sur des sujets complexes","r":"Les citoyens suisses votent régulièrement sur des sujets complexes (énergie, fiscalité, immigration) avec des résultats souvent plus sages que les décisions parlementaires. Et les sujets techniques sont exclus du RIC — seules les grandes orientations sont soumises."}]},{"id":137,"t":"Militaires morts en service — protection complète des familles et droits renforcés","c":"Défense","e":"🎖️🇫🇷","s":"urgent","a":"⚖️ +50 à 80 M€/an — la dette de la Nation envers ceux qui meurent pour elle","sig":"neutre","sit":"Les lacunes du système actuel sont précises et documentées. Pension de réversion : 50% de la pension du militaire décédé — soit 852€ bruts/mois en moyenne en 2021 pour le conjoint survivant. Insuffisant pour une famille avec enfants. Conditions restrictives : mariage de 4 ans minimum requis (sauf en","sol":"Cette mesure (Militaires morts en service) répond à une défaillance documentée. Les lacunes du système actuel sont précises et documentées. Pension de réversion : 50% de la pension du militaire décédé — soit 852€ bruts/mois en moy. L'impact estimé est +50 à 80 M€/an — la dette de la Nation envers ce","l":"✅ Légal — loi ordinaire modifiant le CPMIVG + décret + LPM","k":["⚡ Reconnaissance immédiate : versement d'une avance provisionnelle de 100% de la future pension de réversion dès le lendemain du décès — sans attendre la procédure administrative d","💰 Pension de réversion portée à 66% (vs 50%) pour les militaires morts en OPEX ou en service — le sacrifice ultime mérite une reconnaissance financière supérieure","💍 Extension aux partenaires de PACS et aux concubins notoires : un militaire en couple non marié depuis 3 ans laisse un partenaire sans pension — injustice corrigée par une loi or","🎓 Gratuité totale des études jusqu'à bac+5 pour les enfants orphelins de militaires — frais de scolarité, logement CROUS, livres, transports intégralement pris en charge","📚 Pension d'orphelin prolongée jusqu'à 25 ans pour les enfants en études (vs 21 ans actuellement) — et revalorisée de 10% à 20% de la pension du défunt"],"con":[{"q":"Cela fragilise la sécurité collective","r":"La France indépendante avec 3% du PIB en défense est plus forte. L'Alliance politique article 5 est maintenue. Seul le commandement intégré change — comme de Gaulle de 1966 à 2009."},{"q":"C'est une position pro-russe","r":"De Gaulle a sorti la France du commandement intégré pendant la Guerre froide, face à l'URSS. La souveraineté militaire n'est pas un alignement géopolitique — c'est l'exercice de l'indépendance nationale."},{"q":"Le budget défense à 3% du PIB est impossible","r":"L'Allemagne est passée de 1,4% à 2,1% en 2 ans. La Pologne est à 4%. La France peut atteindre 3% avec une montée progressive sur 5 ans financée par les recettes nouvelles."}]},{"id":161,"t":"Politique étrangère — la France puissance d'équilibre dans un monde multipolaire","c":"Défense","e":"🌍🇫🇷","s":"ambitieux","a":"➖ Réorientation de l'aide au développement — budget diplomatie +500 M€/an","sig":"moins","sit":"La France est seule puissance nucléaire de l'UE avec un siège permanent au Conseil de sécurité de l'ONU. C'est un atout unique. Mais depuis 30 ans, elle dilue cet avantage en suivant les positions américaines plutôt qu'en affirmant une ligne propre. Résultat : expulsée du Mali, du Niger, du Burkina Faso. Marginalisée en Méditerranée. Inaudible en Asie. La France ne peut pas agir seule — mais elle peut être l'architecte de coalitions : EU, Francophonie (88 pays, 321 millions de locuteurs), G20, ONU.","sol":"Doctrine APR : la France puissance d'équilibre — ni vassale de Washington, ni complice de Pékin ou Moscou. Trois piliers : (1) Réforme de l'ONU — porter la France à la tête de la réforme du Conseil de sécurité (élargir à l'Inde, Brésil, Afrique). (2) Axe européen — construire la défense et la diplomatie européenne commune avec l'Allemagne. (3) Francophonie économique — transformer les 88 pays francophones en zone de partenariat économique prioritaire. Fin de la Françafrique militaire, début du partenariat économique direct aux populations.","l":"✅ Légal — politique étrangère = prérogative exclusive du Président","k":["Porter la réforme du Conseil de sécurité de l'ONU — élargissement à l'Inde, Brésil et un siège africain — la France pèse plus dans un Conseil réformé et légitime","Construire l'axe Paris-Berlin-Varsovie comme colonne vertébrale de la défense européenne — substituer progressivement à l'OTAN intégré","Transformer la Francophonie en zone de partenariat économique : préférences commerciales, investissements directs, transferts de compétences — 88 pays, 321 millions de locuteurs","Fin de la Françafrique militaire : fermer les bases au Sahel d'ici 2027, remplacer par des partenariats économiques directs aux populations (modèle chinois sans la dette piège)","Diplomatie climatique : faire de la France le leader mondial de la taxe carbone aux frontières et du financement des pays vulnérables — levier d'influence considérable"],"con":[{"q":"Seule contre tous — la France ne peut pas s'imposer","r":"Personne ne dit 'seule'. La France construit des coalitions — avec l'Allemagne, avec les pays francophones, avec les puissances émergentes (Inde, Brésil) qui cherchent exactement un pôle d'équilibre non américain et non chinois. Le siège au Conseil de sécurité et la dissuasion nu"},{"q":"Fermer les bases en Afrique c'est abandonner le terrain à la Russie et la Chine","r":"Les bases françaises n'ont pas empêché Wagner de s'installer. La présence militaire française est devenue le meilleur argument de recrutement des Russes. La Chine a l'influence économique la plus forte en Afrique sans une seule base militaire. C'est le modèle qui marche — pas les"},{"q":"Réformer l'ONU c'est utopique","r":"Pas si la France porte la réforme elle-même en offrant de partager son siège avec l'UE en échange d'un Conseil élargi et plus légitime. C'est le seul pays qui peut faire ce sacrifice symbolique — et en tirer un bénéfice diplomatique majeur."}]},{"id":162,"t":"Financement du budget défense — TTF renforcée et dette souveraine de défense","c":"Défense","e":"🛡️💶","s":"urgent","a":"⚖️ +12 Md€/an pour atteindre 3% du PIB — financé sans creuser le déficit structurel","sig":"neutre","sit":"Le budget défense français est à 2,1% du PIB en 2026 — l'objectif APR est 3% du PIB soit +12 Md€/an. C'est le principal poste de dépenses nouvelles du programme sans financement dédié identifié. Pourtant les outils existent : (1) La TTF rapporte actuellement 2,5 Md€/an à 0,4% — elle exclut les transactions intra-journalières (trading haute fréquence) qui représentent 60% des volumes. (2) L'Allemagne a émis une dette souveraine de défense de 100 Md€ hors calcul du déficit structurel en 2022 — modèle applicable. (3) La taxe sur les surprofits des industries de défense (Dassault, Thales, MBDA) lo","sol":"Trois sources complémentaires : (1) TTF étendue aux transactions intra-journalières à 0,1% : +4 à 6 Md€/an supplémentaires. (2) Fonds Souverain de Défense — émission obligataire 20 ans dédiée à l'investissement militaire, hors calcul du déficit structurel (modèle allemand Sondervermögen). (3) Économies de la réforme OTAN : sortir du commandement intégré réduit la contribution française au budget OTAN de 600 M€/an. Total : +7 à 9 Md€/an de sources nouvelles, complétés par la montée en charge progressive sur 5 ans.","l":"✅ Légal — loi de finances + LPM + émission obligataire souveraine spécialisée","k":["TTF étendue au trading haute fréquence (transactions intra-journalières) à 0,1% — +4 à 6 Md€/an sans impact sur l'économie réelle car la Cour des comptes confirme que la TTF actuel","Fonds Souverain de Défense : émission d'obligations 20 ans dédiées à l'investissement militaire — hors calcul du déficit structurel, comme le Sondervermögen allemand de 100 Md€","Économies OTAN : sortie du commandement intégré = -600 M€/an de contribution au budget OTAN intégré, réaffectés au budget national de défense","Taxe sur les surprofits des industries de défense : contribution exceptionnelle de 10% sur les bénéfices qui dépassent 150% de la moyenne des 5 dernières années — Dassault, Thales,","Montée en charge progressive sur 5 ans : +2,4 Md€/an pendant 5 ans pour atteindre 3% du PIB — permet à l'industrie de défense de suivre sans saturation"],"con":[{"q":"La TTF sur le trading haute fréquence va faire fuir les traders de Paris","r":"Le Royaume-Uni taxe les transactions à 0,5% et reste la première place financière européenne. La TTF intraday à 0,1% est 5 fois moins lourde. Et le trading haute fréquence n'apporte aucune valeur à l'économie réelle — il ne finance ni entreprises ni emplois. La Cour des comptes l"},{"q":"La dette de défense c'est de la dette cachée","r":"Le modèle Sondervermögen allemand a été validé par la Cour constitutionnelle allemande et accepté par Bruxelles. Les obligations souveraines de défense sont publiques, transparentes, cotées — pas du tout cachées. Et investir dans la défense évite le coût infiniment plus élevé d'u"},{"q":"3% du PIB c'est irréaliste — même les USA n'y arrivent pas toujours","r":"La Pologne est à 4% du PIB en défense. La Grèce à 3,7%. L'Estonie à 3,2%. Ce sont des démocraties comparables. La France est une exception en dessous en raison de 30 ans de dividende de la paix post-Guerre froide. La situation géopolitique de 2026 (guerre en Ukraine, tension au d"}]},{"id":138,"t":"Policiers et gendarmes morts en service — protection complète des familles","c":"Sécurité","e":"👮🎖️","s":"urgent","a":"⚖️ +30 à 50 M€/an — 20 à 30 familles touchées par an en moyenne","sig":"neutre","sit":"Les données 2024-2025 : 10 à 15 policiers et gendarmes morts en service chaque année en France. En 2024 : 10 policiers nationaux et 7 gendarmes tués en service. Chaque famille laissée dans une situation précaire. Le régime actuel : pension de réversion fonctionnaire depuis 2023 = 70% des retraites c","sol":"Cette mesure (Policiers et gendarmes morts en service) répond à une défaillance documentée. Les données 2024-2025 : 10 à 15 policiers et gendarmes morts en service chaque année en France. En 2024 : 10 policiers nationaux et 7 gendarmes tués e. L'impact estimé est +30 à 50 M€/an — 20 à 30 familles to","l":"✅ Légal — loi ordinaire modifiant le code des pensions civiles et militaires","k":["🚫 Suppression de la condition d'âge de 55 ans pour la réversion : un conjoint de policier ou gendarme tué en service touche la pension de réversion DÈS le lendemain du décès, quel","💍 Extension au PACS et au concubinage notoire de 2 ans : un couple non marié depuis 2 ans ou pacsé bénéficie des mêmes droits à réversion — fin de la discrimination juridique","⚡ Reconnaissance 'Mort pour le service de la République' en 30 jours maximum : avance provisionnelle de 100% versée dès le lendemain du décès — fin du vide de 6 à 18 mois","🏠 Maintien dans le logement de caserne garanti 2 ans pour les familles de gendarmes : le conjoint survivant et les enfants ne peuvent pas être expulsés en période de deuil — décre","🎓 Gratuité totale des études jusqu'à bac+5 pour les enfants orphelins : frais de scolarité, logement CROUS, transports intégralement pris en charge par l'État"],"con":[{"q":"C'est une politique qui stigmatise les populations","r":"Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les stigmatiser — c'est leur rendre la liberté."},{"q":"La répression seule ne fonctionne pas","r":"Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est inefficace."},{"q":"Les droits fondamentaux seront bafoués","r":"Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes comparables."}]},{"id":138,"t":"Formation professionnelle des AESH — compétences réelles pour accompagner le handicap","c":"Éducation","e":"🧑‍🏫🧩","s":"urgent","a":"⚖️ +300 à 500 M€/an — compensé par la réduction du turnover et des ruptures d'accompagnement","sig":"neutre","sit":"Les données 2024-2025 : 10 à 15 policiers et gendarmes morts en service chaque année en France. En 2024 : 10 policiers nationaux et 7 gendarmes tués en service. Chaque famille laissée dans une situation précaire. Le régime actuel : pension de réversion fonctionnaire depuis 2023 = 70% des retraites c","sol":"Cette mesure (Policiers et gendarmes morts en service) répond à une défaillance documentée. Les données 2024-2025 : 10 à 15 policiers et gendarmes morts en service chaque année en France. En 2024 : 10 policiers nationaux et 7 gendarmes tués e. L'impact estimé est +30 à 50 M€/an — 20 à 30 familles to","l":"✅ Légal — décret sur la formation des AESH + budget Éducation nationale","k":["🎓 Diplôme d'État d'AESH (DEA) — formation initiale de 6 mois avant première affectation : TSA (autisme), TDAH, trisomie, troubles DYS, handicaps moteurs, déficiences sensorielles ","🧩 Spécialisation par profil de handicap : après 2 ans, chaque AESH choisit une spécialisation (autisme, handicap moteur, déficiences cognitives) — formation complémentaire de 3 mo","🔄 Formation continue obligatoire : 40h/an (vs 18h actuellement) — dont 20h en immersion dans des structures spécialisées (IME, SESSAD, CAMSP) pour connaître les pratiques hors éco","👥 Binôme AESH-psychologue scolaire : chaque AESH référent est jumelé avec un psychologue scolaire qui le supervise et l'accompagne sur les cas complexes — fin de l'isolement profe","📋 Fiche de profil de l'élève transmise à l'AESH avant l'affectation : description du handicap, des comportements, des déclencheurs, des stratégies qui fonctionnent — préparation o"],"con":[{"q":"Les enseignants s'y opposeront","r":"Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'évaluation des résultats. C'est une position minoritaire."},{"q":"Les résultats ne seront visibles qu'en 10 ans","r":"Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commencer maintenant."},{"q":"Ce n'est pas une question de moyens mais de méthodes","r":"C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. On change les deux."}]},{"id":139,"t":"Profil psychologique et formation des assistantes familiales — qualité de l'accueil","c":"Retraites","e":"👩‍👧🏠","s":"urgent","a":"➖ +100 à 200 M€/an — coût d'une protection de l'enfance qui fonctionne vraiment","sig":"moins","sit":"Les assistantes familiales (ASFAM) accueillent à leur domicile des enfants placés par l'ASE — souvent des enfants traumatisés, victimes de maltraitances, d'abandons, de violences. 55 000 assistantes familiales en France accueillent 100 000 enfants. Problème 1 — Le recrutement sans évaluation psychol","sol":"Cette mesure (Profil psychologique et formation des assistantes familiales) répond à une défaillance documentée. Les assistantes familiales (ASFAM) accueillent à leur domicile des enfants placés par l'ASE — souvent des enfants traumatisés, victimes de maltraitanc. L'impact estimé est +100 à 200 M€/a","l":"✅ Légal — décret sur l'agrément des assistantes familiales + Code de l'action sociale","k":["🧠 Bilan psychologique obligatoire à l'agrément : évaluation par un psychologue clinicien des capacités d'attachement sécurisant, de gestion émotionnelle, de résistance au stress —","📚 Formation spécialisée trauma complexe : 100h spécifiques aux traumatismes complexes de l'enfant (attachement désorganisé, dissociation, comportements d'opposition sévère, PTSD i","👥 Référent ASE dédié joignable 24h/24 : chaque ASFAM a un référent ASE joignable à toute heure en cas de crise — fin de l'isolement le week-end et la nuit","🔄 Supervision mensuelle obligatoire : groupe de parole et supervision clinique avec un psychologue une fois par mois — prévenir l'épuisement et les ruptures de placement","👶 Adéquation profil enfant / profil ASFAM : avant chaque placement, analyse de compatibilité entre le profil de l'enfant (type de trauma, besoins spécifiques) et les compétences d"],"con":[{"q":"C'est irresponsable financièrement","r":"Les 6 leviers génèrent +10 à 21 Md€/an face à un déficit de 5 Md€. La réforme est financièrement plus robuste que la réforme Macron qui n'activait qu'un seul levier sur six possibles."},{"q":"Cela va faire fuir les entreprises","r":"Le programme ne modifie pas le taux de cotisation patronal — il modifie l'âge de départ et le calcul des pensions. Les entreprises ne sont pas affectées sur leurs charges."},{"q":"Le FRR ne peut pas atteindre 100 Md€","r":"15% des recettes fraude récupérées (4 Md€/an) + recettes péages en 2031 (1,5 Md€/an) + CSG progressive sur le capital = montée progressive en 15 ans. Le modèle norvégien l'a fait."}]},{"id":140,"t":"Compétitivité fiscale des entreprises — aligner la France sur l'Europe","c":"Économie","e":"🏢💶🇪🇺","s":"urgent","a":"➖ Manque à gagner : 8 à 12 Md€/an — compensé par l'élargissement de la base fiscale via la croissance","sig":"moins","sit":"La France a l'une des fiscalités d'entreprise les plus lourdes d'Europe. Comparaison 2025 : IS France = 25% (PME : 15% sur 38 120€ seulement). IS Allemagne = 15% fédéral + 14% local = ~29% mais avec des déductions massives. IS Espagne = 23% général, 15% pour les nouvelles entreprises. IS Irlande = 1","sol":"Cette mesure (Compétitivité fiscale des entreprises) répond à une défaillance documentée. La France a l'une des fiscalités d'entreprise les plus lourdes d'Europe. Comparaison 2025 : IS France = 25% (PME : 15% sur 38 120€ seulement). IS Alle. L'impact estimé est Manque à gagner : 8 à 12 Md€/an — comp","l":"✅ Légal — loi de finances ordinaire","k":["💶 IS PME : taux de 15% étendu aux 200 000 premiers euros de bénéfice (vs 38 120€ actuellement) — aligner sur les Pays-Bas et l'Espagne pour les entreprises de moins de 250 salarié","🏭 Suppression totale de la C3S (Contribution Sociale de Solidarité des Sociétés) : impôt de 0,16% du CA qui frappe les entreprises même déficitaires — 4,2 Md€/an supprimés, modèle","🏢 Réduction de 50% de la taxe foncière sur les locaux industriels : les usines françaises paient 3 à 5 fois plus que les usines allemandes en taxe foncière — frein direct à l'inve","📉 CFE (Cotisation Foncière des Entreprises) plafonnée pour les PMI : plafonner la CFE à 0,5% de la valeur ajoutée pour les entreprises industrielles < 500 salariés — fin de la sur","⚡ Crédit d'impôt énergie industrielle : 40% des surcoûts énergétiques par rapport à la moyenne européenne, pendant la transition vers le merit order — protéger les industriels élec"],"con":[{"q":"Le coût est trop élevé pour les finances publiques","r":"Cette mesure (Manque à gagner : 8 à 12 Md€/an) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde budgétaire global reste excédentaire dès 2026."},{"q":"Cela va créer de l'inflation","r":"La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le cas ici."},{"q":"Ce n'est pas le rôle de l'État","r":"L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger."}]},{"id":141,"t":"Rétablir l'autorité de la République partout — fin des zones de non-droit","c":"Sécurité","e":"🏛️🚔","s":"urgent","a":"➖➕ +1 à 2 Md€/an — retour sur investissement : chaque euro de sécurité économise 5€ de réparation sociale","sig":"mixte","sit":"Le terme 'zone de non-droit' est une réalité statistique, pas une invention politique. Les données officielles du SSMSI 2025 montrent une concentration massive de la délinquance dans certains quartiers des grandes agglomérations. Le taux de crimes et délits peut être 10 à 20 fois supérieur à la moye","sol":"Cette mesure (Rétablir l'autorité de la République partout) répond à une défaillance documentée. Le terme 'zone de non-droit' est une réalité statistique, pas une invention politique. Les données officielles du SSMSI 2025 montrent une concentratio. L'impact estimé est +1 à 2 Md€/an — retour sur inve","l":"✅ Légal — plan gouvernemental + renforcement moyens existants","k":["👮 Police de proximité généralisée : dans les 200 quartiers les plus criminogènes, 1 policier référent pour 500 habitants — qui connaît les familles, les commerçants, les jeunes. L","🏗️ Saturation policière tempo
