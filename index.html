const PROPS=[{"id":1,"t":"Réforme territoriale complète — compétences exclusives, financement aligné, coopération entre niveaux","c":"Économie","e":"🏛️🗺️💶","s":"urgent","a":"➕ Économies : 5 à 10 Md€/an — Recettes nouvelles : +6 à 9 Md€/an pour les collectivités — Zéro hausse d'impôt","sig":"plus","sit":"LA FRANCE : 5 NIVEAUX QUI SE MARCHENT DESSUS↵↵La France a 34 875 communes, 1 258 intercommunalités, 101 départements, 18 régions et l'État — 5 niveaux administratifs dont les compétences se chevauchent massivement. Exemples concrets : un projet de piste cyclable peut être cofinancé par la commune + l'intercommunalité + le département + la région + l'État = 5 dossiers, 5 commissions, 5 délais, 5 fois les mêmes agents. Un agriculteur reçoit des aides de 4 niveaux différents pour la même exploitation.↵↵Coût des doublons : 7 Md€/an (IFRAP). Dépenses locales en hausse de +13,9 Md€ entre 2023 et 202","sol":"LA RÉFORME APR EN 3 VOLETS↵↵VOLET 1 — COMPÉTENCES EXCLUSIVES PAR NIVEAU (modèle Länder)↵Supprimer la clause de compétence générale. Chaque niveau a ses domaines exclusifs :↵↵🏘️ COMMUNES (services de proximité aux ménages)↵État civil, urbanisme local, école primaire, eau/assainissement, voirie communale, action sociale de proximité, petite enfance, bibliothèques/médiathèques.↵Budget moyen : 600 à 1 200€/habitant/an selon la taille.↵↵🔗 INTERCOMMUNALITÉS (services mutualisés à l'échelle du bassin de vie)↵Transports urbains et mobilité, collecte et traitement des déchets, zones d'activité économique, logement social, équipements sportifs et culturels intercommunaux, eau à l'échelle du bassin v","l":"⚠️ Loi de décentralisation + loi de finances — Révision constitutionnelle partielle pour les compétences exclusives","k":["Loi de décentralisation : supprimer la clause de compétence générale — chaque niveau a ses compétences exclusives, fin des cofinancements redondants permanents","COMMUNES : introduire la fraction IR local (5% de l'IR des résidents) + taxe numérique per capita — recettes nouvelles sans hausse de taxe foncière","DÉPARTEMENTS : remplacer progressivement les DMTO volatils par une fraction de CSG stable — aligner les recettes sur la mission de protection sociale","RÉGIONS : créer la fraction IS régional (5% de l'IS des entreprises implantées) — récompenser les régions qui réindustrialisent et créent de l'emploi","Mutualisation obligatoire des DSI entre collectivités d'une même région — économie estimée 500 M€/an"],"con":[{"q":"C'est du fédéralisme — vous allez casser l'unité de la République","r":"L'Allemagne est un État fédéral ET une démocratie unie et solidaire. La France ne devient pas fédérale — elle clarifie qui fait quoi. La République reste une et indivisible : même loi sur tout le territoire, même justice, même police. On supprime les doublons administratifs, pas "},{"q":"La fraction IR communale va créer des inégalités entre communes riches et pauvres","r":"C'est pourquoi la péréquation horizontale est renforcée simultanément — les communes riches contribuent davantage au Fonds de Péréquation. En Allemagne, la Bavière (riche) finance la Saxe (pauvre) via le Länderfinanzausgleich depuis 70 ans sans détruire la motivation des Länder r"},{"q":"Les élus locaux vont refuser de perdre leurs compétences","r":"Ils ne perdent pas de compétences — ils en gagnent d'exclusives avec un financement correspondant. Ce que les maires veulent, c'est savoir exactement ce qu'ils peuvent financer et avec quels moyens. Actuellement ils passent 40% de leur temps à monter des dossiers de cofinancement"}]},{"id":8,"t":"Merit Order nucléaire — l'électricité française au prix du nucléaire","c":"Énergie","e":"⚛️💡","s":"ambitieux","a":"➕ Gain net : −150 à −280€/an par foyer, −3 à −6 Md€/an pour l'industrie","sig":"plus","sit":"EDF produit 70% de l'électricité française à 60€/MWh grâce au nucléaire. Pourtant les Français paient au prix du gaz (120-200€/MWh) à cause du mécanisme dit 'merit order' — le prix européen est fixé par la centrale la plus coûteuse activée. Résultat : les ménages français subventionnent indirectement les pays sans nucléaire. Facture annuelle excessive : +150 à 280€/foyer/an.","sol":"Décorréler le prix de l'électricité française du prix du gaz en appliquant pleinement la réforme européenne du market design (adoptée 2024). Indexer le tarif réglementé sur le coût réel de production nucléaire (60€/MWh). Baisser la TICFE de 30% pour amplifier l'effet sur la facture. Garantir un prix contractuel stable 5 ans pour les industriels.","l":"✅ Légal — directive européenne marché électricité adoptée 2024","k":["⚡ Indexer le tarif réglementé ménages sur le coût réel nucléaire (60€/MWh) — économie 150 à 280€/an par foyer","🏭 Prix garanti 5 ans pour les industriels — sécuriser les investissements de réindustrialisation","💰 Baisser la TICFE de 30% avec les gains de la réforme — amplifier l'effet facture","🇪🇺 Négocier à Bruxelles l'extension du modèle VNU à toute l'UE — souveraineté énergétique européenne"],"con":[{"q":"L'Europe ne vous laissera pas faire","r":"La réforme du market design européen a été adoptée en 2024 et le VNU entre en vigueur en 2026. On applique et amplifie ce qui est déjà voté. Il faut juste la volonté politique d'aller au bout."},{"q":"EDF aura moins de revenus pour les EPR2","r":"Le contrat pour différence à 100€/MWh garanti à EDF sécurise son financement. EDF est compensée — les ménages paient moins. Les deux sont compatibles."},{"q":"Le prix baisse mais pas les factures à cause des taxes","r":"La TICFE baisse de 30% en parallèle. Baisse du prix de marché ET baisse de taxe combinées = 150 à 280€/an d'économie réelle."}]},{"id":9,"t":"Hôpitaux — plan de sauvetage du système hospitalier","c":"Santé","e":"🏥🚨","s":"urgent","a":"➖ +3 à 8 Md€/an — coût de l'inaction : urgences saturées, déserts médicaux, 74 400 lits perdus","sig":"moins","sit":"L'hôpital public perd 30 000 soignants par an. 57 établissements en situation financière très dégradée. Les urgences traitent 21 millions de passages/an dont 60% pourraient être orientés ailleurs. La psychiatrie est sinistrée : 18 mois d'attente en pédopsychiatrie, 1er taux de suicide des 15-29 ans en Europe. La France a supprimé 100 000 lits depuis 1980.","sol":"Plan de sauvetage en 4 volets : revalorisation des soignants (+15-20%), réorganisation des urgences (filières courtes, 116 117 universel), plan psychiatrie d'urgence (300 unités de crise, remboursement 20 séances psy/an), et fin de la T2A (tarification à l'acte) qui détruit les soins complexes non rentables.","l":"✅ Légal — ONDAM à rehausser en PLFSS","k":["💉 Rehausser l'ONDAM de 3 Md€/an dès 2026 — inverser les coupes","👨‍⚕️ 5 000 médecins territoriaux salariés à 6 000€ net dans les déserts médicaux","🧠 Plan psychiatrie +1 Md€/an — 18 mois d'attente → objectif 30 jours","🏗️ Plan investissement hospitalier 5 ans : rénover les 30% de bâtiments vétustes"],"con":[{"q":"Le coût pour la Sécurité sociale est insoutenable","r":"Le coût de l'inaction est supérieur : un passage aux urgences non justifié coûte 250€, une consultation préventive 30€. Le programme de prévention est un investissement à ROI de 3 à 7 pour 1."},{"q":"Les professionnels de santé s'y opposeront","r":"Les jeunes médecins et infirmières plébiscitent les nouvelles formes d'exercice. Les syndicats des anciens s'opposent à chaque réforme depuis 50 ans. On négocie ET on avance."},{"q":"La qualité des soins va baisser","r":"La qualité est déjà dégradée par les déserts médicaux et la surcharge hospitalière. Un système avec 18 mois d'attente et des urgences saturées n'est pas un système de qualité."}]},{"id":10,"t":"Prison, travail et réinsertion — briser le cycle de la récidive","c":"Sécurité","e":"⚖️🔄","s":"urgent","a":"➖➕ Investissement : +500 M€/an — économie récidive évitée : 2 à 4 Md€/an","sig":"mixte","sit":"85 000 détenus pour 61 000 places — surpopulation de 38%. Coût journée détention : 128€. 50% récidivent dans les 5 ans. Seulement 31% travaillent. Modèle Pays-Bas : 70% actifs, récidive divisée par 2. 25 000 personnes sortent de prison sans logement chaque année — le facteur n°1 de récidive. Le prog","sol":"La prison française récidive à 50%. C'est l'indicateur le plus parlant d'un système qui ne fonctionne pas. Enfermer sans préparer la sortie, c'est produire de nouveaux criminels. Un programme de réinsertion coûte 30€/jour. Une journée de détention coûte 128€. Un récidiviste condamné à 5 ans représen","l":"✅ Légal — obligation d'activité (pas travail forcé) + code pénitentiaire","k":["⏰ Obligation d'activité dès le 1er mois : travail, formation ou service général","💰 Revalorisation travail en prison : rémunération minimum au SMIC horaire","📚 Formation qualifiante garantie : tout détenu sort avec un diplôme reconnu","💼 Emploi identifié 30 jours avant la libération — convention France Travail + entreprises","🏠 Logement de transition garanti à la sortie — plus de retour à la rue"],"con":[{"q":"C'est une politique qui stigmatise les populations","r":"Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les stigmatiser — c'est leur rendre la liberté."},{"q":"La répression seule ne fonctionne pas","r":"Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est inefficace."},{"q":"Les droits fondamentaux seront bafoués","r":"Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes comparables."}]},{"id":11,"t":"Panier 100 produits santé à prix coûtant — alimentation accessible pour tous","c":"Pouvoir d'achat","e":"🛒🥗","s":"ambitieux","a":"➕ Coût État : 0€ — gain famille de 4 : −200 à −400€/an","sig":"plus","sit":"100 références du Programme National Nutrition Santé vendues au prix coûtant en grande distribution. La marge moyenne sur ces produits est de 25 à 35%. Mesure soutenue par 32 associations (UFC-Que Choisir, Familles Rurales, Secours Catholique). Le précédent du panier anti-inflation volontaire (2023)","sol":"Les familles modestes dépensent proportionnellement 3 fois plus de leur revenu en alimentation que les familles aisées. Les produits ultra-transformés coûtent moins cher que les fruits et légumes frais — c'est une inversion de la hiérarchie nutritionnelle créée par la grande distribution. Vendre 100","l":"✅ Légal — vendre au prix coûtant est légal (SRP interdit de vendre sous le coût d'achat)","k":["🥦 100 références PNNS au prix coûtant — fruits, légumes, légumineuses, produits laitiers, céréales complètes","🧴 Panier hygiène de base inclus : savon, dentifrice, shampooing — 10 références supplémentaires","⚠️ Amende 5% du CA si non-répercuté en rayon — sanction dissuasive","🔄 Compensation : marges plus élevées autorisées sur les Nutri-Score D et E","📊 Contrôle annuel par la DGCCRF — transparence des prix"],"con":[{"q":"Ces mesures ne profiteront qu'aux riches","r":"La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coûtant concerne les produits de base. Ce sont des mesures universelles à effet proportionnellement plus fort pour les ménages modeste"},{"q":"Cela va alimenter l'inflation","r":"Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop peu de biens — ici on augmente le pouvoir d'achat réel sans création monétaire."},{"q":"L'État ne peut pas intervenir sur les prix","r":"L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autres secteurs en défaillance de marché est légal et légitime."}]},{"id":2,"t":"Augmentation salaires enseignants + sélection renforcée + formation","c":"Éducation","e":"🎓","s":"ambitieux","a":"➖ DÉPENSE NETTE RÉVISÉE : +7 Md€/an (vs +8,9 Md€ sans la démographie) — la baisse de 1,7 million d'élèves absorbe 1,9 Md€ du coût de la revalorisation","sig":"moins","sit":"860 000 enseignants publics en France. +10% de salaire moyen = ~3,2 Md€. +20% = ~6,4 Md€. Formation initiale renforcée (2 ans post-master) : ~200–400 M€/an. Sélection renforcée : coût administratif marginal mais implique réduction du vivier => tension recrutement.↵↵DONNÉE NOUVELLE — DEPP AVRIL 2026 : 1,7 MILLION D'ÉLÈVES EN MOINS EN 2035↵Le ministère de l'Éducation nationale a publié le 7 avril 2026 des projections inédites : la France comptera 1 676 800 élèves de moins en 2035 qu'aujourd'hui, soit −14,2% de la population scolaire. Le ministre Édouard Geffray a parlé de \"vertige démographique\"","sol":"La corrélation entre niveau de salaire enseignant et résultats PISA est documentée par l'OCDE. La Finlande, numéro 1 mondial pendant 15 ans, est aussi le pays où les enseignants sont les plus respectés et les mieux payés. En France, les candidats aux concours de l'enseignement chutent depuis 10 ans → La revalorisation salariale et la réforme de la formation (prop 160) forment un bloc indissociable : sans formation de qualité, les meilleurs candidats partent. Sans salaire attractif, la réforme de formation n'attire pas les meilleurs.↵↵L'IMPACT BUDGÉTAIRE RÉVISÉ AVEC LA DÉMOGRAPHIE↵↵Calcul sans démographie (estimation initiale) :↵880 000 enseignants × +20% de revalorisation = +8,9 Md€/an↵↵Calc","l":"✅ Légal","k":["Créer un statut de 'professeur confirmé' avec prime de responsabilité","Revaloriser d'abord les débuts de carrière (-15 ans)","Lier la sélection à une formation rémunérée de qualité pour ne pas décourager les vocations","Gestion démographique intelligente : ne pas remplacer systématiquement les départs à la retraite dans les académies qui perdent des élèves — utiliser la baisse pour améliorer le ra","Carte scolaire révisée département par département (données DEPP 2026) : fermer les classes vides avec accompagnement social des communes, renforcer les classes en tension"],"con":[{"q":"Les enseignants s'y opposeront","r":"Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'évaluation des résultats. C'est une position minoritaire."},{"q":"Les résultats ne seront visibles qu'en 10 ans","r":"Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commencer maintenant."},{"q":"Ce n'est pas une question de moyens mais de méthodes","r":"C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. On change les deux."}]},{"id":160,"t":"Formation des enseignants — modèle finlandais : pratique terrain dès la 1ère année, alternance intégrale","c":"Éducation","e":"🎓🏫🇫🇮","s":"urgent","a":"⚖️ +800 M€/an — ROI prouvé : la Finlande est passée de résultats moyens à n°1 mondial en 20 ans","sig":"neutre","sit":"LA FORMATION DES ENSEIGNANTS FRANÇAIS : UN PARADOXE COÛTEUX↵↵CONTEXTE DÉMOGRAPHIQUE : La DEPP (avril 2026) projette −1,7 million d'élèves en 2035 (−14,2%). Cette baisse démographique offre une opportunité historique : restructurer la formation tout en améliorant le ratio élèves/enseignant.↵↵La France forme ses enseignants en 5 ans (licence + master MEEF) et les envoie devant une classe après seulement 15 jours de formation complémentaire. En M1, le stage dure 2 à 6 semaines. En M2, mi-temps en classe. En septembre 2026, un lauréat du concours se retrouve devant 30 élèves, seul, avec 15 jours d","sol":"RÉFORME EN 5 VOLETS — MÊME DURÉE, STRUCTURE RADICALEMENT DIFFÉRENTE↵↵La solution APR n'est PAS d'ajouter 2 ans. C'est de restructurer les 5 ans existants avec pratique terrain dès le départ — comme en Finlande.↵↵VOLET 1 — SÉLECTION EXIGEANTE ET VALORISANTE↵Concours dès la fin de L3 (déjà en cours depuis 2026). Mais critères différents : aptitude pédagogique évaluée via mise en situation, pas seulement connaissances académiques. Objectif : attirer les 10% les plus motivés ET les mieux adaptés au contact avec les enfants et adolescents — pas seulement les meilleurs à l'écrit.↵↵VOLET 2 — PRATIQUE DÈS LA 1ÈRE ANNÉE (modèle finlandais pur)↵Année 1 (L3 spécialisée) : 8 semaines en classe minimum —","l":"✅ Légal — réforme par décret des maquettes MEEF + arrêté formation continue","k":["Restructurer la maquette MEEF : pratique terrain dès la L3 (8 semaines min/an) — sans allonger la durée totale à 5 ans","Tutorat certifié et rémunéré : prime +200€/mois pour tout tuteur de stagiaire — formation obligatoire de 60h pour le tuteur","Neurosciences de l'apprentissage obligatoires en M1 : lecture, mémorisation, gestion des troubles dys, pédagogie différenciée","Formation continue ×5 : de 22,7 M€ à 110 M€/an — 100€/enseignant/an minimum, intégrée dans l'avancement de carrière","Année 3 (M2) : alternance réelle 3j classe / 2j INSPÉ — salarié à 1 800€/mois dès la validation du concours"],"con":[{"q":"La France forme déjà en 5 ans — vous ne faites rien de nouveau","r":"5 ans avec 2 à 6 semaines de stage en M1 et mi-temps en M2, c'est 5 ans de formation théorique. La Finlande forme en 5 ans avec pratique intégrée dès la 1ère année — 8 à 12 semaines terrain par an dès le début. Même durée, structure radicalement différente. Un médecin français fa"},{"q":"Les enseignants ne veulent pas être filmés ni évalués","r":"La caméra en classe est un outil de formation réflexive — pas de contrôle. Le stagiaire se filme lui-même, analyse sa pratique avec son tuteur, identifie ses points d'amélioration. C'est exactement ce que font les athlètes de haut niveau avec leurs entraîneurs. Les enseignants fi"},{"q":"On manque de tuteurs qualifiés pour encadrer tous les stagiaires","r":"Exactement — c'est pourquoi la prime de tutorat (+200€/mois) et la formation obligatoire (60h) créent une vraie mission valorisée et non une corvée. Aujourd'hui 20 000 tuteurs bénévoles mal formés. Demain : 20 000 tuteurs certifiés et rémunérés. Cela représente 48 M€/an — moins q"}]},{"id":3,"t":"Crèches — meilleur encadrement + revalorisation des salaires","c":"Éducation","e":"👶","s":"urgent","a":"⚖️ +2 à 4 Md€/an","sig":"neutre","sit":"Deux problèmes liés : (1) Encadrement insuffisant — 1 professionnel pour 8 enfants (vs 1 pour 4 recommandé par les pédiatres). (2) Salaires indignes — 1 500€ net/mois pour un travail épuisant et qualifié. Ces deux problèmes s'alimentent : les bas salaires créent la pénurie de personnel, qui aggrave","sol":"Les modes d'accueil de la petite enfance déterminent à 80% les trajectoires éducatives futures. Un enfant qui n'a pas accès à une crèche de qualité à 2 ans accumule un retard cognitif qui se paie pendant 20 ans. Le ratio 1 adulte pour 4 enfants n'est pas une ambition idéale — c'est le minimum pour u","l":"✅ Légal — loi de finances + convention collective nationale","k":["👩‍👧 Ratio 1 professionnel pour 4 enfants (vs 1 pour 8 actuellement) — objectif sur 3 ans","💰 Salaire minimum 1 600€ net (revalorisation +25%) — CCN nationale contraignante","🎓 Plan formation accéléré CAP AEPE : 50 000 nouveaux professionnels en 3 ans","🏠 Crèche garantie dès 2 mois pour tout enfant dont les 2 parents travaillent — fin des listes d'attente","📋 Convention Collective Nationale unique de la petite enfance — finalisée et imposée par décret"],"con":[{"q":"Les enseignants s'y opposeront","r":"Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'évaluation des résultats. C'est une position minoritaire."},{"q":"Les résultats ne seront visibles qu'en 10 ans","r":"Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commencer maintenant."},{"q":"Ce n'est pas une question de moyens mais de méthodes","r":"C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. On change les deux."}]},{"id":5,"t":"Réforme fiscale de l'alimentation — TVA bio à 0% et taxe sur les produits néfastes","c":"Santé","e":"🥦🍔","s":"ambitieux","a":"➕ Gain net : +1 à 2 Md€/an (TVA produits néfastes compense TVA bio)","sig":"plus","sit":"Double levier : (1) TVA à 0% sur tous les produits biologiques — le bio est inaccessible pour les ménages modestes (15 à 30% plus cher que le conventionnel). (2) Hausse de TVA sur les produits Nutri-Score D et E (ultra-transformés, sodas, snacks industriels) — ils coûtent moins cher que les produits","sol":"L'obésité infantile est une bombe à retardement sanitaire et économique. Elle naît dans l'assiette, pas dans la salle de sport. La TVA à 5,5% sur le bio et à 20% sur les ultra-transformés crée un signal-prix qui oriente les achats sans contraindre personne. Le Mexique a taxé les sodas en 2014 — cons","l":"✅ Légal — directive TVA européenne + loi de finances","k":["🥦 TVA 0% sur tous les produits biologiques certifiés","📈 Hausse TVA sur Nutri-Score D et E : +5 points (de 5,5% à 10,5%)","🏷️ Nutri-Score obligatoire sur tous les produits alimentaires — loi nationale","🌿 Exonération artisans et producteurs <500 000€ de CA","💶 Recettes fléchées vers la prévention santé et l'éducation alimentaire"],"con":[{"q":"Le coût pour la Sécurité sociale est insoutenable","r":"Le coût de l'inaction est supérieur : un passage aux urgences non justifié coûte 250€, une consultation préventive 30€. Le programme de prévention est un investissement à ROI de 3 à 7 pour 1."},{"q":"Les professionnels de santé s'y opposeront","r":"Les jeunes médecins et infirmières plébiscitent les nouvelles formes d'exercice. Les syndicats des anciens s'opposent à chaque réforme depuis 50 ans. On négocie ET on avance."},{"q":"La qualité des soins va baisser","r":"La qualité est déjà dégradée par les déserts médicaux et la surcharge hospitalière. Un système avec 18 mois d'attente et des urgences saturées n'est pas un système de qualité."}]},{"id":7,"t":"Renforcement de la laïcité","c":"République","e":"⚖️","s":"sensible","a":"⚖️ 50–200 M€ (selon périmètre)","sig":"neutre","sit":"Coûts principaux : renforcement des effectifs de contrôle (DILCRAH, inspections académiques) +30–50 M€, formation des agents publics +20–40 M€, missions éducatives renforcées (heures laïcité EN) +50–100 M€, contentieux juridiques à prévoir.","sol":"La laïcité est le contrat de neutralité qui permet à toutes les croyances de coexister dans l'espace public. Elle n'est pas une attaque contre les religions — elle les protège mutuellement. La radicalisation identitaire dans certains territoires n'est pas une fatalité culturelle — c'est le résultat","l":"⚠️ Périmètre à préciser","k":["Renforcer l'application des lois existantes avant d'en créer de nouvelles","Créer un observatoire indépendant de la laïcité avec bilan annuel","Former massivement les fonctionnaires au principe de neutralité (30h obligatoires)"],"con":[{"q":"C'est populiste","r":"Rendre les comptes publics transparents, permettre aux citoyens de s'exprimer directement sur les grandes questions — c'est de la démocratie, pas du populisme. Le populisme c'est promettre sans compter. Nous chiffrons tout."},{"q":"Ça va créer de l'instabilité","r":"La Suisse pratique le RIC depuis 1891 et est la démocratie la plus stable et la plus compétitive du monde. L'instabilité ne vient pas de la démocratie directe — elle vient des promesses sans contrepartie."},{"q":"Les citoyens ne sont pas compétents pour voter sur des sujets complexes","r":"Les citoyens suisses votent régulièrement sur des sujets complexes (énergie, fiscalité, immigration) avec des résultats souvent plus sages que les décisions parlementaires. Et les sujets techniques sont exclus du RIC — seules les grandes orientations sont soumises."}]},{"id":12,"t":"Réduction des postes administratifs — redéploiement vers soignants et policiers","c":"Emploi","e":"🔄","s":"ambitieux","a":"➕ Économie nette : +1 à +3 Md€/an + 10 000 à 30 000 postes opérationnels créés","sig":"plus","sit":"La FP compte 5,75 M d'agents. Masse salariale publique totale : 245 Md€ en 2024. Coût moyen d'un ETP entrant : ~31 000€/an (État), 28 000€ (territorial), 34 000€ (hospitalier). 1 000 suppressions de postes admin = ~31 M€ d'économie brute. Objectif : −30 000 postes administratifs sur 5 ans via non-re","sol":"La fonction publique française a un problème de répartition, pas de taille globale. On manque de soignants, de policiers de terrain, d'enseignants qualifiés. On a en revanche une inflation de postes de coordination, de communication institutionnelle et de management intermédiaire. Redéployer sans li","l":"✅ Légal — via schémas d'emploi annuels","k":["S'appuyer sur les 800 000 départs en retraite d'ici 2030 : non-remplacement ciblé uniquement sur les postes de soutien administratif pur","Créer une 'bourse de mobilité' interne : un administratif peut se reconvertir en soignant ou policier adjoint avec formation financée","Exclure du périmètre les enseignants, soignants, forces de l'ordre, agents de terrain (cibles = directions, cabinets, fonctions support)","Publier un ratio 'postes opérationnels / postes administratifs' par ministère — transparence et pression politique sur les administrations les plus déséquilibrées","Utiliser l'IA pour automatiser 30 à 40% des tâches administratives répétitives — sans suppression de postes mais par non-remplacement"],"con":[{"q":"Cela va augmenter le coût du travail","r":"La mesure est conçue pour être neutre sur le coût total du travail — redistribution entre types de coûts, pas augmentation nette. L'effet sur l'emploi est positif selon les modélisations."},{"q":"Les syndicats refuseront","r":"Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On négocie en bonne foi et on avance."},{"q":"Ça ne marche pas en France","r":"L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fonctionne dans le contexte français."}]},{"id":13,"t":"Suppression du droit du sol","c":"Sécurité","e":"🇫🇷","s":"sensible","a":"⚖️ Coût État quasi nul — impact sociétal majeur","sig":"neutre","sit":"La mesure est réglementaire/législative : pas de coût budgétaire direct. Coûts indirects : gestion administrative accrue des statuts de résidence (+50–100 M€/an estimés), contentieux juridiques (+20–50 M€/an), coût social de l'apatridie potentielle de certains enfants. Actuellement ~50 000 à 80 000","sol":"La nationalité française doit traduire un ancrage réel dans la société française, pas un accident géographique. Conditionner le droit du sol à 5 ans de résidence légale des parents n'est pas discriminatoire — c'est demander un lien minimal. L'enfant né en France de parents en situation régulière dep","l":"🚨 Révision constitutionnelle probable + risque CEDH","k":["Option 1 — sans révision constitutionnelle : allonger la résidence requise à 8 ans (au lieu de 5) et exiger une démarche active à 16 ans","Option 2 — avec révision constitutionnelle : passage au droit du sang pur avec naturalisation conditionnelle après 18 ans (critères d'intégration)","Traiter Mayotte séparément — le cas est déjà spécifique et juridiquement distinct du régime métropolitain","Attention : la mesure ne réduit pas l'immigration irrégulière (facteurs économiques et géopolitiques prédominants, prouvé à Mayotte)","Coupler obligatoirement avec une politique de naturalisation claire et méritocratique pour ne pas créer de 'sans-papiers nés en France'"],"con":[{"q":"C'est une politique qui stigmatise les populations","r":"Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les stigmatiser — c'est leur rendre la liberté."},{"q":"La répression seule ne fonctionne pas","r":"Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est inefficace."},{"q":"Les droits fondamentaux seront bafoués","r":"Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes comparables."}]},{"id":14,"t":"Zéro prestation pour les clandestins — aides réservées aux réguliers depuis 5 ans","c":"Sécurité","e":"🚫💶","s":"sensible","a":"➕ Économie estimée : 1 à 2,5 Md€/an — avec un point dur sur l'AME","sig":"plus","sit":"État actuel des aides accessibles aux clandestins : AME (Aide Médicale d'État) : 1,2 Md€/an pour ~466 000 bénéficiaires (2023). Hébergement d'urgence : ~2 Md€/an (toute population précaire, part clandestins difficile à isoler, estimée ~30–40%). ADA (Allocation Demandeur d'Asile) : ~500 M€/an pour ~1","sol":"L'Aide Médicale d'État coûte 1,1 Md€ et couvre les soins de toute personne en situation irrégulière. La France est la seule grande démocratie européenne à offrir une couverture aussi large. L'AMU (soins vitaux uniquement) est la norme en Allemagne, Belgique, Pays-Bas. Elle couvre les urgences, les s","l":"🚨 Suppression totale AME : obstacle CEDH — remplacement par Aide Médicale d'Urgence possible","k":["AME → AMU : urgences vitales, maternité, maladies contagieuses uniquement — économie ~600–800 M€/an, validée par précédent sénatorial","Condition 5 ans étendue à toutes les prestations pour étrangers réguliers (RSA déjà à 5 ans — aligner APL, AF, ASPA)","Supprimer l'hébergement d'urgence pour les étrangers en situation irrégulière non demandeurs d'asile","Maintien obligatoire des soins pour mineurs et femmes enceintes quelle que soit la situation administrative — protection CEDH","Coupler avec une politique de reconduite à la frontière renforcée pour que la mesure ait un effet réel sur les flux"],"con":[{"q":"C'est une politique qui stigmatise les populations","r":"Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les stigmatiser — c'est leur rendre la liberté."},{"q":"La répression seule ne fonctionne pas","r":"Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est inefficace."},{"q":"Les droits fondamentaux seront bafoués","r":"Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes comparables."}]},{"id":15,"t":"Réduction du train de vie de l'État — sans impact sur les services publics","c":"Économie","e":"✂️🏛️","s":"ambitieux","a":"➕ Économie estimée : 800 M€ à 2 Md€/an — signal politique fort, 89% des Français y sont favorables","sig":"plus","sit":"Poste par poste : Élysée : budget 115 M€/an dont frais représentation passés de 9,87 M€ (2021) à 21 M€ (2023) — objectif −30% = −35 M€/an. Assemblée nationale : 622 M€/an — réduction 10% = −62 M€. Sénat : ~340 M€/an — réduction 10% = −34 M€. Cabinets ministériels (frais représentation) : 100 à 150k€","sol":"La crédibilité d'un programme de réduction des dépenses publiques commence par l'exemple. Comment demander aux Français de se serrer la ceinture si les ministres partent en jets privés et que les budgets de communication des ministères explosent ? Le signal politique est aussi important que le monta","l":"✅ Légal — décrets + lois de finances","k":["Gel immédiat des budgets Élysée, Assemblée, Sénat en valeur réelle (déjà amorcé en 2025 — accélérer et pérenniser)","Supprimer les jets privés pour tous déplacements inférieurs à 3h de vol — visioconférence ou transport commercial","Revaloriser les logements de fonction à leur valeur locative réelle — avantage en nature correctement fiscalisé","Réduire le parc automobile de l'État de 20% — électrification totale du reste d'ici 2027","Plafonner les frais de représentation ministériels à 50 000€/an (vs 100–150k€ actuels)"],"con":[{"q":"Le coût est trop élevé pour les finances publiques","r":"Cette mesure (Économie estimée : 800 M€ à 2 Md€/an) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde budgétaire global reste excédentaire dès 2026."},{"q":"Cela va créer de l'inflation","r":"La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le cas ici."},{"q":"Ce n'est pas le rôle de l'État","r":"L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger."}]},{"id":16,"t":"Retraite à 60 ans — sans décote pour les carrières longues et métiers pénibles, décote réduite pour les autres","c":"Retraites","e":"👴⚖️","s":"ambitieux","a":"➖➕ DÉPENSE NOUVELLE : −5 Md€/an — financé par l'excédent global APR (+17,6 Md€ An 1) — équilibre propre sur la retraite atteint en An 5","sig":"mixte","sit":"LA RÉFORME MACRON : 10% DU PROBLÈME RÉSOLU POUR 100% DE LA FRACTURE SOCIALE↵↵Le déficit du système de retraites est de 5 Md€/an en 2025, projeté à 15 Md€ en 2035. La réforme Macron (passage à 64 ans) génère seulement 1,5 Md€/an d'économies — soit 10% du déficit. Au prix d'une fracture sociale majeure : grèves, 49.3, loi rejetée par 75% des Français.↵↵Injustice structurelle : un ouvrier entré à 16 ans part à 64 ans — comme un cadre entré à 25 ans avec un salaire 3 fois supérieur. Espérance de vie des ouvriers : 7 ans de moins que les cadres. Un ouvrier à 64 ans perçoit sa retraite 14 ans en moy","sol":"OPTION C — TROIS NIVEAUX DE DÉPART↵↵(1) CARRIÈRES LONGUES + MÉTIERS PÉNIBLES → 60 ans SANS DÉCOTE↵Entrée avant 20 ans avec 44 trimestres cotisés. Pension pleine. C'est la justice due à ceux qui ont donné leur vie physique à leur métier.↵↵(2) DÉPART VOLONTAIRE À 60 ANS → DÉCOTE DE 3%/AN↵Quatre ans avant 64 ans = décote de 12%. Pension réduite de 12%. Ce n'est pas actuariel neutre — surcoût de 16 800€ sur une vie — mais c'est un choix individuel assumé et couvert collectivement.↵↵(3) LE FINANCEMENT — CE QUI EST IMMÉDIAT ET CE QUI PREND DU TEMPS↵Tous les leviers ne produisent pas leurs effets immédiatement. L'honnêteté exige de le préciser.↵↵AN 1 — IMMÉDIAT : CSG progressive sur revenus du capi","l":"✅ Légal — loi ordinaire modifiant le code de la Sécurité sociale + décret sur la liste C2P","k":["Carrières longues (entrée avant 20 ans, 44 trimestres) : départ à 60 ans SANS décote — justice pour ceux qui ont travaillé toute leur vie","Option volontaire à 60 ans avec décote 3%/an (12% sur 4 ans) — choix individuel couvert collectivement","CSG progressive sur revenus du capital > 100 000€ : taux 36% à 45% au-dessus du seuil — +1,5 Md€/an fléchés vers les retraites dès An 1","Index seniors obligatoire avec sanctions pour entreprises qui discriminent les 55+ — objectif 65% de taux d'emploi 55-64 ans en 5 ans","FRR réarmé : 15% des recettes de fraude fiscale récupérée fléchés vers le Fonds de Réserve des Retraites — objectif 100 Md€ en 15 ans"],"con":[{"q":"La retraite à 60 ans coûte 27 milliards — c'est un gouffre","r":"27 milliards c'est le coût sans décote ni sélection. Avec notre décote de 3%/an et un taux d'adhésion réaliste de 50%, le coût tombe à 5 milliards. C'est ce que chiffre l'IFRAP avec ces paramètres. Et ces 5 milliards représentent 18% de l'excédent global du programme APR — financ"},{"q":"Vos 6 leviers ne couvrent pas le coût dès la première année","r":"C'est exact — et on le dit honnêtement. En An 1, nos leviers génèrent 1,8 milliard pour un coût de 5 milliards. Déficit net de 3,2 milliards pendant les 4 premières années. L'équilibre est atteint en An 5 grâce à la montée en charge de l'emploi des seniors. Nous sommes le seul mo"},{"q":"C'est irresponsable de creuser le déficit des retraites","r":"Le déficit supplémentaire de 3,2 Md€/an pendant 4 ans est couvert par l'excédent global du programme APR qui génère +17,6 Md€ dès An 1. La retraite à 60 ans représente 18% de cet excédent. Ce n'est pas creuser un déficit — c'est prioriser la justice sociale dans un budget global "}]},{"id":19,"t":"Plan national de réserves d'eau — stockage hivernal et réduction des fuites","c":"Agriculture","e":"💧","s":"urgent","a":"➖ 2 à 4 Md€/an d'investissement sur 10 ans — coût sécheresse évité : 3 à 5 Md€/an","sig":"moins","sit":"Contexte : 9 sécheresses majeures depuis 2018. Coût économique : 3 à 5 Md€/an. Nappes phréatiques en baisse dans 60% des territoires. Fuites réseaux eau potable : 20% de l'eau produite perdue avant d'arriver au robinet = 1 Md€/an gaspillé. REUT (réutilisation eaux usées traitées) : 1% en France vs 8","sol":"La France perd 20% de son eau potable dans des réseaux vieillissants avant qu'elle n'arrive au robinet. Parler de sécheresse structurelle sans d'abord réparer les fuites, c'est déboucher le bain sans fermer le robinet. Chaque euro investi dans la réhabilitation des réseaux économise l'équivalent d'u","l":"✅ Légal — approche écologiquement différenciée selon type d'ouvrage","k":["🔧 PRIORITÉ 1 : réparation des fuites réseaux = 20% d'eau potable économisée sans construire quoi que ce soit — programme national 800 M€/an","🏔️ Retenues collinaires de ruissellement hivernal : 1 000/an sur 10 ans — alimentation naturelle, impact écologique limité","♻️ REUT (réutilisation eaux usées traitées) : objectif 5% d'ici 2030 (vs 1% aujourd'hui) — irrigation des cultures sans prélèvement sur les nappes","🏛️ Réhabilitation des barrages et retenues existants : augmenter la capacité de stockage sans nouveaux ouvrages","⚠️ Bassines de substitution : uniquement dans un cadre concerté (PTGE), avec engagement de réduction phytosanitaire, sans zones humides — pas de passage en force"],"con":[{"q":"Les prix planchers vont renchérir l'alimentation","r":"Ils empêchent la vente à perte. Un agriculteur qui vend à perte ferme — et l'importation déloyale remplace. Le prix légèrement plus élevé d'une viande française est la prime d'assurance de notre souveraineté alimentaire."},{"q":"La clause miroir va provoquer des guerres commerciales","r":"La clause miroir impose aux importations de respecter nos normes. Ce n'est pas du protectionnisme — c'est de l'équité. On ne peut pas interdire aux agriculteurs français d'utiliser certains pesticides et importer des produits avec ces mêmes pesticides."},{"q":"Les jeunes agriculteurs ne veulent plus s'installer","r":"Le revenu agricole sous le SMIC est le premier facteur de non-installation. Prix planchers + installation 10 000 jeunes/an + foncier protégé résolvent les 3 obstacles principaux."}]},{"id":18,"t":"Nationalisation des sociétés concessionnaires d'autoroutes","c":"Énergie","e":"🛣️","s":"ambitieux","a":"➖➕ Gain récurrent après rachat : +3,5 à +4,5 Md€/an. Coût de rachat : 45–50 Md€ one-shot (ou attendre 2031–2036 : coût zéro)","sig":"mixte","sit":"Situation actuelle : 7 sociétés concessionnaires (Vinci/ASF, Eiffage/APRR, Sanef/Macquarie...). CA cumulé 2023 : 39,3 Md€. Bénéfices : +4 Md€/an. L'État perçoit déjà 40% des recettes péages via taxes (TVA 20% + taxe d'aménagement). Rentabilité actionnaire de 8% atteinte — les concessions expirent en","sol":"Les autoroutes françaises ont été construites avec l'argent des contribuables puis données en concession à des entreprises privées qui ont multiplié les dividendes depuis 20 ans. Les concessions expirent entre 2031 et 2036. Ne pas les renouveler — décision légale et contractuellement prévue — rappor","l":"✅ Légal — article 38 des contrats de concession prévoit le rachat anticipé","k":["Stratégie optimale : NE PAS racheter maintenant — attendre 2031–2036 pour récupération gratuite","Action immédiate : taxe sur surprofits concessionnaires (bénéfices > 8% de rentabilité) = +500 M€–1 Md€/an dès 2026","Gel des hausses de péages au niveau de l'inflation jusqu'à fin des concessions","Dès 2031 : péage réduit de 30 à 40% (couvre uniquement entretien) — économie directe pour 40 millions d'usagers","Affecter les recettes post-nationalisation à l'entretien du réseau ferroviaire (SNCF/RFF) et au financement des transports en commun"],"con":[{"q":"C'est trop coûteux et trop long","r":"Le nucléaire est l'investissement le plus rentable sur 60 ans de durée de vie. Chaque EPR2 produit de l'électricité pendant 60 ans à 70€/MWh — sans carbone, sans dépendance aux cours du gaz."},{"q":"L'éolien et le solaire sont moins chers","r":"Moins chers à construire, mais intermittents. Sans le nucléaire pour produire quand il ne fait pas vent ou soleil, il faut des centrales à gaz en backup — qui coûtent cher et émettent du CO2. Le nucléaire est la seule énergie pilotable et décarbonée."},{"q":"Les déchets nucléaires sont insolubles","r":"Cigéo (enfouissement géologique profond) est en cours d'autorisation. La France maîtrise le retraitement des combustibles usés — 96% sont recyclés par Orano. Et les RNR de 4e génération 'brûleront' les déchets existants."}]},{"id":20,"t":"Plan de réinvestissement massif dans les DOM-TOM — rattrapage d'infrastructures","c":"Outre-mer","e":"🌴","s":"urgent","a":"➖ +1,5 à 3 Md€/an d'investissement supplémentaire sur 10 ans","sig":"moins","sit":"2,8 millions d'Ultramarins sont des citoyens français à part entière mais vivent dans des territoires avec des décennies de retard infrastructurel. Budget actuel Outre-mer : ~2,7 Md€/an (mission outre-mer). Le fonds exceptionnel d'investissement a été rabotté de 18,7% dans le PLF 2025. Besoins chiff","sol":"Les Outre-mer ne coûtent pas à la France — ils la font. Sans eux, pas de présence dans l'Atlantique, le Pacifique, l'Indianocéan. Pas de 2e ZEE mondiale. Pas de base pour la projection de force militaire. Pas d'accès à 40% de la biodiversité française. Laisser des citoyens français sans eau potable","l":"✅ Légal — contrats de convergence et de transformation (CCT)","k":["💧 Eau potable et assainissement : financement des 1,7 Md€ de besoins identifiés — programme prioritaire 10 ans","🏗️ Renforcer les équipes d'ingénierie locale dans chaque collectivité — débloquer les fonds européens non consommés","🏥 Hôpitaux et déserts médicaux ultramarins : plan d'urgence santé spécifique (Guyane, Mayotte, Martinique)","🏠 Logement : objectif 10 000 logements sociaux/an dans les DOM (vs 4 000 actuellement) — foncier débloqué","📡 Numérique : fibre et connexion satellitaire dans toutes les communes ultramarines d'ici 2028"],"con":[{"q":"C'est trop coûteux pour la métropole","r":"Les Outre-mer donnent à la France la 2e zone économique exclusive mondiale. Sans eux, la France n'est pas une puissance mondiale. L'investissement est stratégique."},{"q":"Les problèmes de l'Outre-mer sont structurels et insolubles","r":"La Guadeloupe sans eau courante n'est pas une fatalité — c'est un déficit d'investissement. L'eau potable universelle en Guadeloupe coûte 800 M€ d'investissement — moins que 2 EPR2."},{"q":"Les collectivités locales doivent gérer elles-mêmes","r":"Les collectivités ultramarines n'ont pas les moyens fiscaux pour des investissements de cette ampleur. Un financement national pour les infrastructures de base est normal — comme en métropole."}]},{"id":21,"t":"Mayotte — sécurisation, reconstruction et refondation complète","c":"Outre-mer","e":"🏝️🔒","s":"urgent","a":"⚖️ 4 Md€ programmés 2025-2031 — à amplifier et accélérer (+1 Md€/an supplémentaire)","sig":"neutre","sit":"Situation d'urgence absolue : cyclone Chido (14 déc. 2024) + tempête Dikeledi (janv. 2025) ont détruit 90% des infrastructures. 338 000 habitants. PIB à 50-60% public — territoire sous perfusion. Chômage estimé près de 50%. Loi de refondation Mayotte (11 août 2025) : 4 Md€ programmés 2025-2031, dont","sol":"Mayotte cumule les crises : cyclone Chido (décembre 2024), pression migratoire hors norme, pauvreté structurelle, insécurité. Mais Mayotte donne aussi à la France une présence dans le canal du Mozambique, stratégiquement important. La reconstruction post-Chido est une opportunité : refondre l'île su","l":"✅ Cadre légal posé — loi refondation août 2025 + nouveau statut Département-Région","k":["🔨 Reconstruction anti-cyclone : TOUTES les nouvelles constructions en dur, aux normes parasismiques et paracycloniques — plus jamais de tôles","🏥 2e hôpital à Combani + extension CHM : priorité absolue — Mayotte avait 1 hôpital pour 320 000 personnes avant Chido","🏫 Écoles : 100% des salles de classe reconstruites en dur d'ici 2027 — scolarité obligatoire effective pour tous les enfants","⚓ Base navale en eau profonde : capacité d'interception renforcée — radars et vedettes supplémentaires","🤝 Diplomatie Comores : aide au développement conditionnée à la coopération sur les flux migratoires — attaquer la cause, pas seulement les symptômes"],"con":[{"q":"C'est trop coûteux pour la métropole","r":"Les Outre-mer donnent à la France la 2e zone économique exclusive mondiale. Sans eux, la France n'est pas une puissance mondiale. L'investissement est stratégique."},{"q":"Les problèmes de l'Outre-mer sont structurels et insolubles","r":"La Guadeloupe sans eau courante n'est pas une fatalité — c'est un déficit d'investissement. L'eau potable universelle en Guadeloupe coûte 800 M€ d'investissement — moins que 2 EPR2."},{"q":"Les collectivités locales doivent gérer elles-mêmes","r":"Les collectivités ultramarines n'ont pas les moyens fiscaux pour des investissements de cette ampleur. Un financement national pour les infrastructures de base est normal — comme en métropole."}]},{"id":71,"t":"Nouvelle-Calédonie — pacte de refondation économique et avenir institutionnel","c":"Outre-mer","e":"🏝️🤝","s":"urgent","a":"⚖️ +500 M€ à 1 Md€/an d'effort supplémentaire — sur 5 ans — pour stabiliser et relancer","sig":"neutre","sit":"Crise sans précédent : le PIB calédonien a chuté de 15% en 2024 — pire recul depuis 1962. Les émeutes de mai 2024 ont détruit des centaines d'entreprises. Le chômage est passé de 2 400 à 5 500 personnes en janvier 2025. La CAFAT (Caisse de protection sociale) prévoit un déficit de 10 Md XPF (84 M€)","sol":"Cette mesure (Nouvelle-Calédonie) répond à une défaillance documentée. Crise sans précédent : le PIB calédonien a chuté de 15% en 2024 — pire recul depuis 1962. Les émeutes de mai 2024 ont détruit des centaines d'entrepri. L'impact estimé est +500 M€ à 1 Md€/an d'effort supplémentaire — sur 5 ans —","l":"✅ Accord de Bougival (12 juillet 2025) — cadre institutionnel posé","k":["🤝 Respecter et financer pleinement l'accord de Bougival (juil. 2025) : souveraineté partagée, évolutions institutionnelles décidées par les Calédoniens eux-mêmes","🏗️ Amplifier le pacte de refondation : de 200 M€ à 500 M€/an sur 5 ans — désenclavement, eau, électricité, santé, école","⚡ Urgence nickel : plan de soutien à la filière (fermeture de l'usine du Nord en 2024) — formation reconversion des salariés, maintien des sites stratégiques","🌊 Diversification économique : tourisme (la Calédonie est parmi les plus belles destinations du Pacifique), pêche durable, agriculture locale, économie bleue","👶 Plan jeunesse : 1 000 parcours d'insertion/an pendant 5 ans (déjà dans le pacte de refondation) + 100 postes d'éducateurs — priorité absolue pour la cohésion sociale"],"con":[{"q":"C'est trop coûteux pour la métropole","r":"Les Outre-mer donnent à la France la 2e zone économique exclusive mondiale. Sans eux, la France n'est pas une puissance mondiale. L'investissement est stratégique."},{"q":"Les problèmes de l'Outre-mer sont structurels et insolubles","r":"La Guadeloupe sans eau courante n'est pas une fatalité — c'est un déficit d'investissement. L'eau potable universelle en Guadeloupe coûte 800 M€ d'investissement — moins que 2 EPR2."},{"q":"Les collectivités locales doivent gérer elles-mêmes","r":"Les collectivités ultramarines n'ont pas les moyens fiscaux pour des investissements de cette ampleur. Un financement national pour les infrastructures de base est normal — comme en métropole."}]},{"id":22,"t":"Réduction d'impôt sur l'immobilier conditionnée à la rénovation énergétique","c":"Pouvoir d'achat","e":"🏠⚡","s":"ambitieux","a":"➖➕ Coût fiscal : −2 à −4 Md€/an — retour économique : 8 à 15 Md€/an (filière bâtiment + énergie + emploi)","sig":"mixte","sit":"Contexte : 5,2 millions de passoires thermiques en France (logements F ou G). Coût moyen rénovation globale : 25 000–50 000€/logement. 10% interdits à la location depuis janv. 2025 (classe G), 20% en 2028 (classe F). Outils existants : MaPrimeRénov' (~3 Md€/an), déficit foncier doublé à 21 400€ jusq","sol":"5,2 millions de passoires thermiques chauffent l'air extérieur en hiver. Leurs occupants paient 2 000€ de chauffage de plus par an que dans un logement bien isolé. MaPrimeRénov' existe mais 80% des éligibles ne la demandent pas — trop complexe, trop lente, trop de refus. La réforme APR simplifie rad","l":"✅ Légal — loi de finances + arrêté TVA","k":["TVA 5,5% sur tous les travaux de rénovation énergétique (vs 10% actuel) — gain immédiat pour 2 millions de propriétaires/an","Réduction d'impôt 30% plafonnée à 15 000€/an pour passage de ≥2 classes DPE — simple, lisible, efficace","Exonération taxe foncière 50% pendant 5 ans pour les bailleurs rénovant leur bien loué — lever le frein bailleur","Simplification radicale de MaPrimeRénov' : une seule aide, versée en amont, sans avance de trésorerie — la complexité administrative tue l'adoption","Bonus 'rénovation globale' : prime supplémentaire de 5 000€ si tout le bâtiment est traité en une seule fois (vs travaux partiels)"],"con":[{"q":"Ces mesures ne profiteront qu'aux riches","r":"La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coûtant concerne les produits de base. Ce sont des mesures universelles à effet proportionnellement plus fort pour les ménages modeste"},{"q":"Cela va alimenter l'inflation","r":"Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop peu de biens — ici on augmente le pouvoir d'achat réel sans création monétaire."},{"q":"L'État ne peut pas intervenir sur les prix","r":"L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autres secteurs en défaillance de marché est légal et légitime."}]},{"id":23,"t":"Encadrement des loyers : maintien ciblé zones tendues — suppression ailleurs","c":"Pouvoir d'achat","e":"🏘️","s":"sensible","a":"⚖️ Impact locataires zones tendues : −984€/an (Paris) — impact offre locative : +5 à +10% de remise sur le marché","sig":"neutre","sit":"⚠️ Point critique : les données montrent que la suppression totale est contre-productive. À Paris : économie moyenne de 984€/an par locataire. À Lille, Lyon, Bordeaux, Montpellier : baisse de 4,4% des loyers. Mais 28% de non-conformité en 2024 = le dispositif fonctionne imparfaitement. Effets perver","sol":"Dans un marché immobilier en tension, le libre marché produit un résultat documenté : les loyers augmentent jusqu'à ce que les ménages modestes soient expulsés vers la périphérie. Cela crée une ville à deux vitesses, détruit la mixité sociale, éloigne les travailleurs de leurs emplois. Vienne encadr","l":"✅ Légal — loi ordinaire + choix de périmètre d'application","k":["Maintien encadrement : UNIQUEMENT Paris, petite couronne IDF, Lyon, Lille, Bordeaux, Montpellier (zones à <3% vacance)","Suppression dans toutes les villes moyennes et petites — relancer l'investissement locatif hors métropoles","Renforcer les contrôles dans les zones maintenues : 28% de non-conformité actuelle = besoin de sanctions dissuasives","Taxer fortement les logements vacants dans les zones tendues (taxe sur logements vacants TLV — multiplier par 3)","Encadrement de l'Airbnb et locations touristiques courtes durées : plafond de 90 jours/an hors résidence principale — remettre des logements sur le marché longue durée"],"con":[{"q":"Ces mesures ne profiteront qu'aux riches","r":"La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coûtant concerne les produits de base. Ce sont des mesures universelles à effet proportionnellement plus fort pour les ménages modeste"},{"q":"Cela va alimenter l'inflation","r":"Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop peu de biens — ici on augmente le pouvoir d'achat réel sans création monétaire."},{"q":"L'État ne peut pas intervenir sur les prix","r":"L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autres secteurs en défaillance de marché est légal et légitime."}]},{"id":24,"t":"Campus universitaires complets financés par les entreprises avec défiscalisation","c":"Éducation","e":"🎓🏗️","s":"ambitieux","a":"➖ Coût fiscal État : −500 M€ à −1,5 Md€/an — investissement privé levé : 3 à 8 Md€/an","sig":"moins","sit":"Contexte : parc universitaire français vieillissant, 150 Md€ de retard d'entretien estimé, budgets gelés. Financement privé actuel de la recherche publique : seulement 5,2% (très faible vs Allemagne 15%, UK 12%). Modèle proposé : crédit d'impôt de 60% sur les investissements des entreprises dans des","sol":"Les universités françaises forment 80% des étudiants avec 12 460€/étudiant/an. Les grandes écoles forment 5% des étudiants avec 35 000€/étudiant/an. Ce différentiel crée une fracture éducative qui se retrouve ensuite dans les inégalités professionnelles. Le mécénat universitaire — crédit d'impôt 60%","l":"✅ Légal — crédit d'impôt recherche élargi + PPP universitaire","k":["Crédit d'impôt 60% pour tout investissement >10 M€ dans un campus universitaire public sous convention PPP","Gouvernance 100% académique maintenue : zéro droit de regard de l'entreprise sur les enseignements, les recrutements, les résultats — clause statutaire obligatoire sous peine de re","Campus complet obligatoire : bâtiments pédagogiques + labo + logements étudiants + RU + sport — pas de 'cherry-picking' d'un seul labo","Priorité aux villes moyennes sans université complète : Valenciennes, Châteauroux, Rodez, Aurillac... — rééquilibrage territorial","Accès prioritaire (pas exclusif) aux talents formés pour l'entreprise mécène — avantage réel sans captation"],"con":[{"q":"Les enseignants s'y opposeront","r":"Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'évaluation des résultats. C'est une position minoritaire."},{"q":"Les résultats ne seront visibles qu'en 10 ans","r":"Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commencer maintenant."},{"q":"Ce n'est pas une question de moyens mais de méthodes","r":"C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. On change les deux."}]},{"id":25,"t":"Durcissement de l'assurance chômage — incitation au retour à l'emploi","c":"Emploi","e":"💼","s":"ambitieux","a":"➕ Économie estimée : +1 à +3 Md€/an sur le régime — financement du plein emploi","sig":"plus","sit":"Budget assurance chômage 2024 : ~40 Md€/an de prestations versées. 3,6 millions d'allocataires. Durée maximale actuelle : 18 mois (<55 ans), 22,5 mois (55-56 ans) depuis le 1er avril 2025. Condition d'ouverture : 6 mois de travail sur 24 mois. Ruptures conventionnelles : 515 000 en 2024, représentan","sol":"Le chômage en France dure en moyenne 17 mois — le double de la moyenne OCDE. Cette durée n'est pas causée par une générosité excessive : elle est causée par un accompagnement insuffisant. Le modèle APR s'inspire du Danemark : indemnisation plus élevée mais plus courte, activation obligatoire dès le","l":"✅ Légal — convention Unédic ou décret de carence","k":["Condition d'ouverture : 8 mois sur 24 (vs 6) — alignement sur la moyenne européenne","Carence rupture conventionnelle : 3 mois minimum (vs 1 mois) — limiter les accords de complaisance","Obligation d'activité dès le 4e mois : formation, bénévolat certifié, service civique — indemnisation active uniquement","Dégressivité renforcée pour les hauts salaires (>4 900€ bruts/mois) : −25% dès le 5e mois","Contrôle renforcé des offres refusées : 2 refus d'offres raisonnables = réduction de 20% de l'allocation"],"con":[{"q":"Cela va augmenter le coût du travail","r":"La mesure est conçue pour être neutre sur le coût total du travail — redistribution entre types de coûts, pas augmentation nette. L'effet sur l'emploi est positif selon les modélisations."},{"q":"Les syndicats refuseront","r":"Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On négocie en bonne foi et on avance."},{"q":"Ça ne marche pas en France","r":"L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fonctionne dans le contexte français."}]},{"id":26,"t":"Lutte massive contre la fraude fiscale — objectif 25 à 30 Md€/an récupérés","c":"Économie","e":"🔍💰","s":"urgent","a":"➕ Recettes supplémentaires : +12 à +18 Md€/an (objectif 25-30 Md€) — investissement : 800 M€/an (la fraude rapporte massivement net)","sig":"plus","sit":"La France perd 80 Md€/an à la fraude fiscale selon les estimations OCDE. Elle en récupère 13 Md€ (16%). L'Allemagne récupère 33 Md€/an avec des outils comparables. Écart expliqué : 30 000 agents DGFiP en France (0,45 pour 1 000 habitants), 45 000 en Allemagne. La fraude à la TVA sur e-commerce représente 20 Md€/an à elle seule — presque intégralement non récupérée.","sol":"Tripler les moyens de détection : +8 000 agents DGFiP sur 3 ans, facturation électronique B2B obligatoire (adoptée en 2026), IA de détection fiscale (modèle HMRC britannique : +3 Md€ dès la 1ère année), automatisation des échanges de données avec les 140 pays partenaires. Objectif : 25 à 30 Md€ récupérés en 5 ans.","l":"✅ Légal — rapport Cour des comptes déc. 2025 appuie toutes les mesures","k":["📏 Estimation annuelle obligatoire de l'écart fiscal publiée — France seul grand pays OCDE sans cette donnée (rapport Cour des comptes déc. 2025)","+8 000 agents DGFiP dédiés au contrôle (147 ajoutés en 2025 — dérisoire) — ROI : 1€ investi = 15 à 20€ récupérés","🏢 Prix de transfert multinationales : objectif 15-20 Md€ notifiés/an (vs 5,2 Md€ en 2024) — ×3 en 3 ans avec IA","💻 Facturation électronique obligatoire dès janvier 2026 (vs 2027) — ferme 6 à 10 Md€ de fraude TVA carousel automatiquement","🌍 Porter au niveau européen la levée de l'ordonnance américaine sur les paradis fiscaux — France perd 27,3 Md€/an selon Tax Justice Network 2025"],"con":[{"q":"80 Md€ de fraude c'est fantaisiste","r":"Methodology OCDE. La France est le seul grand pays sans estimation officielle — choix politique de ne pas mesurer. L'Allemagne estime son Tax Gap à 100 Md€ et en récupère 33 Md€. La France estime peu et récupère peu."},{"q":"Les fraudeurs délocalisent si on les poursuit","r":"Les cibles sont la TVA e-commerce (impossible à délocaliser — les clients sont en France), les prix de transfert (présents en France pour vendre), et le travail dissimulé (impossible à délocaliser). Ces 3 sources représentent 50 à 60 Md€ du Tax Gap."},{"q":"Vous allez fiscaliser les petits entrepreneurs","r":"Les cibles sont les multinationales et les grandes fortunes offshore. Le droit à l'erreur (prop 63) protège les artisans qui font des erreurs de bonne foi. Ce n'est pas la même chose."}]},{"id":27,"t":"Flexibilité des salariés + participation universelle aux bénéfices","c":"Emploi","e":"🤝📈","s":"ambitieux","a":"➖➕ Coût fiscal : −500 M€ à −1,5 Md€/an — gain productivité estimé : +2 à +5% PIB à terme","sig":"mixte","sit":"Contexte participation : seulement 3 millions de salariés bénéficient d'intéressement ou participation en 2022 sur 26 millions de salariés — soit 11,5%. Montant moyen : 1 702€/salarié/an. Participation obligatoire actuelle : entreprises >50 salariés uniquement. Loi partage de la valeur (2023) : entr","sol":"La participation aux bénéfices existe en France depuis de Gaulle (1967) — elle n'est simplement pas assez généralisée. Seulement 35% des salariés en bénéficient réellement. Étendre aux entreprises de +10 salariés, c'est donner aux salariés des PME — qui sont souvent ceux qui contribuent le plus dire","l":"✅ Légal — loi de finances + code du travail","k":["📊 Participation universelle : obligation étendue à toutes les entreprises >5 salariés rentables (vs 50 actuellement) — 3× plus de salariés couverts","📝 Accord-type participation PME : modèle national standardisé, 1 formulaire, zéro avocat requis — lever la barrière administrative pour les petites entreprises","💰 Intéressement renforcé : plafond d'exonération sociale relevé à 5 000€/an/salarié (vs 3 500€) — inciter les entreprises à aller plus loin","📅 Semaine de 4 jours : légale dès maintenant par accord collectif — l'État doit montrer l'exemple dans la fonction publique (expérimentation 50 services pilotes)","🏠 Télétravail codifié : droit minimal de 2 jours/semaine pour les postes compatibles, sauf accord collectif contraire — fin du flou juridique actuel"],"con":[{"q":"Cela va augmenter le coût du travail","r":"La mesure est conçue pour être neutre sur le coût total du travail — redistribution entre types de coûts, pas augmentation nette. L'effet sur l'emploi est positif selon les modélisations."},{"q":"Les syndicats refuseront","r":"Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On négocie en bonne foi et on avance."},{"q":"Ça ne marche pas en France","r":"L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fonctionne dans le contexte français."}]},{"id":28,"t":"Justice — peines planchers + réforme de la récidive","c":"Sécurité","e":"⚖️🔒","s":"sensible","a":"➕ +200 à +500 M€/an (surpopulation carcérale + construction prisons) — économie victimes : non chiffrable","sig":"plus","sit":"Peines planchers historique : instaurées en 2007 (Sarkozy), supprimées en 2014 (Taubira). 50% des sortants de prison récidivent dans les 5 ans. 72 000 détenus pour 61 000 places — surpopulation chronique. 2 nouvelles prisons haute sécurité ouvertes en 2025 (Vendin-le-Vieil, Condé-sur-Sarthe). Peines","sol":"Les récidivistes représentent 40% des personnes écrouées. Ils récidivent précisément parce qu'ils savent que la réponse pénale sera limitée. Les peines planchers ne ciblent pas les primo-délinquants — elles ciblent les récidivistes multiples qui ont prouvé par leurs actes répétés qu'ils ne tiennent","l":"✅ Légal — loi ordinaire pénale","k":["Peines planchers pour violences graves et récidive — avec motivation expresse du juge pour déroger","Bracelet électronique systématique à la sortie de prison (12 mois minimum) — suivi GPS obligatoire","Construction accélérée de 10 000 places de prison supplémentaires d'ici 2030","Programme réinsertion obligatoire : emploi garanti dans les 30 jours post-libération ou service civique rémunéré","Casier judiciaire : suppression automatique ralentie pour les récidivistes — les antécédents visibles plus longtemps"],"con":[{"q":"C'est une politique qui stigmatise les populations","r":"Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les stigmatiser — c'est leur rendre la liberté."},{"q":"La répression seule ne fonctionne pas","r":"Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est inefficace."},{"q":"Les droits fondamentaux seront bafoués","r":"Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes comparables."}]},{"id":29,"t":"Narcotrafic — guerre totale + suppression allocations parents de mineurs impliqués","c":"Sécurité","e":"🚫💊","s":"sensible","a":"➖➕ Investissement : +500 M€/an — recettes saisies avoirs : objectif ×5 (de 122 M€ à 600 M€/an)","sig":"mixte","sit":"Chiffres 2024 : 52 300 personnes mises en cause pour trafic (+7%), 110 morts, 367 assassinats/tentatives liés au narcotrafic. Saisies financières : 122 M€ = seulement 11% du trafic estimé. Loi narcotrafic du 13 juin 2025 : PNACO (parquet national), gel avoirs, repentis, nouveau délit de recrutement","sol":"Le narcotrafic est devenu une puissance économique concurrente de l'État dans certains quartiers. Il offre des revenus, une protection sociale informelle et un statut que l'État ne garantit plus. Le combattre efficacement nécessite d'attaquer l'argent (saisies) autant que les personnes. On saisit ac","l":"⚠️ Suppression allocations : constitutionnalité à vérifier — à conditionner strictement","k":["Renforcer massivement le PNACO : doubler les effectifs de magistrats spécialisés et de policiers antidrogue","Saisie systématique des avoirs : objectif 600 M€/an (vs 122 M€ en 2024) — utiliser les avoirs saisis pour financer la prévention","Suspension (pas suppression) des allocations familiales lors de condamnation d'un mineur pour trafic — rétablissement conditionné à un suivi parental prouvé","Centres de désintoxication : doubler les capacités (actuellement 2 ans d'attente en moyenne) — traiter la demande","Déploiement massif dans les quartiers : 1 référent de parcours par jeune signalé comme 'guetteur potentiel' — prévention précoce"],"con":[{"q":"C'est une politique qui stigmatise les populations","r":"Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les stigmatiser — c'est leur rendre la liberté."},{"q":"La répression seule ne fonctionne pas","r":"Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est inefficace."},{"q":"Les droits fondamentaux seront bafoués","r":"Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes comparables."}]},{"id":30,"t":"Cybersécurité nationale — souveraineté numérique et défense cyber","c":"Sécurité","e":"🛡️💻","s":"ambitieux","a":"➖ +500 M€ à +1 Md€/an — coût des cyberattaques évité : 2 à 5 Md€/an","sig":"moins","sit":"Les cyberattaques coûtent à la France estimativement 2 à 5 Md€/an (pertes entreprises + collectivités). Hôpitaux touchés : 10 cyberattaques majeures en 2024 (CHU Rouen, Versailles, Corbeil-Essonnes...). Budget ANSSI 2024 : ~250 M€ — très insuffisant. Objectif : tripler les moyens de l'ANSSI (+500 M€","sol":"En 2024, 10 hôpitaux français ont subi des cyberattaques majeures. Des patients ont vu leurs opérations reportées, leurs données volées. Un État-nation qui cible nos hôpitaux ne tire pas un seul missile — il paralyse le système de santé. L'ANSSI a 600 agents pour protéger 67 millions de Français. Le","l":"✅ Légal — renforcement ANSSI + lois pénales","k":["Tripler le budget ANSSI : de 250 M€ à 750 M€/an — en faire l'équivalent cyber de la DGSE","Cloud souverain obligatoire pour toutes les données de l'État, hôpitaux, collectivités — fin des contrats avec AWS/Azure/Google pour les données sensibles","Réserve cyber civile : 10 000 experts mobilisables sous 24h pour assister les victimes d'attaques","Audit sécurité obligatoire annuel pour toutes les collectivités >10 000 hab. et tous les hôpitaux","Peines cyber renforcées : cyberattaque sur hôpital/réseau eau/électricité = 20 ans ferme (vs 10 ans actuels)"],"con":[{"q":"C'est une politique qui stigmatise les populations","r":"Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les stigmatiser — c'est leur rendre la liberté."},{"q":"La répression seule ne fonctionne pas","r":"Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est inefficace."},{"q":"Les droits fondamentaux seront bafoués","r":"Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes comparables."}]},{"id":31,"t":"Transports en commun gratuits pour les enfants — les familles récupèrent ce qu'elles ont financé","c":"Pouvoir d'achat","e":"🚌👦","s":"ambitieux","a":"➕ −500 M€ à −800 M€/an de recettes tarifaires (compensées par État ou collectivités)","sig":"plus","sit":"Transports en commun en France : recettes tarifaires totales ~5,5 Md€/an (RATP + TER + autres réseaux). Part mineurs (< 18 ans) estimée 10 à 15% des usagers = 550 à 825 M€/an de recettes à compenser. Plusieurs villes pratiquent déjà la gratuité totale (Dunkerque, Montpellier partiel, Aubagne, Niort,","sol":"Un lycéen qui habite loin de son établissement ne doit pas voir ses choix d'études limités par le coût des transports. C'est une question d'égalité des chances, pas de générosité. Et pour les familles avec 2 ou 3 enfants scolarisés, la charge des abonnements peut représenter 600 à 900€/an — une somm","l":"✅ Légal — décision tarifaire État/collectivités/autorités organisatrices","k":["Gratuité universelle pour les moins de 12 ans : immédiate, compensée par l'État","Gratuité pour les 12-18 ans sur tous les réseaux urbains et TER : déploiement sur 2 ans","Compensation aux AOM : dotation d'État de 600 M€/an inscrite en loi de finances","Couplage avec plan ferroviaire : la gratuité n'a de sens que si les trains roulent","Carte numérique unique mineurs : une seule carte valable sur tous les réseaux France entière"],"con":[{"q":"Ces mesures ne profiteront qu'aux riches","r":"La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coûtant concerne les produits de base. Ce sont des mesures universelles à effet proportionnellement plus fort pour les ménages modeste"},{"q":"Cela va alimenter l'inflation","r":"Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop peu de biens — ici on augmente le pouvoir d'achat réel sans création monétaire."},{"q":"L'État ne peut pas intervenir sur les prix","r":"L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autres secteurs en défaillance de marché est légal et légitime."}]},{"id":32,"t":"Réinvestissement ferroviaire massif — sauvetage des petites lignes","c":"Pouvoir d'achat","e":"🚂","s":"urgent","a":"➖➕ +3 Md€/an d'investissement supplémentaire sur 10 ans — finançable par les recettes des péages récupérées en 2031","sig":"mixte","sit":"État du réseau : 1/6 du réseau ferré en fin de vie. 26% des lignes de desserte locale ont dépassé leur durée de vie. 3 600 km de voies fermées entre 2012 et 2020. Sans investissement : 1/3 du réseau disparaîtra d'ici 10 ans. Financement actuel des petites lignes : 2,7 Md€/an (État + régions) — insuf","sol":"La France a construit le meilleur réseau TGV d'Europe et le pire réseau ferroviaire régional. 3 600 km de lignes fermées depuis 30 ans. Les 20% de Français qui vivent loin des grandes métropoles n'ont souvent que la voiture. Or un train régional évite 40 000 km de voiture par an et par utilisateur.","l":"✅ Légal — contrats de plan État-Région + LPM ferroviaire","k":["Flécher les recettes péages 2031-2041 (3,5 Md€/an) vers SNCF Réseau — financement pérenne sans dette supplémentaire","Plan urgence petites lignes : 3 000 km de voies rénovées en 5 ans (priorité lignes de desserte fine du territoire)","Électrification complète du réseau d'ici 2035 : éliminer les trains diesel — économie 200 M€/an de carburant + réduction CO2","Moratoire sur les fermetures de lignes : aucune fermeture sans alternative de transport collectif équivalente","Réouverture de 500 km de lignes fermées entre 2012-2020 : étude d'impact économique préalable obligatoire"],"con":[{"q":"Ces mesures ne profiteront qu'aux riches","r":"La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coûtant concerne les produits de base. Ce sont des mesures universelles à effet proportionnellement plus fort pour les ménages modeste"},{"q":"Cela va alimenter l'inflation","r":"Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop peu de biens — ici on augmente le pouvoir d'achat réel sans création monétaire."},{"q":"L'État ne peut pas intervenir sur les prix","r":"L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autres secteurs en défaillance de marché est légal et légitime."}]},{"id":33,"t":"Revalorisation des salaires des AESH et accompagnants d'enfants en cours","c":"Éducation","e":"🤲📚","s":"urgent","a":"⚖️ +500 M€ à +1,2 Md€/an","sig":"neutre","sit":"132 000 AESH (Accompagnants des Élèves en Situation de Handicap) en France en 2024. Salaire moyen : 900 à 1 000€ net/mois (temps partiel imposé, souvent 24h/semaine). Smic est à ~1 426€ net — les AESH sont en dessous. 430 000 élèves en situation de handicap notifiés — mais seulement 132 000 AESH pou","sol":"132 000 AESH accompagnent 430 000 enfants handicapés. Sans eux, l'inclusion scolaire est un concept vide. Pourtant on les recrute à 1 100€ net/mois pour un temps partiel imposé. Résultat : turnover massif (40% partent dans les 3 ans), profils peu formés, enfants mal accompagnés. Revaloriser les AESH","l":"✅ Légal — budget Éducation nationale","k":["Temps complet obligatoire pour tous les AESH en poste : 35h/semaine rémunérées (fin du temps partiel imposé)","Salaire minimum AESH : 1 400€ net/mois (= Smic) — fin de la rémunération sous Smic","Création de 30 000 postes supplémentaires : combler le déficit d'accompagnement (430 000 élèves pour 132 000 AESH)","Formation initiale renforcée : de 60h à 200h — avec spécialisation TSA, déficience motrice, déficience visuelle","CDI systématique après 3 ans de service — fin de la précarité contractuelle"],"con":[{"q":"Les enseignants s'y opposeront","r":"Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'évaluation des résultats. C'est une position minoritaire."},{"q":"Les résultats ne seront visibles qu'en 10 ans","r":"Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commencer maintenant."},{"q":"Ce n'est pas une question de moyens mais de méthodes","r":"C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. On change les deux."}]},{"id":34,"t":"Sortie du commandement intégré OTAN + armées autonomes à 3% du PIB","c":"Défense","e":"🇫🇷⚔️","s":"ambitieux","a":"➖➕ Économie contribution OTAN : ~400 M€/an — réinvestissement armées : +3 à +8 Md€/an","sig":"mixte","sit":"La France a réintégré le commandement intégré OTAN en 2009 sous Sarkozy — rompant avec 43 ans de doctrine gaulliste. Conséquence : des officiers américains commandent des unités françaises. La France ne peut pas s'opposer à une opération OTAN même si elle contredit ses intérêts. De plus, des composants de nos systèmes d'armes sont soumis à l'ITAR américain — Washington peut bloquer leur utilisation.","sol":"Retour au modèle gaulliste de 1966 : maintien dans l'Alliance politique (article 5 préservé) mais sortie du commandement intégré. Nos officiers commandent nos soldats. Budget défense à 3% du PIB d'ici 2030. Construction d'une défense européenne autonome sur modèle franco-allemand. Fin des achats d'armement américain sujets à l'ITAR pour les fonctions critiques.","l":"✅ Légal — article 13 du Traité de l'Atlantique Nord","k":["Sortie de la structure de commandement intégré OTAN (modèle de Gaulle 1966) — maintien de l'alliance politique","Progression du budget défense à 3% du PIB d'ici 2030 : de 47 Md€ à ~85 Md€ — sur ressources nationales françaises","Priorité à l'industrie de défense française : Dassault, Naval Group, MBDA, Thales — objectif 0% d'achat d'armement américain pour les programmes souverains","Construction de la défense européenne autonome : accord de défense bilatéral renforcé avec Allemagne, Pologne, Italie, Espagne","Maintien et modernisation de la dissuasion nucléaire : budget dédié préservé en dehors des coupes budgétaires"],"con":[{"q":"Cela fragilise la sécurité collective","r":"La France indépendante avec 3% du PIB en défense est plus forte. L'Alliance politique article 5 est maintenue. Seul le commandement intégré change — comme de Gaulle de 1966 à 2009."},{"q":"C'est une position pro-russe","r":"De Gaulle a sorti la France du commandement intégré pendant la Guerre froide, face à l'URSS. La souveraineté militaire n'est pas un alignement géopolitique — c'est l'exercice de l'indépendance nationale."},{"q":"Le budget défense à 3% du PIB est impossible","r":"L'Allemagne est passée de 1,4% à 2,1% en 2 ans. La Pologne est à 4%. La France peut atteindre 3% avec une montée progressive sur 5 ans financée par les recettes nouvelles."}]},{"id":35,"t":"Arrêt de l'immigration clandestine — plan national + option sortie cadre UE","c":"Sécurité","e":"🛑🌍","s":"sensible","a":"➖➕ Investissement : +1 à +2 Md€/an — économies sociales et judiciaires estimées : +2 à +5 Md€/an","sig":"mixte","sit":"Chiffres 2024-2025 : 500 000 étrangers en situation irrégulière en France estimés (Sénat, juin 2025). 140 000 OQTF délivrées en 2024 pour seulement 21 600 exécutions = taux d'exécution 15%. 147 154 clandestins interpellés (+19%). Éloignements forcés en hausse de +21% en 2025 mais part des retours ve","sol":"140 000 obligations de quitter le territoire français (OQTF) ont été prononcées par des tribunaux administratifs. 85% ne sont pas exécutées. Une règle judiciaire non appliquée n'existe pas — elle envoie le signal que la loi française ne s'applique pas à tous. Ce n'est pas une question idéologique :","l":"✅ Légal dans le cadre Schengen — renforcé par le règlement UE 2024/1717","k":["🏗️ Tripler les places en CRA : de 1 800 à 5 400 places — sine qua non de toute politique d'expulsion efficace","📋 Simplification OQTF : supprimer les doublons procéduraux, un seul recours suspensif par décision d'éloignement — délai de jugement 15 jours maximum","🤝 Aide au développement conditionnelle : tout accord commercial ou aide financière avec un pays refusant les laissez-passer consulaires est suspendu — levier diplomatique direct","🛂 Contrôles frontières permanents : activer pleinement le Code Frontières Schengen pour maintenir les contrôles aux frontières terrestres et maritimes sans limitation de durée","📡 Surveillance technologique renforcée : drones, caméras IA, capteurs sismiques aux frontières sensibles — modèle frontière greco-turque"],"con":[{"q":"C'est une politique qui stigmatise les populations","r":"Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les stigmatiser — c'est leur rendre la liberté."},{"q":"La répression seule ne
