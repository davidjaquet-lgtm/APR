// Stockage local (remplace window.storage hors artifact)
if(!window.storage){
  window.storage={
    get:async(k)=>{const v=localStorage.getItem(k);return v?{key:k,value:v}:null;},
    set:async(k,val)=>{localStorage.setItem(k,val);return{key:k,value:val};},
    delete:async(k)=>{localStorage.removeItem(k);return{key:k,deleted:true};},
    list:async(p)=>{const keys=Object.keys(localStorage).filter(x=>!p||x.startsWith(p));return{keys};}
  };
}

const PROPS=[{id:1,t:`Réforme territoriale complète — compétences exclusives, financement aligné, coopération entre niveaux`,c:`Économie`,e:`🏛️🗺️💶`,s:`urgent`,a:`Économies : 5 à 10 Md€/an — Recettes nouvelles : +6 à 9 Md€/an pour les collectivités — Zé`,sit:`LA FRANCE : 5 NIVEAUX QUI SE MARCHENT DESSUS↵↵La France a 34 875 communes, 1 258 intercommunalités, 101 départements, 18 régions et l'État — 5 niveaux administratifs dont les compétences se chevauchent massivement. Exemp`,sol:`LA RÉFORME APR EN 3 VOLETS↵↵VOLET 1 — COMPÉTENCES EXCLUSIVES PAR NIVEAU (modèle Länder)↵Supprimer la clause de compétence générale. Chaque niveau a ses domaines exclusifs :↵↵🏘️ COMMUNES (services de proximité aux ménage`,l:`⚠️ Loi de décentralisation + loi de finances — Révision constitutionnelle partielle pour l`,k:[`Loi de décentralisation : supprimer la clause de compétence générale — chaque niveau a ses compétenc`,`COMMUNES : introduire la fraction IR local (5% de l'IR des résidents) + taxe numérique per capita — `,`DÉPARTEMENTS : remplacer progressivement les DMTO volatils par une fraction de CSG stable — aligner `,`RÉGIONS : créer la fraction IS régional (5% de l'IS des entreprises implantées) — récompenser les ré`],cal:[`J+30 : Circulaire aux préfets — cartographie exhaustive des doublons de compétences et de finan`,`Mois 3-6 : Loi de décentralisation présentée au Parlement — compétences exclusives, nouvelles r`,`An 1 : Fraction IR communale et IS régional opérationnels — premières recettes nouvelles pour l`,`An 2-3 : Montée en charge de la fraction CSG pour les départements — remplacement progressif de`],con:[{q:`C'est du fédéralisme — vous allez casser l'unité de la République`,r:`L'Allemagne est un État fédéral ET une démocratie unie et solidaire. La France ne devient pas fédérale — elle clarifie qui fait quoi. La République re`},{q:`La fraction IR communale va créer des inégalités entre communes riches et p`,r:`C'est pourquoi la péréquation horizontale est renforcée simultanément — les communes riches contribuent davantage au Fonds de Péréquation. En Allemagn`},{q:`Les élus locaux vont refuser de perdre leurs compétences`,r:`Ils ne perdent pas de compétences — ils en gagnent d'exclusives avec un financement correspondant. Ce que les maires veulent, c'est savoir exactement `}]},
{id:8,t:`Merit Order nucléaire — l'électricité française au prix du nucléaire`,c:`Énergie`,e:`⚛️💡`,s:`ambitieux`,a:`Gain net : −150 à −280€/an par foyer, −3 à −6 Md€/an pour l'industrie`,sit:`EDF produit 70% de l'électricité française à 60€/MWh grâce au nucléaire. Pourtant les Français paient au prix du gaz (120-200€/MWh) à cause du mécanisme dit 'merit order' — le prix européen est fixé par la centrale la pl`,sol:`Décorréler le prix de l'électricité française du prix du gaz en appliquant pleinement la réforme européenne du market design (adoptée 2024). Indexer le tarif réglementé sur le coût réel de production nucléaire (60€/MWh).`,l:`✅ Légal — directive européenne marché électricité adoptée 2024`,k:[`⚡ Indexer le tarif réglementé ménages sur le coût réel nucléaire (60€/MWh) — économie 150 à 280€/an `,`🏭 Prix garanti 5 ans pour les industriels — sécuriser les investissements de réindustrialisation`,`💰 Baisser la TICFE de 30% avec les gains de la réforme — amplifier l'effet facture`,`🇪🇺 Négocier à Bruxelles l'extension du modèle VNU à toute l'UE — souveraineté énergétique européen`],cal:[`J+1 : Décret d'indexation du tarif réglementé sur le coût CRE nucléaire`,`Mois 3 : Négociation avec EDF du nouveau contrat-cadre`,`An 1 : Baisse facture visible — 150€ minimum`,`An 2 : Extension aux industriels — prix garanti 5 ans`],con:[{q:`L'Europe ne vous laissera pas faire`,r:`La réforme du market design européen a été adoptée en 2024 et le VNU entre en vigueur en 2026. On applique et amplifie ce qui est déjà voté. Il faut j`},{q:`EDF aura moins de revenus pour les EPR2`,r:`Le contrat pour différence à 100€/MWh garanti à EDF sécurise son financement. EDF est compensée — les ménages paient moins. Les deux sont compatibles.`},{q:`Le prix baisse mais pas les factures à cause des taxes`,r:`La TICFE baisse de 30% en parallèle. Baisse du prix de marché ET baisse de taxe combinées = 150 à 280€/an d'économie réelle.`}]},
{id:9,t:`Hôpitaux — plan de sauvetage du système hospitalier`,c:`Santé`,e:`🏥🚨`,s:`urgent`,a:`+3 à 8 Md€/an — coût de l'inaction : urgences saturées, déserts médicaux, 74 400 lits perd`,sit:`L'hôpital public perd 30 000 soignants par an. 57 établissements en situation financière très dégradée. Les urgences traitent 21 millions de passages/an dont 60% pourraient être orientés ailleurs. La psychiatrie est sini`,sol:`Plan de sauvetage en 4 volets : revalorisation des soignants (+15-20%), réorganisation des urgences (filières courtes, 116 117 universel), plan psychiatrie d'urgence (300 unités de crise, remboursement 20 séances psy/an)`,l:`✅ Légal — ONDAM à rehausser en PLFSS`,k:[`💉 Rehausser l'ONDAM de 3 Md€/an dès 2026 — inverser les coupes`,`👨‍⚕️ 5 000 médecins territoriaux salariés à 6 000€ net dans les déserts médicaux`,`🧠 Plan psychiatrie +1 Md€/an — 18 mois d'attente → objectif 30 jours`,`🏗️ Plan investissement hospitalier 5 ans : rénover les 30% de bâtiments vétustes`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Le coût pour la Sécurité sociale est insoutenable`,r:`Le coût de l'inaction est supérieur : un passage aux urgences non justifié coûte 250€, une consultation préventive 30€. Le programme de prévention est`},{q:`Les professionnels de santé s'y opposeront`,r:`Les jeunes médecins et infirmières plébiscitent les nouvelles formes d'exercice. Les syndicats des anciens s'opposent à chaque réforme depuis 50 ans. `},{q:`La qualité des soins va baisser`,r:`La qualité est déjà dégradée par les déserts médicaux et la surcharge hospitalière. Un système avec 18 mois d'attente et des urgences saturées n'est p`}]},
{id:10,t:`Prison, travail et réinsertion — briser le cycle de la récidive`,c:`Sécurité`,e:`⚖️🔄`,s:`urgent`,a:`Investissement : +500 M€/an — économie récidive évitée : 2 à 4 Md€/an`,sit:`85 000 détenus pour 61 000 places — surpopulation de 38%. Coût journée détention : 128€. 50% récidivent dans les 5 ans. Seulement 31% travaillent. Modèle Pays-Bas : 70% actifs, récidive divisée par 2. 25 000 personnes so`,sol:`La prison française récidive à 50%. C'est l'indicateur le plus parlant d'un système qui ne fonctionne pas. Enfermer sans préparer la sortie, c'est produire de nouveaux criminels. Un programme de réinsertion coûte 30€/jou`,l:`✅ Légal — obligation d'activité (pas travail forcé) + code pénitentiaire`,k:[`⏰ Obligation d'activité dès le 1er mois : travail, formation ou service général`,`💰 Revalorisation travail en prison : rémunération minimum au SMIC horaire`,`📚 Formation qualifiante garantie : tout détenu sort avec un diplôme reconnu`,`💼 Emploi identifié 30 jours avant la libération — convention France Travail + entreprises`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est une politique qui stigmatise les populations`,r:`Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les `},{q:`La répression seule ne fonctionne pas`,r:`Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est ineffic`},{q:`Les droits fondamentaux seront bafoués`,r:`Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes compara`}]},
{id:11,t:`Panier 100 produits santé à prix coûtant — alimentation accessible pour tous`,c:`Pouvoir d'achat`,e:`🛒🥗`,s:`ambitieux`,a:`Coût État : 0€ — gain famille de 4 : −200 à −400€/an`,sit:`100 références du Programme National Nutrition Santé vendues au prix coûtant en grande distribution. La marge moyenne sur ces produits est de 25 à 35%. Mesure soutenue par 32 associations (UFC-Que Choisir, Familles Rural`,sol:`Les familles modestes dépensent proportionnellement 3 fois plus de leur revenu en alimentation que les familles aisées. Les produits ultra-transformés coûtent moins cher que les fruits et légumes frais — c'est une invers`,l:`✅ Légal — vendre au prix coûtant est légal (SRP interdit de vendre sous le coût d'achat)`,k:[`🥦 100 références PNNS au prix coûtant — fruits, légumes, légumineuses, produits laitiers, céréales `,`🧴 Panier hygiène de base inclus : savon, dentifrice, shampooing — 10 références supplémentaires`,`⚠️ Amende 5% du CA si non-répercuté en rayon — sanction dissuasive`,`🔄 Compensation : marges plus élevées autorisées sur les Nutri-Score D et E`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Ces mesures ne profiteront qu'aux riches`,r:`La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coût`},{q:`Cela va alimenter l'inflation`,r:`Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop `},{q:`L'État ne peut pas intervenir sur les prix`,r:`L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autre`}]},
{id:2,t:`Augmentation salaires enseignants + sélection renforcée + formation`,c:`Éducation`,e:`🎓`,s:`ambitieux`,a:`➖ DÉPENSE NETTE RÉVISÉE : +7 Md€/an (vs +8,9 Md€ sans la démographie) — la baisse de 1,7 m`,sit:`860 000 enseignants publics en France. +10% de salaire moyen = ~3,2 Md€. +20% = ~6,4 Md€. Formation initiale renforcée (2 ans post-master) : ~200–400 M€/an. Sélection renforcée : coût administratif marginal mais implique`,sol:`La corrélation entre niveau de salaire enseignant et résultats PISA est documentée par l'OCDE. La Finlande, numéro 1 mondial pendant 15 ans, est aussi le pays où les enseignants sont les plus respectés et les mieux payés`,l:`✅ Légal`,k:[`Créer un statut de 'professeur confirmé' avec prime de responsabilité`,`Revaloriser d'abord les débuts de carrière (-15 ans)`,`Lier la sélection à une formation rémunérée de qualité pour ne pas décourager les vocations`,`Gestion démographique intelligente : ne pas remplacer systématiquement les départs à la retraite dan`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Les enseignants s'y opposeront`,r:`Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'é`},{q:`Les résultats ne seront visibles qu'en 10 ans`,r:`Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commence`},{q:`Ce n'est pas une question de moyens mais de méthodes`,r:`C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. `}]},
{id:160,t:`Formation des enseignants — modèle finlandais : pratique terrain dès la 1ère année, alternance intégrale`,c:`Éducation`,e:`🎓🏫🇫🇮`,s:`urgent`,a:`+800 M€/an — ROI prouvé : la Finlande est passée de résultats moyens à n°1 mondial en 20 a`,sit:`LA FORMATION DES ENSEIGNANTS FRANÇAIS : UN PARADOXE COÛTEUX↵↵CONTEXTE DÉMOGRAPHIQUE : La DEPP (avril 2026) projette −1,7 million d'élèves en 2035 (−14,2%). Cette baisse démographique offre une opportunité historique : re`,sol:`RÉFORME EN 5 VOLETS — MÊME DURÉE, STRUCTURE RADICALEMENT DIFFÉRENTE↵↵La solution APR n'est PAS d'ajouter 2 ans. C'est de restructurer les 5 ans existants avec pratique terrain dès le départ — comme en Finlande.↵↵VOLET 1 `,l:`✅ Légal — réforme par décret des maquettes MEEF + arrêté formation continue`,k:[`Restructurer la maquette MEEF : pratique terrain dès la L3 (8 semaines min/an) — sans allonger la du`,`Tutorat certifié et rémunéré : prime +200€/mois pour tout tuteur de stagiaire — formation obligatoir`,`Neurosciences de l'apprentissage obligatoires en M1 : lecture, mémorisation, gestion des troubles dy`,`Formation continue ×5 : de 22,7 M€ à 110 M€/an — 100€/enseignant/an minimum, intégrée dans l'avancem`],cal:[`J+30 : Arrêté modifiant les maquettes MEEF — introduction des 8 semaines terrain dès L3`,`An 1 : Première promotion formée avec le nouveau programme L3-M1 renforcé sur la pratique`,`An 2 : Généralisation du tutorat certifié — prime +200€/mois active pour 20 000 tuteurs`,`An 3 : Formation continue portée à 110 M€/an — programme national de mise à niveau neuroscience`],con:[{q:`La France forme déjà en 5 ans — vous ne faites rien de nouveau`,r:`5 ans avec 2 à 6 semaines de stage en M1 et mi-temps en M2, c'est 5 ans de formation théorique. La Finlande forme en 5 ans avec pratique intégrée dès `},{q:`Les enseignants ne veulent pas être filmés ni évalués`,r:`La caméra en classe est un outil de formation réflexive — pas de contrôle. Le stagiaire se filme lui-même, analyse sa pratique avec son tuteur, identi`},{q:`On manque de tuteurs qualifiés pour encadrer tous les stagiaires`,r:`Exactement — c'est pourquoi la prime de tutorat (+200€/mois) et la formation obligatoire (60h) créent une vraie mission valorisée et non une corvée. A`}]},
{id:3,t:`Crèches — meilleur encadrement + revalorisation des salaires`,c:`Éducation`,e:`👶`,s:`urgent`,a:`+2 à 4 Md€/an`,sit:`Deux problèmes liés : (1) Encadrement insuffisant — 1 professionnel pour 8 enfants (vs 1 pour 4 recommandé par les pédiatres). (2) Salaires indignes — 1 500€ net/mois pour un travail épuisant et qualifié. Ces deux problè`,sol:`Les modes d'accueil de la petite enfance déterminent à 80% les trajectoires éducatives futures. Un enfant qui n'a pas accès à une crèche de qualité à 2 ans accumule un retard cognitif qui se paie pendant 20 ans. Le ratio`,l:`✅ Légal — loi de finances + convention collective nationale`,k:[`👩‍👧 Ratio 1 professionnel pour 4 enfants (vs 1 pour 8 actuellement) — objectif sur 3 ans`,`💰 Salaire minimum 1 600€ net (revalorisation +25%) — CCN nationale contraignante`,`🎓 Plan formation accéléré CAP AEPE : 50 000 nouveaux professionnels en 3 ans`,`🏠 Crèche garantie dès 2 mois pour tout enfant dont les 2 parents travaillent — fin des listes d'att`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Les enseignants s'y opposeront`,r:`Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'é`},{q:`Les résultats ne seront visibles qu'en 10 ans`,r:`Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commence`},{q:`Ce n'est pas une question de moyens mais de méthodes`,r:`C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. `}]},
{id:5,t:`Réforme fiscale de l'alimentation — TVA bio à 0% et taxe sur les produits néfastes`,c:`Santé`,e:`🥦🍔`,s:`ambitieux`,a:`Gain net : +1 à 2 Md€/an (TVA produits néfastes compense TVA bio)`,sit:`Double levier : (1) TVA à 0% sur tous les produits biologiques — le bio est inaccessible pour les ménages modestes (15 à 30% plus cher que le conventionnel). (2) Hausse de TVA sur les produits Nutri-Score D et E (ultra-t`,sol:`L'obésité infantile est une bombe à retardement sanitaire et économique. Elle naît dans l'assiette, pas dans la salle de sport. La TVA à 5,5% sur le bio et à 20% sur les ultra-transformés crée un signal-prix qui oriente `,l:`✅ Légal — directive TVA européenne + loi de finances`,k:[`🥦 TVA 0% sur tous les produits biologiques certifiés`,`📈 Hausse TVA sur Nutri-Score D et E : +5 points (de 5,5% à 10,5%)`,`🏷️ Nutri-Score obligatoire sur tous les produits alimentaires — loi nationale`,`🌿 Exonération artisans et producteurs <500 000€ de CA`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Le coût pour la Sécurité sociale est insoutenable`,r:`Le coût de l'inaction est supérieur : un passage aux urgences non justifié coûte 250€, une consultation préventive 30€. Le programme de prévention est`},{q:`Les professionnels de santé s'y opposeront`,r:`Les jeunes médecins et infirmières plébiscitent les nouvelles formes d'exercice. Les syndicats des anciens s'opposent à chaque réforme depuis 50 ans. `},{q:`La qualité des soins va baisser`,r:`La qualité est déjà dégradée par les déserts médicaux et la surcharge hospitalière. Un système avec 18 mois d'attente et des urgences saturées n'est p`}]},
{id:7,t:`Renforcement de la laïcité`,c:`République`,e:`⚖️`,s:`sensible`,a:`50–200 M€ (selon périmètre)`,sit:`Coûts principaux : renforcement des effectifs de contrôle (DILCRAH, inspections académiques) +30–50 M€, formation des agents publics +20–40 M€, missions éducatives renforcées (heures laïcité EN) +50–100 M€, contentieux j`,sol:`La laïcité est le contrat de neutralité qui permet à toutes les croyances de coexister dans l'espace public. Elle n'est pas une attaque contre les religions — elle les protège mutuellement. La radicalisation identitaire `,l:`⚠️ Périmètre à préciser`,k:[`Renforcer l'application des lois existantes avant d'en créer de nouvelles`,`Créer un observatoire indépendant de la laïcité avec bilan annuel`,`Former massivement les fonctionnaires au principe de neutralité (30h obligatoires)`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est populiste`,r:`Rendre les comptes publics transparents, permettre aux citoyens de s'exprimer directement sur les grandes questions — c'est de la démocratie, pas du p`},{q:`Ça va créer de l'instabilité`,r:`La Suisse pratique le RIC depuis 1891 et est la démocratie la plus stable et la plus compétitive du monde. L'instabilité ne vient pas de la démocratie`},{q:`Les citoyens ne sont pas compétents pour voter sur des sujets complexes`,r:`Les citoyens suisses votent régulièrement sur des sujets complexes (énergie, fiscalité, immigration) avec des résultats souvent plus sages que les déc`}]},
{id:12,t:`Réduction des postes administratifs — redéploiement vers soignants et policiers`,c:`Emploi`,e:`🔄`,s:`ambitieux`,a:`Économie nette : +1 à +3 Md€/an + 10 000 à 30 000 postes opérationnels créés`,sit:`La FP compte 5,75 M d'agents. Masse salariale publique totale : 245 Md€ en 2024. Coût moyen d'un ETP entrant : ~31 000€/an (État), 28 000€ (territorial), 34 000€ (hospitalier). 1 000 suppressions de postes admin = ~31 M€`,sol:`La fonction publique française a un problème de répartition, pas de taille globale. On manque de soignants, de policiers de terrain, d'enseignants qualifiés. On a en revanche une inflation de postes de coordination, de c`,l:`✅ Légal — via schémas d'emploi annuels`,k:[`S'appuyer sur les 800 000 départs en retraite d'ici 2030 : non-remplacement ciblé uniquement sur les`,`Créer une 'bourse de mobilité' interne : un administratif peut se reconvertir en soignant ou policie`,`Exclure du périmètre les enseignants, soignants, forces de l'ordre, agents de terrain (cibles = dire`,`Publier un ratio 'postes opérationnels / postes administratifs' par ministère — transparence et pres`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Cela va augmenter le coût du travail`,r:`La mesure est conçue pour être neutre sur le coût total du travail — redistribution entre types de coûts, pas augmentation nette. L'effet sur l'emploi`},{q:`Les syndicats refuseront`,r:`Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On`},{q:`Ça ne marche pas en France`,r:`L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fon`}]},
{id:13,t:`Suppression du droit du sol`,c:`Sécurité`,e:`🇫🇷`,s:`sensible`,a:`Coût État quasi nul — impact sociétal majeur`,sit:`La mesure est réglementaire/législative : pas de coût budgétaire direct. Coûts indirects : gestion administrative accrue des statuts de résidence (+50–100 M€/an estimés), contentieux juridiques (+20–50 M€/an), coût socia`,sol:`La nationalité française doit traduire un ancrage réel dans la société française, pas un accident géographique. Conditionner le droit du sol à 5 ans de résidence légale des parents n'est pas discriminatoire — c'est deman`,l:`🚨 Révision constitutionnelle probable + risque CEDH`,k:[`Option 1 — sans révision constitutionnelle : allonger la résidence requise à 8 ans (au lieu de 5) et`,`Option 2 — avec révision constitutionnelle : passage au droit du sang pur avec naturalisation condit`,`Traiter Mayotte séparément — le cas est déjà spécifique et juridiquement distinct du régime métropol`,`Attention : la mesure ne réduit pas l'immigration irrégulière (facteurs économiques et géopolitiques`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est une politique qui stigmatise les populations`,r:`Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les `},{q:`La répression seule ne fonctionne pas`,r:`Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est ineffic`},{q:`Les droits fondamentaux seront bafoués`,r:`Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes compara`}]},
{id:14,t:`Zéro prestation pour les clandestins — aides réservées aux réguliers depuis 5 ans`,c:`Sécurité`,e:`🚫💶`,s:`sensible`,a:`Économie estimée : 1 à 2,5 Md€/an — avec un point dur sur l'AME`,sit:`État actuel des aides accessibles aux clandestins : AME (Aide Médicale d'État) : 1,2 Md€/an pour ~466 000 bénéficiaires (2023). Hébergement d'urgence : ~2 Md€/an (toute population précaire, part clandestins difficile à i`,sol:`L'Aide Médicale d'État coûte 1,1 Md€ et couvre les soins de toute personne en situation irrégulière. La France est la seule grande démocratie européenne à offrir une couverture aussi large. L'AMU (soins vitaux uniquement`,l:`🚨 Suppression totale AME : obstacle CEDH — remplacement par Aide Médicale d'Urgence possi`,k:[`AME → AMU : urgences vitales, maternité, maladies contagieuses uniquement — économie ~600–800 M€/an,`,`Condition 5 ans étendue à toutes les prestations pour étrangers réguliers (RSA déjà à 5 ans — aligne`,`Supprimer l'hébergement d'urgence pour les étrangers en situation irrégulière non demandeurs d'asile`,`Maintien obligatoire des soins pour mineurs et femmes enceintes quelle que soit la situation adminis`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est une politique qui stigmatise les populations`,r:`Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les `},{q:`La répression seule ne fonctionne pas`,r:`Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est ineffic`},{q:`Les droits fondamentaux seront bafoués`,r:`Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes compara`}]},
{id:15,t:`Réduction du train de vie de l'État — sans impact sur les services publics`,c:`Économie`,e:`✂️🏛️`,s:`ambitieux`,a:`Économie estimée : 800 M€ à 2 Md€/an — signal politique fort, 89% des Français y sont favo`,sit:`Poste par poste : Élysée : budget 115 M€/an dont frais représentation passés de 9,87 M€ (2021) à 21 M€ (2023) — objectif −30% = −35 M€/an. Assemblée nationale : 622 M€/an — réduction 10% = −62 M€. Sénat : ~340 M€/an — ré`,sol:`La crédibilité d'un programme de réduction des dépenses publiques commence par l'exemple. Comment demander aux Français de se serrer la ceinture si les ministres partent en jets privés et que les budgets de communication`,l:`✅ Légal — décrets + lois de finances`,k:[`Gel immédiat des budgets Élysée, Assemblée, Sénat en valeur réelle (déjà amorcé en 2025 — accélérer `,`Supprimer les jets privés pour tous déplacements inférieurs à 3h de vol — visioconférence ou transpo`,`Revaloriser les logements de fonction à leur valeur locative réelle — avantage en nature correctemen`,`Réduire le parc automobile de l'État de 20% — électrification totale du reste d'ici 2027`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Le coût est trop élevé pour les finances publiques`,r:`Cette mesure (Économie estimée : 800 M€ à 2 Md€/an) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde `},{q:`Cela va créer de l'inflation`,r:`La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le c`},{q:`Ce n'est pas le rôle de l'État`,r:`L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger.`}]},
{id:16,t:`Retraite à 60 ans — sans décote pour les carrières longues et métiers pénibles, décote réduite pour les autres`,c:`Retraites`,e:`👴⚖️`,s:`ambitieux`,a:`➖ DÉPENSE NOUVELLE : −5 Md€/an — financé par l'excédent global APR (+17,6 Md€ An 1) — équi`,sit:`LA RÉFORME MACRON : 10% DU PROBLÈME RÉSOLU POUR 100% DE LA FRACTURE SOCIALE↵↵Le déficit du système de retraites est de 5 Md€/an en 2025, projeté à 15 Md€ en 2035. La réforme Macron (passage à 64 ans) génère seulement 1,5`,sol:`OPTION C — TROIS NIVEAUX DE DÉPART↵↵(1) CARRIÈRES LONGUES + MÉTIERS PÉNIBLES → 60 ans SANS DÉCOTE↵Entrée avant 20 ans avec 44 trimestres cotisés. Pension pleine. C'est la justice due à ceux qui ont donné leur vie physiqu`,l:`✅ Légal — loi ordinaire modifiant le code de la Sécurité sociale + décret sur la liste C2P`,k:[`Carrières longues (entrée avant 20 ans, 44 trimestres) : départ à 60 ans SANS décote — justice pour `,`Option volontaire à 60 ans avec décote 3%/an (12% sur 4 ans) — choix individuel couvert collectiveme`,`CSG progressive sur revenus du capital > 100 000€ : taux 36% à 45% au-dessus du seuil — +1,5 Md€/an `,`Index seniors obligatoire avec sanctions pour entreprises qui discriminent les 55+ — objectif 65% de`],cal:[`J+30 : Décret ouvrant la retraite à 60 ans pour les carrières longues (44 trimestres) — applica`,`Mois 6 : Loi CSG progressive sur revenus du capital > 100 000€ — +1,5 Md€/an fléchés vers la CN`,`An 1 : Index seniors obligatoire avec sanctions — objectif 60% taux d'emploi 55-64 ans fin An 1`,`An 2 : Option volontaire 60 ans avec décote généralisée — bilan intermédiaire du coût réel vs p`],con:[{q:`La retraite à 60 ans coûte 27 milliards — c'est un gouffre`,r:`27 milliards c'est le coût sans décote ni sélection. Avec notre décote de 3%/an et un taux d'adhésion réaliste de 50%, le coût tombe à 5 milliards. C'`},{q:`Vos 6 leviers ne couvrent pas le coût dès la première année`,r:`C'est exact — et on le dit honnêtement. En An 1, nos leviers génèrent 1,8 milliard pour un coût de 5 milliards. Déficit net de 3,2 milliards pendant l`},{q:`C'est irresponsable de creuser le déficit des retraites`,r:`Le déficit supplémentaire de 3,2 Md€/an pendant 4 ans est couvert par l'excédent global du programme APR qui génère +17,6 Md€ dès An 1. La retraite à `}]},
{id:19,t:`Plan national de réserves d'eau — stockage hivernal et réduction des fuites`,c:`Agriculture`,e:`💧`,s:`urgent`,a:`2 à 4 Md€/an d'investissement sur 10 ans — coût sécheresse évité : 3 à 5 Md€/an`,sit:`Contexte : 9 sécheresses majeures depuis 2018. Coût économique : 3 à 5 Md€/an. Nappes phréatiques en baisse dans 60% des territoires. Fuites réseaux eau potable : 20% de l'eau produite perdue avant d'arriver au robinet =`,sol:`La France perd 20% de son eau potable dans des réseaux vieillissants avant qu'elle n'arrive au robinet. Parler de sécheresse structurelle sans d'abord réparer les fuites, c'est déboucher le bain sans fermer le robinet. C`,l:`✅ Légal — approche écologiquement différenciée selon type d'ouvrage`,k:[`🔧 PRIORITÉ 1 : réparation des fuites réseaux = 20% d'eau potable économisée sans construire quoi qu`,`🏔️ Retenues collinaires de ruissellement hivernal : 1 000/an sur 10 ans — alimentation naturelle, i`,`♻️ REUT (réutilisation eaux usées traitées) : objectif 5% d'ici 2030 (vs 1% aujourd'hui) — irrigatio`,`🏛️ Réhabilitation des barrages et retenues existants : augmenter la capacité de stockage sans nouve`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Les prix planchers vont renchérir l'alimentation`,r:`Ils empêchent la vente à perte. Un agriculteur qui vend à perte ferme — et l'importation déloyale remplace. Le prix légèrement plus élevé d'une viande`},{q:`La clause miroir va provoquer des guerres commerciales`,r:`La clause miroir impose aux importations de respecter nos normes. Ce n'est pas du protectionnisme — c'est de l'équité. On ne peut pas interdire aux ag`},{q:`Les jeunes agriculteurs ne veulent plus s'installer`,r:`Le revenu agricole sous le SMIC est le premier facteur de non-installation. Prix planchers + installation 10 000 jeunes/an + foncier protégé résolvent`}]},
{id:18,t:`Nationalisation des sociétés concessionnaires d'autoroutes`,c:`Énergie`,e:`🛣️`,s:`ambitieux`,a:`Gain récurrent après rachat : +3,5 à +4,5 Md€/an. Coût de rachat : 45–50 Md€ one-shot (ou `,sit:`Situation actuelle : 7 sociétés concessionnaires (Vinci/ASF, Eiffage/APRR, Sanef/Macquarie...). CA cumulé 2023 : 39,3 Md€. Bénéfices : +4 Md€/an. L'État perçoit déjà 40% des recettes péages via taxes (TVA 20% + taxe d'am`,sol:`Les autoroutes françaises ont été construites avec l'argent des contribuables puis données en concession à des entreprises privées qui ont multiplié les dividendes depuis 20 ans. Les concessions expirent entre 2031 et 20`,l:`✅ Légal — article 38 des contrats de concession prévoit le rachat anticipé`,k:[`Stratégie optimale : NE PAS racheter maintenant — attendre 2031–2036 pour récupération gratuite`,`Action immédiate : taxe sur surprofits concessionnaires (bénéfices > 8% de rentabilité) = +500 M€–1 `,`Gel des hausses de péages au niveau de l'inflation jusqu'à fin des concessions`,`Dès 2031 : péage réduit de 30 à 40% (couvre uniquement entretien) — économie directe pour 40 million`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est trop coûteux et trop long`,r:`Le nucléaire est l'investissement le plus rentable sur 60 ans de durée de vie. Chaque EPR2 produit de l'électricité pendant 60 ans à 70€/MWh — sans ca`},{q:`L'éolien et le solaire sont moins chers`,r:`Moins chers à construire, mais intermittents. Sans le nucléaire pour produire quand il ne fait pas vent ou soleil, il faut des centrales à gaz en back`},{q:`Les déchets nucléaires sont insolubles`,r:`Cigéo (enfouissement géologique profond) est en cours d'autorisation. La France maîtrise le retraitement des combustibles usés — 96% sont recyclés par`}]},
{id:20,t:`Plan de réinvestissement massif dans les DOM-TOM — rattrapage d'infrastructures`,c:`Outre-mer`,e:`🌴`,s:`urgent`,a:`+1,5 à 3 Md€/an d'investissement supplémentaire sur 10 ans`,sit:`2,8 millions d'Ultramarins sont des citoyens français à part entière mais vivent dans des territoires avec des décennies de retard infrastructurel. Budget actuel Outre-mer : ~2,7 Md€/an (mission outre-mer). Le fonds exce`,sol:`Les Outre-mer ne coûtent pas à la France — ils la font. Sans eux, pas de présence dans l'Atlantique, le Pacifique, l'Indianocéan. Pas de 2e ZEE mondiale. Pas de base pour la projection de force militaire. Pas d'accès à 4`,l:`✅ Légal — contrats de convergence et de transformation (CCT)`,k:[`💧 Eau potable et assainissement : financement des 1,7 Md€ de besoins identifiés — programme priorit`,`🏗️ Renforcer les équipes d'ingénierie locale dans chaque collectivité — débloquer les fonds europée`,`🏥 Hôpitaux et déserts médicaux ultramarins : plan d'urgence santé spécifique (Guyane, Mayotte, Mart`,`🏠 Logement : objectif 10 000 logements sociaux/an dans les DOM (vs 4 000 actuellement) — foncier dé`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est trop coûteux pour la métropole`,r:`Les Outre-mer donnent à la France la 2e zone économique exclusive mondiale. Sans eux, la France n'est pas une puissance mondiale. L'investissement est`},{q:`Les problèmes de l'Outre-mer sont structurels et insolubles`,r:`La Guadeloupe sans eau courante n'est pas une fatalité — c'est un déficit d'investissement. L'eau potable universelle en Guadeloupe coûte 800 M€ d'inv`},{q:`Les collectivités locales doivent gérer elles-mêmes`,r:`Les collectivités ultramarines n'ont pas les moyens fiscaux pour des investissements de cette ampleur. Un financement national pour les infrastructure`}]},
{id:21,t:`Mayotte — sécurisation, reconstruction et refondation complète`,c:`Outre-mer`,e:`🏝️🔒`,s:`urgent`,a:`4 Md€ programmés 2025-2031 — à amplifier et accélérer (+1 Md€/an supplémentaire)`,sit:`Situation d'urgence absolue : cyclone Chido (14 déc. 2024) + tempête Dikeledi (janv. 2025) ont détruit 90% des infrastructures. 338 000 habitants. PIB à 50-60% public — territoire sous perfusion. Chômage estimé près de 5`,sol:`Mayotte cumule les crises : cyclone Chido (décembre 2024), pression migratoire hors norme, pauvreté structurelle, insécurité. Mais Mayotte donne aussi à la France une présence dans le canal du Mozambique, stratégiquement`,l:`✅ Cadre légal posé — loi refondation août 2025 + nouveau statut Département-Région`,k:[`🔨 Reconstruction anti-cyclone : TOUTES les nouvelles constructions en dur, aux normes parasismiques`,`🏥 2e hôpital à Combani + extension CHM : priorité absolue — Mayotte avait 1 hôpital pour 320 000 pe`,`🏫 Écoles : 100% des salles de classe reconstruites en dur d'ici 2027 — scolarité obligatoire effect`,`⚓ Base navale en eau profonde : capacité d'interception renforcée — radars et vedettes supplémentair`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est trop coûteux pour la métropole`,r:`Les Outre-mer donnent à la France la 2e zone économique exclusive mondiale. Sans eux, la France n'est pas une puissance mondiale. L'investissement est`},{q:`Les problèmes de l'Outre-mer sont structurels et insolubles`,r:`La Guadeloupe sans eau courante n'est pas une fatalité — c'est un déficit d'investissement. L'eau potable universelle en Guadeloupe coûte 800 M€ d'inv`},{q:`Les collectivités locales doivent gérer elles-mêmes`,r:`Les collectivités ultramarines n'ont pas les moyens fiscaux pour des investissements {id:71,t:`Nouvelle-Calédonie — pacte de refondation économique et avenir institutionnel`,c:`Outre-mer`,e:`🏝️🤝`,s:`urgent`,a:`+500 M€ à 1 Md€/an d'effort supplémentaire — sur 5 ans — pour stabiliser et relancer`,sit:`Crise sans précédent : le PIB calédonien a chuté de 15% en 2024 — pire recul depuis 1962. Les émeutes de mai 2024 ont détruit des centaines d'entreprises. Le chômage est passé de 2 400 à 5 500 personnes en janvier 2025. `,sol:`Cette mesure (Nouvelle-Calédonie) répond à une défaillance documentée. Crise sans précédent : le PIB calédonien a chuté de 15% en 2024 — pire recul depuis 1962. Les émeutes de mai 2024 ont détruit des centaines d'entrepr`,l:`✅ Accord de Bougival (12 juillet 2025) — cadre institutionnel posé`,k:[`🤝 Respecter et financer pleinement l'accord de Bougival (juil. 2025) : souveraineté partagée, évolu`,`🏗️ Amplifier le pacte de refondation : de 200 M€ à 500 M€/an sur 5 ans — désenclavement, eau, élect`,`⚡ Urgence nickel : plan de soutien à la filière (fermeture de l'usine du Nord en 2024) — formation r`,`🌊 Diversification économique : tourisme (la Calédonie est parmi les plus belles destinations du Pac`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est trop coûteux pour la métropole`,r:`Les Outre-mer donnent à la France la 2e zone économique exclusive mondiale. Sans eux, la France n'est pas une puissance mondiale. L'investissement est`},{q:`Les problèmes de l'Outre-mer sont structurels et insolubles`,r:`La Guadeloupe sans eau courante n'est pas une fatalité — c'est un déficit d'investissement. L'eau potable universelle en Guadeloupe coûte 800 M€ d'inv`},{q:`Les collectivités locales doivent gérer elles-mêmes`,r:`Les collectivités ultramarines n'ont pas les moyens fiscaux pour des investissements de cette ampleur. Un financement national pour les infrastructure`}]},
{id:22,t:`Réduction d'impôt sur l'immobilier conditionnée à la rénovation énergétique`,c:`Pouvoir d'achat`,e:`🏠⚡`,s:`ambitieux`,a:`Coût fiscal : −2 à −4 Md€/an — retour économique : 8 à 15 Md€/an (filière bâtiment + énerg`,sit:`Contexte : 5,2 millions de passoires thermiques en France (logements F ou G). Coût moyen rénovation globale : 25 000–50 000€/logement. 10% interdits à la location depuis janv. 2025 (classe G), 20% en 2028 (classe F). Out`,sol:`5,2 millions de passoires thermiques chauffent l'air extérieur en hiver. Leurs occupants paient 2 000€ de chauffage de plus par an que dans un logement bien isolé. MaPrimeRénov' existe mais 80% des éligibles ne la demand`,l:`✅ Légal — loi de finances + arrêté TVA`,k:[`TVA 5,5% sur tous les travaux de rénovation énergétique (vs 10% actuel) — gain immédiat pour 2 milli`,`Réduction d'impôt 30% plafonnée à 15 000€/an pour passage de ≥2 classes DPE — simple, lisible, effic`,`Exonération taxe foncière 50% pendant 5 ans pour les bailleurs rénovant leur bien loué — lever le fr`,`Simplification radicale de MaPrimeRénov' : une seule aide, versée en amont, sans avance de trésoreri`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Ces mesures ne profiteront qu'aux riches`,r:`La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coût`},{q:`Cela va alimenter l'inflation`,r:`Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop `},{q:`L'État ne peut pas intervenir sur les prix`,r:`L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autre`}]},
{id:23,t:`Encadrement des loyers : maintien ciblé zones tendues — suppression ailleurs`,c:`Pouvoir d'achat`,e:`🏘️`,s:`sensible`,a:`Impact locataires zones tendues : −984€/an (Paris) — impact offre locative : +5 à +10% de `,sit:`⚠️ Point critique : les données montrent que la suppression totale est contre-productive. À Paris : économie moyenne de 984€/an par locataire. À Lille, Lyon, Bordeaux, Montpellier : baisse de 4,4% des loyers. Mais 28% de`,sol:`Dans un marché immobilier en tension, le libre marché produit un résultat documenté : les loyers augmentent jusqu'à ce que les ménages modestes soient expulsés vers la périphérie. Cela crée une ville à deux vitesses, dét`,l:`✅ Légal — loi ordinaire + choix de périmètre d'application`,k:[`Maintien encadrement : UNIQUEMENT Paris, petite couronne IDF, Lyon, Lille, Bordeaux, Montpellier (zo`,`Suppression dans toutes les villes moyennes et petites — relancer l'investissement locatif hors métr`,`Renforcer les contrôles dans les zones maintenues : 28% de non-conformité actuelle = besoin de sanct`,`Taxer fortement les logements vacants dans les zones tendues (taxe sur logements vacants TLV — multi`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Ces mesures ne profiteront qu'aux riches`,r:`La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coût`},{q:`Cela va alimenter l'inflation`,r:`Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop `},{q:`L'État ne peut pas intervenir sur les prix`,r:`L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autre`}]},
{id:24,t:`Campus universitaires complets financés par les entreprises avec défiscalisation`,c:`Éducation`,e:`🎓🏗️`,s:`ambitieux`,a:`Coût fiscal État : −500 M€ à −1,5 Md€/an — investissement privé levé : 3 à 8 Md€/an`,sit:`Contexte : parc universitaire français vieillissant, 150 Md€ de retard d'entretien estimé, budgets gelés. Financement privé actuel de la recherche publique : seulement 5,2% (très faible vs Allemagne 15%, UK 12%). Modèle `,sol:`Les universités françaises forment 80% des étudiants avec 12 460€/étudiant/an. Les grandes écoles forment 5% des étudiants avec 35 000€/étudiant/an. Ce différentiel crée une fracture éducative qui se retrouve ensuite dan`,l:`✅ Légal — crédit d'impôt recherche élargi + PPP universitaire`,k:[`Crédit d'impôt 60% pour tout investissement >10 M€ dans un campus universitaire public sous conventi`,`Gouvernance 100% académique maintenue : zéro droit de regard de l'entreprise sur les enseignements, `,`Campus complet obligatoire : bâtiments pédagogiques + labo + logements étudiants + RU + sport — pas `,`Priorité aux villes moyennes sans université complète : Valenciennes, Châteauroux, Rodez, Aurillac..`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Les enseignants s'y opposeront`,r:`Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'é`},{q:`Les résultats ne seront visibles qu'en 10 ans`,r:`Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commence`},{q:`Ce n'est pas une question de moyens mais de méthodes`,r:`C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. `}]},
{id:25,t:`Durcissement de l'assurance chômage — incitation au retour à l'emploi`,c:`Emploi`,e:`💼`,s:`ambitieux`,a:`Économie estimée : +1 à +3 Md€/an sur le régime — financement du plein emploi`,sit:`Budget assurance chômage 2024 : ~40 Md€/an de prestations versées. 3,6 millions d'allocataires. Durée maximale actuelle : 18 mois (<55 ans), 22,5 mois (55-56 ans) depuis le 1er avril 2025. Condition d'ouverture : 6 mois `,sol:`Le chômage en France dure en moyenne 17 mois — le double de la moyenne OCDE. Cette durée n'est pas causée par une générosité excessive : elle est causée par un accompagnement insuffisant. Le modèle APR s'inspire du Danem`,l:`✅ Légal — convention Unédic ou décret de carence`,k:[`Condition d'ouverture : 8 mois sur 24 (vs 6) — alignement sur la moyenne européenne`,`Carence rupture conventionnelle : 3 mois minimum (vs 1 mois) — limiter les accords de complaisance`,`Obligation d'activité dès le 4e mois : formation, bénévolat certifié, service civique — indemnisatio`,`Dégressivité renforcée pour les hauts salaires (>4 900€ bruts/mois) : −25% dès le 5e mois`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Cela va augmenter le coût du travail`,r:`La mesure est conçue pour être neutre sur le coût total du travail — redistribution entre types de coûts, pas augmentation nette. L'effet sur l'emploi`},{q:`Les syndicats refuseront`,r:`Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On`},{q:`Ça ne marche pas en France`,r:`L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fon`}]},
{id:26,t:`Lutte massive contre la fraude fiscale — objectif 25 à 30 Md€/an récupérés`,c:`Économie`,e:`🔍💰`,s:`urgent`,a:`Investissement : 800 M€/an — recettes supplémentaires : +12 à +18 Md€/an (objectif 25-30 M`,sit:`La France perd 80 Md€/an à la fraude fiscale selon les estimations OCDE. Elle en récupère 13 Md€ (16%). L'Allemagne récupère 33 Md€/an avec des outils comparables. Écart expliqué : 30 000 agents DGFiP en France (0,45 pou`,sol:`Tripler les moyens de détection : +8 000 agents DGFiP sur 3 ans, facturation électronique B2B obligatoire (adoptée en 2026), IA de détection fiscale (modèle HMRC britannique : +3 Md€ dès la 1ère année), automatisation de`,l:`✅ Légal — rapport Cour des comptes déc. 2025 appuie toutes les mesures`,k:[`📏 Estimation annuelle obligatoire de l'écart fiscal publiée — France seul grand pays OCDE sans cett`,`+8 000 agents DGFiP dédiés au contrôle (147 ajoutés en 2025 — dérisoire) — ROI : 1€ investi = 15 à 2`,`🏢 Prix de transfert multinationales : objectif 15-20 Md€ notifiés/an (vs 5,2 Md€ en 2024) — ×3 en 3`,`💻 Facturation électronique obligatoire dès janvier 2026 (vs 2027) — ferme 6 à 10 Md€ de fraude TVA `],cal:[`J+1 : Recrutement de 8 000 agents DGFiP sur 3 ans lancé`,`Mois 3 : Facturation électronique obligatoire pour toutes entreprises`,`An 1 : Objectif 16 Md€ récupérés (vs 13 Md€)`,`An 2 : IA de détection opérationnelle — modèle HMRC britannique`],con:[{q:`80 Md€ de fraude c'est fantaisiste`,r:`Methodology OCDE. La France est le seul grand pays sans estimation officielle — choix politique de ne pas mesurer. L'Allemagne estime son Tax Gap à 10`},{q:`Les fraudeurs délocalisent si on les poursuit`,r:`Les cibles sont la TVA e-commerce (impossible à délocaliser — les clients sont en France), les prix de transfert (présents en France pour vendre), et `},{q:`Vous allez fiscaliser les petits entrepreneurs`,r:`Les cibles sont les multinationales et les grandes fortunes offshore. Le droit à l'erreur (prop 63) protège les artisans qui font des erreurs de bonne`}]},
{id:27,t:`Flexibilité des salariés + participation universelle aux bénéfices`,c:`Emploi`,e:`🤝📈`,s:`ambitieux`,a:`Coût fiscal : −500 M€ à −1,5 Md€/an — gain productivité estimé : +2 à +5% PIB à terme`,sit:`Contexte participation : seulement 3 millions de salariés bénéficient d'intéressement ou participation en 2022 sur 26 millions de salariés — soit 11,5%. Montant moyen : 1 702€/salarié/an. Participation obligatoire actuel`,sol:`La participation aux bénéfices existe en France depuis de Gaulle (1967) — elle n'est simplement pas assez généralisée. Seulement 35% des salariés en bénéficient réellement. Étendre aux entreprises de +10 salariés, c'est `,l:`✅ Légal — loi de finances + code du travail`,k:[`📊 Participation universelle : obligation étendue à toutes les entreprises >5 salariés rentables (vs`,`📝 Accord-type participation PME : modèle national standardisé, 1 formulaire, zéro avocat requis — l`,`💰 Intéressement renforcé : plafond d'exonération sociale relevé à 5 000€/an/salarié (vs 3 500€) — i`,`📅 Semaine de 4 jours : légale dès maintenant par accord collectif — l'État doit montrer l'exemple d`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Cela va augmenter le coût du travail`,r:`La mesure est conçue pour être neutre sur le coût total du travail — redistribution entre types de coûts, pas augmentation nette. L'effet sur l'emploi`},{q:`Les syndicats refuseront`,r:`Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On`},{q:`Ça ne marche pas en France`,r:`L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fon`}]},
{id:28,t:`Justice — peines planchers + réforme de la récidive`,c:`Sécurité`,e:`⚖️🔒`,s:`sensible`,a:`+200 à +500 M€/an (surpopulation carcérale + construction prisons) — économie victimes : n`,sit:`Peines planchers historique : instaurées en 2007 (Sarkozy), supprimées en 2014 (Taubira). 50% des sortants de prison récidivent dans les 5 ans. 72 000 détenus pour 61 000 places — surpopulation chronique. 2 nouvelles pri`,sol:`Les récidivistes représentent 40% des personnes écrouées. Ils récidivent précisément parce qu'ils savent que la réponse pénale sera limitée. Les peines planchers ne ciblent pas les primo-délinquants — elles ciblent les r`,l:`✅ Légal — loi ordinaire pénale`,k:[`Peines planchers pour violences graves et récidive — avec motivation expresse du juge pour déroger`,`Bracelet électronique systématique à la sortie de prison (12 mois minimum) — suivi GPS obligatoire`,`Construction accélérée de 10 000 places de prison supplémentaires d'ici 2030`,`Programme réinsertion obligatoire : emploi garanti dans les 30 jours post-libération ou service civi`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est une politique qui stigmatise les populations`,r:`Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les `},{q:`La répression seule ne fonctionne pas`,r:`Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est ineffic`},{q:`Les droits fondamentaux seront bafoués`,r:`Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes compara`}]},

pleinement. Chaque mesure a des précédents dans des démocraties européennes compara`}]},
{id:30,t:`Cybersécurité nationale — souveraineté numérique et défense cyber`,c:`Sécurité`,e:`🛡️💻`,s:`ambitieux`,a:`+500 M€ à +1 Md€/an — coût des cyberattaques évité : 2 à 5 Md€/an`,sit:`Les cyberattaques coûtent à la France estimativement 2 à 5 Md€/an (pertes entreprises + collectivités). Hôpitaux touchés : 10 cyberattaques majeures en 2024 (CHU Rouen, Versailles, Corbeil-Essonnes...). Budget ANSSI 2024`,sol:`En 2024, 10 hôpitaux français ont subi des cyberattaques majeures. Des patients ont vu leurs opérations reportées, leurs données volées. Un État-nation qui cible nos hôpitaux ne tire pas un seul missile — il paralyse le `,l:`✅ Légal — renforcement ANSSI + lois pénales`,k:[`Tripler le budget ANSSI : de 250 M€ à 750 M€/an — en faire l'équivalent cyber de la DGSE`,`Cloud souverain obligatoire pour toutes les données de l'État, hôpitaux, collectivités — fin des con`,`Réserve cyber civile : 10 000 experts mobilisables sous 24h pour assister les victimes d'attaques`,`Audit sécurité obligatoire annuel pour toutes les collectivités >10 000 hab. et tous les hôpitaux`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est une politique qui stigmatise les populations`,r:`Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les `},{q:`La répression seule ne fonctionne pas`,r:`Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est ineffic`},{q:`Les droits fondamentaux seront bafoués`,r:`Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes compara`}]},
{id:31,t:`Transports en commun gratuits pour les enfants — les familles récupèrent ce qu'elles ont financé`,c:`Pouvoir d'achat`,e:`🚌👦`,s:`ambitieux`,a:`−500 M€ à −800 M€/an de recettes tarifaires (compensées par État ou collectivités)`,sit:`Transports en commun en France : recettes tarifaires totales ~5,5 Md€/an (RATP + TER + autres réseaux). Part mineurs (< 18 ans) estimée 10 à 15% des usagers = 550 à 825 M€/an de recettes à compenser. Plusieurs villes pra`,sol:`Un lycéen qui habite loin de son établissement ne doit pas voir ses choix d'études limités par le coût des transports. C'est une question d'égalité des chances, pas de générosité. Et pour les familles avec 2 ou 3 enfants`,l:`✅ Légal — décision tarifaire État/collectivités/autorités organisatrices`,k:[`Gratuité universelle pour les moins de 12 ans : immédiate, compensée par l'État`,`Gratuité pour les 12-18 ans sur tous les réseaux urbains et TER : déploiement sur 2 ans`,`Compensation aux AOM : dotation d'État de 600 M€/an inscrite en loi de finances`,`Couplage avec plan ferroviaire : la gratuité n'a de sens que si les trains roulent`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Ces mesures ne profiteront qu'aux riches`,r:`La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coût`},{q:`Cela va alimenter l'inflation`,r:`Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop `},{q:`L'État ne peut pas intervenir sur les prix`,r:`L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autre`}]},
{id:32,t:`Réinvestissement ferroviaire massif — sauvetage des petites lignes`,c:`Pouvoir d'achat`,e:`🚂`,s:`urgent`,a:`+3 Md€/an d'investissement supplémentaire sur 10 ans — finançable par les recettes des péa`,sit:`État du réseau : 1/6 du réseau ferré en fin de vie. 26% des lignes de desserte locale ont dépassé leur durée de vie. 3 600 km de voies fermées entre 2012 et 2020. Sans investissement : 1/3 du réseau disparaîtra d'ici 10 `,sol:`La France a construit le meilleur réseau TGV d'Europe et le pire réseau ferroviaire régional. 3 600 km de lignes fermées depuis 30 ans. Les 20% de Français qui vivent loin des grandes métropoles n'ont souvent que la voit`,l:`✅ Légal — contrats de plan État-Région + LPM ferroviaire`,k:[`Flécher les recettes péages 2031-2041 (3,5 Md€/an) vers SNCF Réseau — financement pérenne sans dette`,`Plan urgence petites lignes : 3 000 km de voies rénovées en 5 ans (priorité lignes de desserte fine `,`Électrification complète du réseau d'ici 2035 : éliminer les trains diesel — économie 200 M€/an de c`,`Moratoire sur les fermetures de lignes : aucune fermeture sans alternative de transport collectif éq`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Ces mesures ne profiteront qu'aux riches`,r:`La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coût`},{q:`Cela va alimenter l'inflation`,r:`Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop `},{q:`L'État ne peut pas intervenir sur les prix`,r:`L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autre`}]},
{id:33,t:`Revalorisation des salaires des AESH et accompagnants d'enfants en cours`,c:`Éducation`,e:`🤲📚`,s:`urgent`,a:`+500 M€ à +1,2 Md€/an`,sit:`132 000 AESH (Accompagnants des Élèves en Situation de Handicap) en France en 2024. Salaire moyen : 900 à 1 000€ net/mois (temps partiel imposé, souvent 24h/semaine). Smic est à ~1 426€ net — les AESH sont en dessous. 43`,sol:`132 000 AESH accompagnent 430 000 enfants handicapés. Sans eux, l'inclusion scolaire est un concept vide. Pourtant on les recrute à 1 100€ net/mois pour un temps partiel imposé. Résultat : turnover massif (40% partent da`,l:`✅ Légal — budget Éducation nationale`,k:[`Temps complet obligatoire pour tous les AESH en poste : 35h/semaine rémunérées (fin du temps partiel`,`Salaire minimum AESH : 1 400€ net/mois (= Smic) — fin de la rémunération sous Smic`,`Création de 30 000 postes supplémentaires : combler le déficit d'accompagnement (430 000 élèves pour`,`Formation initiale renforcée : de 60h à 200h — avec spécialisation TSA, déficience motrice, déficien`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Les enseignants s'y opposeront`,r:`Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'é`},{q:`Les résultats ne seront visibles qu'en 10 ans`,r:`Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commence`},{q:`Ce n'est pas une question de moyens mais de méthodes`,r:`C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. `}]},
{id:34,t:`Sortie du commandement intégré OTAN + armées autonomes à 3% du PIB`,c:`Défense`,e:`🇫🇷⚔️`,s:`ambitieux`,a:`Économie contribution OTAN : ~400 M€/an — réinvestissement armées : +3 à +8 Md€/an`,sit:`La France a réintégré le commandement intégré OTAN en 2009 sous Sarkozy — rompant avec 43 ans de doctrine gaulliste. Conséquence : des officiers américains commandent des unités françaises. La France ne peut pas s'oppose`,sol:`Retour au modèle gaulliste de 1966 : maintien dans l'Alliance politique (article 5 préservé) mais sortie du commandement intégré. Nos officiers commandent nos soldats. Budget défense à 3% du PIB d'ici 2030. Construction `,l:`✅ Légal — article 13 du Traité de l'Atlantique Nord`,k:[`Sortie de la structure de commandement intégré OTAN (modèle de Gaulle 1966) — maintien de l'alliance`,`Progression du budget défense à 3% du PIB d'ici 2030 : de 47 Md€ à ~85 Md€ — sur ressources national`,`Priorité à l'industrie de défense française : Dassault, Naval Group, MBDA, Thales — objectif 0% d'ac`,`Construction de la défense européenne autonome : accord de défense bilatéral renforcé avec Allemagne`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Cela fragilise la sécurité collective`,r:`La France indépendante avec 3% du PIB en défense est plus forte. L'Alliance politique article 5 est maintenue. Seul le commandement intégré change — c`},{q:`C'est une position pro-russe`,r:`De Gaulle a sorti la France du commandement intégré pendant la Guerre froide, face à l'URSS. La souveraineté militaire n'est pas un alignement géopoli`},{q:`Le budget défense à 3% du PIB est impossible`,r:`L'Allemagne est passée de 1,4% à 2,1% en 2 ans. La Pologne est à 4%. La France peut atteindre 3% avec une montée progressive sur 5 ans financée par le`}]},
{id:35,t:`Arrêt de l'immigration clandestine — plan national + option sortie cadre UE`,c:`Sécurité`,e:`🛑🌍`,s:`sensible`,a:`Investissement : +1 à +2 Md€/an — économies sociales et judiciaires estimées : +2 à +5 Md€`,sit:`Chiffres 2024-2025 : 500 000 étrangers en situation irrégulière en France estimés (Sénat, juin 2025). 140 000 OQTF délivrées en 2024 pour seulement 21 600 exécutions = taux d'exécution 15%. 147 154 clandestins interpellé`,sol:`140 000 obligations de quitter le territoire français (OQTF) ont été prononcées par des tribunaux administratifs. 85% ne sont pas exécutées. Une règle judiciaire non appliquée n'existe pas — elle envoie le signal que la `,l:`✅ Légal dans le cadre Schengen — renforcé par le règlement UE 2024/1717`,k:[`🏗️ Tripler les places en CRA : de 1 800 à 5 400 places — sine qua non de toute politique d'expulsio`,`📋 Simplification OQTF : supprimer les doublons procéduraux, un seul recours suspensif par décision `,`🤝 Aide au développement conditionnelle : tout accord commercial ou aide financière avec un pays ref`,`🛂 Contrôles frontières permanents : activer pleinement le Code Frontières Schengen pour maintenir l`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est une politique qui stigmatise les populations`,r:`Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les `},{q:`La répression seule ne fonctionne pas`,r:`Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est ineffic`},{q:`Les droits fondamentaux seront bafoués`,r:`Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes compara`}]},
{id:36,t:`Frontières solides — +3 000 PAF, 200 drones, 50 vedettes, biométrie — dans le cadre Schengen`,c:`Sécurité`,e:`🛂🚁`,s:`ambitieux`,a:`+800 M€ à +1,5 Md€/an — solution opérationnelle sans sortir de Schengen`,sit:`La France maintient des contrôles aux frontières depuis novembre 2015 — validés par le Conseil d'État en mars 2025 sous le règlement Schengen réformé de juin 2024. Le problème est 100% opérationnel : les contrôles existe`,sol:`La France a réintroduit les contrôles aux frontières en 2015 suite aux attentats. Elle dispose légalement de la clause de sauvegarde Schengen. Mais sans les moyens humains et technologiques correspondants, ces contrôles `,l:`✅ Légal — dans le cadre Schengen actuel, sans en sortir`,k:[`🚔 +3 000 agents PAF supplémentaires — déployés en priorité sur les 5 points chauds (Vintimille, Pyr`,`🛩️ 200 drones de surveillance longue endurance — couverture 24h/24 des zones de passage irrégulier,`,`⛵ +50 vedettes maritimes PAF/douanes — renforcement Méditerranée (Vintimille, PACA), Manche (Calais,`,`📡 Capteurs sismiques et caméras IA sur les 500 km de frontières terrestres sensibles — détection au`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est une politique qui stigmatise les populations`,r:`Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les `},{q:`La répression seule ne fonctionne pas`,r:`Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est ineffic`},{q:`Les droits fondamentaux seront bafoués`,r:`Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents {id:169,t:`Immigration par les compétences — modèle australien et néo-zélandais adapté à la France`,c:`Sécurité`,e:`🌏🎯🇦🇺`,s:`ambitieux`,a:`Immigration utile : +50 000 travailleurs qualifiés/an ciblés — réduction immigration subie`,sit:`LA FRANCE CHOISIT PEU ET INTÈGRE MAL↵↵La France accueille chaque année environ 320 000 immigrants légaux (hors UE). La répartition est révélatrice du problème : 30% pour le travail, 35% pour le regroupement familial, 20%`,sol:`LE MODÈLE COMBINÉ AUSTRALIE + NOUVELLE-ZÉLANDE ADAPTÉ↵↵VOLET 1 — SYSTÈME DE POINTS À LA FRANÇAISE (modèle australien Subclass 189)↵L'Australie sélectionne ses migrants permanents par un système de points sur 100 critères`,l:`✅ Légal — loi ordinaire sur l'immigration + révision des critères d'admission`,k:[`Créer le système de points français (65 points minimum sur 100) — transparent, publié, mis à jour ch`,`Green List française : résidence permanente directe en 6 mois pour les 50 métiers les plus en tensio`,`Quota annuel voté au Parlement : 110 000 visas permanents/an répartis par catégorie (50 000 travail `,`Visa travail conditionné à l'emploi actif — perd sa validité après 6 mois de chômage sans formation `],cal:[`J+30 : Loi cadre immigration par les compétences présentée au Parlement — nouveau critère de sé`,`Mois 6 : Système de points opérationnel sur le portail France Visas — premier traitement des do`,`An 1 : Green List française publiée — premiers 5 000 talents recrutés directement via la voie a`,`An 2 : Premier bilan du quota annuel devant le Parlement — ajustements sectoriels selon les bes`],con:[{q:`C'est du tri ethnique déguisé — vous choisissez les immigrés selon leur ori`,r:`Le système de points est strictement ethniquement neutre — il ne contient aucun critère d'origine nationale ou ethnique. Un médecin sénégalais qui par`},{q:`Vous allez casser le regroupement familial — c'est un droit fondamental`,r:`Le regroupement familial reste intact dans le quota (30 000 visas/an). Les conjoints et enfants des résidents légaux de plus de 5 ans peuvent rejoindr`},{q:`L'Australie a eu des problèmes avec son système — pourquoi le copier ?`,r:`L'Australie a eu des problèmes de VOLUME — trop de migrants temporaires (étudiants, saisonniers) qui restent et créent une pression sur le logement. L`}]},
{id:37,t:`Plan démographique retraites — 6 leviers pour sauver la répartition`,c:`Retraites`,e:`👶📈🧓`,s:`urgent`,a:`➖ Investissement : 3 à 5 Md€/an vers le FRR — recettes : +1,8 Md€ An 1 → +6 Md€ An 5 → +10`,sit:`LE SYSTÈME DE RÉPARTITION EN DANGER — DIAGNOSTIC PAR LEVIER↵↵Déficit actuel : 5 Md€/an. Déficit projeté 2035 : 15 Md€/an. La réforme Macron traite le problème avec un seul levier (âge légal) pour 1,5 Md€/an d'économies. `,sol:`LES 6 LEVIERS EN DÉTAIL — CHIFFRÉS ET DATÉS↵↵LEVIER 1 — CSG PROGRESSIVE SUR LES REVENUS DU CAPITAL (An 1 : +1,5 Md€)↵Flat tax uniforme actuelle à 31,4% quelle que soit la taille du revenu. APR applique la progressivité a`,l:`✅ Légal — PLF + PLFSS + loi organique pour la règle d or`,k:[`CSG progressive > 100 000€ de revenus du capital : loi votée en Mois 6 — +1,5 Md€/an fléchés vers la`,`Index seniors obligatoire avec sanction réelle : 1% de la masse salariale pour les entreprises > 50 `,`FRR réarmé : 15% des recettes de fraude fiscale récupérée fléchés vers le FRR — objectif 40 Md€ en 1`,`Réindustrialisation : les leviers économiques (permis 6 mois, fonds régionaux, commandes publiques 5`],cal:[`An 1 : CSG progressive opérationnelle — +1,5 Md€/an vers la CNAV. Index seniors avec sanctions.`,`An 2-3 : Emploi seniors monte en charge — objectif 60% taux d'emploi 55-64 ans. Recettes : +2 M`,`An 5 : Équilibre propre retraite à 60 ans atteint — 6 Md€ de recettes leviers vs 5 Md€ de coût.`,`An 7 : Réindustrialisation génère +3 Md€/an de cotisations. Excédent sur la retraite à 60 ans d`],con:[{q:`Vos leviers ne compensent pas immédiatement le coût de la retraite à 60 ans`,r:`Exact — et on le dit. En An 1 : +1,8 Md€ de recettes pour −5 Md€ de coût. Déficit net de 3,2 Md€ pendant 4 ans, couvert par l'excédent global du progr`},{q:`La natalité et le FRR ne servent à rien sur le quinquennat`,r:`C'est honnêtement vrai pour le quinquennat. Mais un programme de gouvernement sérieux doit penser à 20 ans, pas seulement à 5. Le FRR génère ses effet`},{q:`L'emploi des seniors est une belle intention mais les entreprises ne jouent`,r:`Sans sanction, c'est une belle intention. Avec sanction réelle (1% de la masse salariale pour les entreprises qui ne maintiennent pas leurs seniors), `}]},
{id:38,t:`Réduction du déficit public — trajectoire crédible vers 3% du PIB`,c:`Économie`,e:`📉💶`,s:`urgent`,a:`Objectif : réduire le déficit de 152 Md€ (2025) à <70 Md€ (3% PIB) en 5 ans — effort de 80`,sit:`Situation : déficit 2025 = 152,5 Md€ soit 5,1% du PIB. Dette = 3 416 Md€ = 115,6% du PIB. Charges d'intérêts : déjà >60 Md€/an, cap vers 100 Md€/an d'ici 2029 si rien n'est fait (Cour des comptes). Objectif du programme `,sol:`La France a un déficit structurel depuis 1975 — 50 ans de gouvernements qui promettent financé par la dette et laissent la facture aux suivants. Résultat : 3 300 Md€ de dette, 55 Md€ d'intérêts par an (plus que le budget`,l:`✅ Légal — engagement européen (Pacte de stabilité) + loi de programmation des finances pub`,k:[`📋 Règle d'or constitutionnelle : inscrire dans la Constitution l'obligation de réduire le déficit d`,`🔍 Fraude fiscale : +5 à 15 Md€/an (déjà dans le programme) — levier le plus rentable, sans toucher `,`⚡ Merit order nucléaire : +7 à 13 Md€/an de gain économique (déjà dans le programme) — réduit la dép`,`✂️ Niches fiscales inefficaces : +5 à 15 Md€/an (déjà dans le programme) — supprimer les avantages f`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`Le coût est trop élevé pour les finances publiques`,r:`Cette mesure (Objectif : réduire le déficit de 152 Md€ (2025) à <70 Md€ (3% PIB) en 5 ans) est financée par les recettes nouvelles : fraude fiscale +1`},{q:`Cela va créer de l'inflation`,r:`La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le c`},{q:`Ce n'est pas le rôle de l'État`,r:`L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger.`}]},
{id:39,t:`Plan national de patriotisme et cohésion — hommage aux serviteurs de la France`,c:`République`,e:`🇫🇷🏅`,s:`ambitieux`,a:`Coût quasi nul — impact symbolique et unificateur maximal`,sit:`Mesure de cohésion nationale sans coût budgétaire significatif. Budget estimé : 2 à 5 M€/an (organisation cérémonies, production vidéos, logistique stades). La France dépense des centaines de millions pour des spectacles`,sol:`Le patriotisme n'est pas du nationalisme. C'est un lien civique et affectif avec une communauté nationale. Ce lien s'érode quand les institutions ne valorisent plus ceux qui servent le collectif. La France honore les gra`,l:`✅ Légal — initiative gouvernementale, aucun texte requis`,k:[`🏟️ Avant chaque match équipe de France : hommage de 2 min sur grand écran à un Français qui a servi`,`🎖️ Catégories représentées : militaires blessés en OPEX, pompiers, soignants, enseignants, agricult`,`📺 Diffusion nationale obligatoire sur les chaînes qui retransmettent le match — 10-20 millions de t`,`🏫 Programme 'Héros de la République' dans les écoles : 1 heure/an dédiée à des témoignages de Franç`],cal:[`J+30 : Mesures d'urgence par décret — application immédiate des éléments sans loi`,`Mois 3-6 : Loi d'application présentée au Parlement`,`An 1 : Mise en oeuvre opérationnelle — premiers résultats mesurables`,`An 2-3 : Bilan intermédiaire — ajustements selon les données terrain`],con:[{q:`C'est populiste`,r:`Rendre les comptes publics transparents, permettre aux citoyens de s'exprimer directement sur les grandes questions — c'est de la démocratie, pas du p`},{q:`Ça va créer de l'instabilité`,r:`La Suisse pratique le RIC depuis 1891 et est la démocratie la plus stable et la plus compétitive du monde. L'instabilité ne vient pas de la démocratie`},{q:`Les citoyens ne sont pas compétents pour voter sur des sujets complexes`,r:`Les citoyens suisses votent régulièrement sur des sujets complexes (énergie, fiscalité, immigration) avec des résultats souvent plus sages que les déc`}]},
