,"l":"✅ Légal — loi ordinaire modifiant le code pénal et le code de la route","k":["Amendes routières proportionnelles au revenu pour les contraventions > 300€ — barème sur le revenu fiscal de référence","Plancher maintenu : minimum 50€ quelle que soit la situation","Plafond fixé : maximum 100 000€ — pas de sanction disproportionnée","Application progressive : d'abord infractions routières graves (alcool, vitesse excessive), puis extension","Déclaration sur l'honneur du revenu — fausse déclaration = amende doublée"],"con":[{"q":"C'est une justice à deux vitesses","r":"C'est l'inverse : les amendes fixes sont une justice à deux vitesses où le riche paie une misère et le pauvre saigne. Les amendes proportionnelles créent une égalité réelle devant la loi."},{"q":"Ça va surcharger les tribunaux","r":"Le barème est automatique et calculé sur le revenu fiscal déclaré. Zéro décision judiciaire supplémentaire — juste un calcul basé sur les données fiscales existantes."},{"q":"Les gens vont sous-déclarer leurs revenus","r":"Fausse déclaration = amende doublée + signalement fiscal automatique. Le risque est dissuasif. Et le revenu fiscal de référence (RFR) est déjà dans la base DGFiP — pas de déclaration supplémentaire nécessaire."}]},{"id":149,"t":"Budget du bien-être — indicateurs au-delà du PIB, modèle Nouvelle-Zélande","c":"République","e":"🇳🇿🌿📊","s":"ambitieux","a":"⚖️ Coût quasi nul — changement de boussole budgétaire, pas de dépense nouvelle","sig":"neutre","sit":"Nouvelle-Zélande (2019) : premier pays à orienter son budget sur 12 indicateurs de bien-être (santé mentale, logement, environnement, inégalités, sécurité) plutôt que sur le seul PIB. Chaque dépense doit prouver son impact sur le bien-être réel. Suivi par l'Écosse, le Pays de Galles, l'Islande. L'OC","sol":"Cette mesure (Budget du bien-être) répond à une défaillance documentée. Nouvelle-Zélande (2019) : premier pays à orienter son budget sur 12 indicateurs de bien-être (santé mentale, logement, environnement, inégalités, sécu. L'impact estimé est Coût quasi nul — changement de boussole budgétaire, pas","l":"✅ Légal — décret sur le cadre budgétaire + rapport annuel obligatoire","k":["Tableau de bord national de 15 indicateurs : espérance de vie en bonne santé, logement, sécurité, confiance institutionnelle, qualité de l'air, inégalités, bien-être mental","Rapport annuel 'État du bien-être des Français' présenté au Parlement avant le PLF","Chaque ministère fixe 3 objectifs de bien-être mesurables par an — avec résultats publiés","Commission indépendante du bien-être — comme la Cour des comptes mais pour mesurer ce qui compte vraiment","Indicateur de bien-être inclus dans les critères de notation des politiques publiques"],"con":[{"q":"C'est populiste","r":"Rendre les comptes publics transparents, permettre aux citoyens de s'exprimer directement sur les grandes questions — c'est de la démocratie, pas du populisme. Le populisme c'est promettre sans compter. Nous chiffrons tout."},{"q":"Ça va créer de l'instabilité","r":"La Suisse pratique le RIC depuis 1891 et est la démocratie la plus stable et la plus compétitive du monde. L'instabilité ne vient pas de la démocratie directe — elle vient des promesses sans contrepartie."},{"q":"Les citoyens ne sont pas compétents pour voter sur des sujets complexes","r":"Les citoyens suisses votent régulièrement sur des sujets complexes (énergie, fiscalité, immigration) avec des résultats souvent plus sages que les décisions parlementaires. Et les sujets techniques sont exclus du RIC — seules les grandes orientations sont soumises."}]},{"id":150,"t":"Semaine de 4 jours généralisée — le modèle islandais pour toute l'économie","c":"Emploi","e":"🇮🇸📅","s":"ambitieux","a":"➕ Économie sur absentéisme : −25% = 3 à 5 Md€/an pour la Sécurité sociale","sig":"plus","sit":"Islande 2015-2019 : 85% de la population active sur semaine de 4 jours (mêmes heures, mêmes salaires). Résultats : productivité maintenue ou améliorée dans 100% des cas. Absentéisme −25%. Stress −30%. Suivi UK (100% des entreprises pilotes convaincues), Microsoft Japon (+40% productivité), Belgique","sol":"Cette mesure (Semaine de 4 jours généralisée) répond à une défaillance documentée. Islande 2015-2019 : 85% de la population active sur semaine de 4 jours (mêmes heures, mêmes salaires). Résultats : productivité maintenue ou améliorée. L'impact estimé est Économie sur absentéisme : −25% = 3 à 5 Md€/a","l":"✅ Légal — accord de branche + expérimentation nationale volontaire","k":["Expérimentation nationale 3 ans : 100 entreprises volontaires de toutes tailles, tous secteurs — avec évaluation scientifique par le CEE (Centre d'Études de l'Emploi)","Accord de branche facilité : les branches qui souhaitent passer aux 4 jours obtiennent un allègement de cotisations de 1% pendant 3 ans — incitation financière","Dérogation légale simplifiée : aujourd'hui passer aux 4 jours nécessite un accord d'entreprise complexe — le simplifier par décret","Formation des managers à l'organisation en 4 jours — financement via le CPF","Bilan public à 3 ans avec décision de généralisation ou non — pragmatisme avant idéologie"],"con":[{"q":"Cela va augmenter le coût du travail","r":"La mesure est conçue pour être neutre sur le coût total du travail — redistribution entre types de coûts, pas augmentation nette. L'effet sur l'emploi est positif selon les modélisations."},{"q":"Les syndicats refuseront","r":"Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On négocie en bonne foi et on avance."},{"q":"Ça ne marche pas en France","r":"L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fonctionne dans le contexte français."}]},{"id":151,"t":"Méritocratie scolaire transparente — modèle coréen sans la pression destructrice","c":"Éducation","e":"🇰🇷🎓","s":"ambitieux","a":"➕ Coût faible — réforme de l'orientation, gain : meilleure adéquation formation/emploi","sig":"plus","sit":"Corée du Sud : un examen national unique (Suneung) transparent et méritocratique. PISA 2022 : 3e mondial en maths, 7e en sciences. Taux de diplomation : 70%. Mais : crise de santé mentale des adolescents coréens (1er taux de suicide des 15-29 ans de l'OCDE). La France adopte la méritocratie coréenne","sol":"Cette mesure (Méritocratie scolaire transparente) répond à une défaillance documentée. Corée du Sud : un examen national unique (Suneung) transparent et méritocratique. PISA 2022 : 3e mondial en maths, 7e en sciences. Taux de diplomation. L'impact estimé est Coût faible — réforme de l'orientation, g","l":"✅ Légal — réforme de Parcoursup + valorisation des voies professionnelles","k":["Parcoursup réformé : critères d'admission publics et détaillés pour chaque formation — fin de la boîte noire algorithmique","Voies professionnelle et technologique valorisées : les BTS et BUT présentés avant les licences générales dans les salons d'orientation — fin du préjugé hiérarchique","Psychologue scolaire dans chaque lycée : accompagnement de l'orientation sans pression de performance — leçon inverse de la Corée","Droit à la réorientation sans pénalité : changer de filière en 1re année sans perdre ses droits — réduire l'anxiété du choix définitif","Classement PISA comme objectif national : la France est 23e — objectif top 10 d'ici 2035 avec des méthodes bienveillantes"],"con":[{"q":"Les enseignants s'y opposeront","r":"Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'évaluation des résultats. C'est une position minoritaire."},{"q":"Les résultats ne seront visibles qu'en 10 ans","r":"Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commencer maintenant."},{"q":"Ce n'est pas une question de moyens mais de méthodes","r":"C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. On change les deux."}]},{"id":152,"t":"Règle d'or et RIC — le modèle suisse complet : rigueur budgétaire + démocratie directe","c":"République","e":"🇨🇭🗳️","s":"ambitieux","a":"⚖️ Dette : objectif 113% → 80% du PIB en 10 ans — démocratie : 47% d'abstention → 35%","sig":"neutre","sit":"Suisse : frein à l'endettement constitutionnel depuis 2003. Budget équilibré depuis 22 ans. Dette : 40% du PIB (France 113%). Référendums fréquents sur les vraies questions. Compétitivité mondiale n°1 depuis 30 ans. Le programme APR a déjà la règle d'or (prop 38) et le RIC (prop 47). La proposition","sol":"Cette mesure (Règle d'or et RIC) répond à une défaillance documentée. Suisse : frein à l'endettement constitutionnel depuis 2003. Budget équilibré depuis 22 ans. Dette : 40% du PIB (France 113%). Référendums fréquents su. L'impact estimé est Dette : objectif 113% → 80% du PIB en 10 ans — démocratie","l":"⚠️ Révision constitutionnelle pour la règle d'or — RIC par loi ordinaire","k":["Règle d'or constitutionnelle : déficit structurel plafonné à -0,5% du PIB — inscrit dans la Constitution (déjà dans prop 38 — renforcement du modèle suisse)","RIC encadré : 800 000 signatures pour un référendum d'initiative citoyenne — sujets exclus : droits fondamentaux, peine de mort, IVG (déjà dans prop 47)","Référendum budgétaire obligatoire : tout budget avec déficit > 3% du PIB doit être soumis au Parlement avec un vote de ratification spécial à 60%","Transparence fiscale totale : chaque citoyen reçoit chaque année un document 'Comment vos impôts sont dépensés' — avec ventilation par poste budgétaire"],"con":[{"q":"C'est populiste","r":"Rendre les comptes publics transparents, permettre aux citoyens de s'exprimer directement sur les grandes questions — c'est de la démocratie, pas du populisme. Le populisme c'est promettre sans compter. Nous chiffrons tout."},{"q":"Ça va créer de l'instabilité","r":"La Suisse pratique le RIC depuis 1891 et est la démocratie la plus stable et la plus compétitive du monde. L'instabilité ne vient pas de la démocratie directe — elle vient des promesses sans contrepartie."},{"q":"Les citoyens ne sont pas compétents pour voter sur des sujets complexes","r":"Les citoyens suisses votent régulièrement sur des sujets complexes (énergie, fiscalité, immigration) avec des résultats souvent plus sages que les décisions parlementaires. Et les sujets techniques sont exclus du RIC — seules les grandes orientations sont soumises."}]},{"id":153,"t":"Épargne retraite individuelle obligatoire — modèle australien Superannuation","c":"Retraites","e":"🇦🇺💰","s":"ambitieux","a":"➖ Capitalisation progressive : 0 coût immédiat, 3 500 Md$ de fonds en Australie après 30 ans","sig":"moins","sit":"Australie depuis 1992 : chaque employeur verse obligatoirement 11,5% du salaire dans un fonds de retraite individuel (Superannuation). Chaque Australien a son propre compte retraite capitalisé. Résultat : fonds de 3 500 milliards de dollars — 4e fonds de pension mondial. Zéro crise de financement de","sol":"Cette mesure (Épargne retraite individuelle obligatoire) répond à une défaillance documentée. Australie depuis 1992 : chaque employeur verse obligatoirement 11,5% du salaire dans un fonds de retraite individuel (Superannuation). Chaque Australi. L'impact estimé est Capitalisation progressive : 0 coû","l":"⚠️ Loi ordinaire + accord avec les partenaires sociaux — mise en place progressive","k":["Cotisation Superannuation française à 3% du salaire dès 2027 (employeur 2% + salarié 1%) — montée progressive à 6% en 10 ans","Fonds gérés par des organismes publics ou mutualistes — pas les banques privées","Capital disponible à la retraite sous forme de rente mensuelle OU de capital (liberté de choix)","Exonération fiscale sur les plus-values du fonds pendant la phase d'accumulation","Portabilité totale : le fonds suit le salarié d'un employeur à l'autre, d'un statut à l'autre"],"con":[{"q":"C'est irresponsable financièrement","r":"Les 6 leviers génèrent +10 à 21 Md€/an face à un déficit de 5 Md€. La réforme est financièrement plus robuste que la réforme Macron qui n'activait qu'un seul levier sur six possibles."},{"q":"Cela va faire fuir les entreprises","r":"Le programme ne modifie pas le taux de cotisation patronal — il modifie l'âge de départ et le calcul des pensions. Les entreprises ne sont pas affectées sur leurs charges."},{"q":"Le FRR ne peut pas atteindre 100 Md€","r":"15% des recettes fraude récupérées (4 Md€/an) + recettes péages en 2031 (1,5 Md€/an) + CSG progressive sur le capital = montée progressive en 15 ans. Le modèle norvégien l'a fait."}]},{"id":154,"t":"Agents de santé communautaires — modèle rwandais pour les déserts médicaux ruraux","c":"Santé","e":"🇷🇼🏥","s":"urgent","a":"➖ +300 M€/an — coût de l'inaction : 4 à 6 Md€/an d'urgences non justifiées","sig":"moins","sit":"Rwanda : 60 000 agents de santé communautaires formés (6 mois) et déployés dans chaque village. Missions : prévention, détection précoce, suivi chroniques, orientation vers les professionnels de santé. Résultat : mortalité infantile divisée par 4 depuis 2000, espérance de vie 55 → 70 ans en 24 ans.","sol":"Cette mesure (Agents de santé communautaires) répond à une défaillance documentée. Rwanda : 60 000 agents de santé communautaires formés (6 mois) et déployés dans chaque village. Missions : prévention, détection précoce, suivi chroni. L'impact estimé est +300 M€/an — coût de l'inaction : 4 à 6 Md€/a","l":"✅ Légal — nouveau statut par décret + formation GRETA/IFSI","k":["Création du statut d'Agent de Santé Communautaire (ASC) : formation de 6 mois, déployé dans les communes sans médecin depuis plus de 2 ans","Missions définies : prévention, dépistage tension/diabète/cancer, suivi des personnes âgées isolées, orientation vers IPA ou médecin, premiers secours","Recrutement prioritaire parmi les habitants de la commune — ancrage territorial","Salaire : 1 600€ net — supérieur au SMIC pour attirer des profils motivés","30 000 ASC déployés d'ici 2028 dans les 3 000 communes en désert médical sévère"],"con":[{"q":"Le coût pour la Sécurité sociale est insoutenable","r":"Le coût de l'inaction est supérieur : un passage aux urgences non justifié coûte 250€, une consultation préventive 30€. Le programme de prévention est un investissement à ROI de 3 à 7 pour 1."},{"q":"Les professionnels de santé s'y opposeront","r":"Les jeunes médecins et infirmières plébiscitent les nouvelles formes d'exercice. Les syndicats des anciens s'opposent à chaque réforme depuis 50 ans. On négocie ET on avance."},{"q":"La qualité des soins va baisser","r":"La qualité est déjà dégradée par les déserts médicaux et la surcharge hospitalière. Un système avec 18 mois d'attente et des urgences saturées n'est pas un système de qualité."}]},{"id":155,"t":"Aide sociale conditionnelle à l'éducation des enfants — modèle brésilien Bolsa Família","c":"Social","e":"🇧🇷👨‍\ud83d","s":"ambitieux","a":"➖➕ Coût : 2 à 3 Md€/an — retour sur investissement : 5 à 8 Md€/an sur 20 ans","sig":"mixte","sit":"Brésil depuis 2003 : aide financière aux familles pauvres conditionnée à la scolarisation des enfants et aux vaccinations. 14 millions de familles bénéficiaires. Coût : 0,5% du PIB. Résultats : pauvreté extrême −50% en 10 ans, scolarisation dans les zones bénéficiaires +40%, mortalité infantile −45%","sol":"Cette mesure (Aide sociale conditionnelle à l'éducation des enfants) répond à une défaillance documentée. Brésil depuis 2003 : aide financière aux familles pauvres conditionnée à la scolarisation des enfants et aux vaccinations. 14 millions de familles bén. L'impact estimé est Coût : 2 à 3 Md€/an —","l":"✅ Légal — modification des conditions du RSA par loi ordinaire","k":["RSA majoré de 50€/mois par enfant scolarisé à 100% et vacciné — prime positive, pas sanction","Suivi de scolarisation automatique via le système éducatif : pas de démarche administrative supplémentaire pour les familles","Accompagnement renforcé pour les familles dont les enfants décrochent — pas de suppression brutale de l'aide","Extension aux familles au-dessus du RSA mais sous le seuil de pauvreté — couvrir les 'travailleurs pauvres'","Évaluation d'impact obligatoire à 5 ans par la DREES — ajustement selon les résultats"],"con":[{"q":"C'est de l'assistanat","r":"La mesure est conditionnée à un comportement positif (scolarisation, vaccination, formation). Ce n'est pas un revenu universel — c'est un investissement ciblé dans les familles qui font l'effort. La contrepartie est claire et mesurable."},{"q":"Cela va coûter trop cher","r":"Le retour sur investissement est documenté : chaque euro investi dans la prévention de la pauvreté économise 5 à 8 euros en coûts sociaux sur 20 ans. Le Brésil l'a prouvé à grande échelle."},{"q":"Cela va créer des effets d'aubaine","r":"Le ciblage précis (conditions de ressources, conditions de comportement) limite les effets d'aubaine. Et même avec un effet d'aubaine partiel, le ROI reste positif selon toutes les évaluations internationales."}]},{"id":156,"t":"Cybersécurité nationale comme industrie exportatrice — modèle israélien","c":"Numérique","e":"🇮🇱🛡️\ud83d","s":"ambitieux","a":"➖ Investissement : +500 M€/an — marché cyber français potentiel : 15 Md€ d'ici 2030","sig":"moins","sit":"Israël après Stuxnet (2010) : transformation de la menace en opportunité. Cyber Command militaire + Directorate nationale Cyber + 500 start-ups cyber + exportation du savoir-faire. Résultat : 2e exportateur mondial de cybersécurité derrière les USA, 6,5 milliards de dollars d'investissements cyber e","sol":"Cette mesure (Cybersécurité nationale comme industrie exportatrice) répond à une défaillance documentée. Israël après Stuxnet (2010) : transformation de la menace en opportunité. Cyber Command militaire + Directorate nationale Cyber + 500 start-ups cyber . L'impact estimé est Investissement : +500 M","l":"✅ Légal — budget ANSSI + plan filière cyber + appel à projets France 2030","k":["Budget ANSSI triplé : 250 M€ → 750 M€/an (déjà dans prop 30 — confirmer et accélérer)","Pôle cyber national à Rennes (capital française de la cybersécurité) : incubateur de 50 start-ups/an, partenariat Bretagne/DGA/ANSSI","Service militaire cyber : 2 000 jeunes ingénieurs formés à la cyberdéfense dans l'armée chaque année — pipeline de talents pour les start-ups ensuite","Commande publique cyber : 80% des achats de cybersécurité de l'État chez des entreprises françaises — créer le marché national d'abord","Export offensif : BPI France finance les start-ups cyber françaises à l'export — objectif 3 Md€ d'export d'ici 2030"],"con":[{"q":"Cela met en danger les données des citoyens","r":"Le cloud souverain (Outscale, OVH) est juridiquement protégé du Cloud Act américain. Les données restent en France. L'Estonie a le système le plus numérisé du monde ET le plus sécurisé d'Europe."},{"q":"Les personnes âgées seront exclues","r":"Les guichets physiques sont maintenus pour les non-numérisés — c'est une condition non négociable. Et la formation numérique des seniors est financée. Le numérique est une option supplémentaire, pas un remplacement."},{"q":"C'est trop coûteux à mettre en oeuvre","r":"L'Estonie a numérisé son administration pour 100 M€ — moins d'un budget ministériel. Et les économies (1,4 Md€/an) amortissent l'investissement en moins d'un an."}]},{"id":157,"t":"Mutuelle de santé universelle à coût minimal — modèle rwandais adapté","c":"Santé","e":"🏥🌍","s":"ambitieux","a":"➕ Restes à charge supprimés pour les plus pauvres — économie urgences : 2 Md€/an","sig":"plus","sit":"Rwanda : mutuelle nationale à 3$/an couvrant 95% de la population. Résultat spectaculaire sur l'accès aux soins. France : l'Assurance maladie couvre déjà 70 à 80% des soins. La complémentaire santé couvre le reste — mais 4 millions de Français n'ont pas de complémentaire (coût moyen : 600€/an). Résu","sol":"Cette mesure (Mutuelle de santé universelle à coût minimal) répond à une défaillance documentée. Rwanda : mutuelle nationale à 3$/an couvrant 95% de la population. Résultat spectaculaire sur l'accès aux soins. France : l'Assurance maladie couvre d. L'impact estimé est Restes à charge supprimés pour","l":"✅ Légal — extension de la CMUC + accord avec les mutuelles","k":["Mutuelle nationale universelle : couverture à 100% du ticket modérateur pour tous les Français — cotisation proportionnelle au revenu","Pour les moins de 1 SMIC : gratuit (CSS déjà existante — élargir et simplifier)","Pour 1 à 2 SMIC : 15€/mois — abordable pour tous","Gestion par une caisse nationale mutualisée — pas de profit privé sur la santé de base","Fin des déserts de couverture : toute pathologie dans le panier de soins de base remboursée à 100%"],"con":[{"q":"Le coût pour la Sécurité sociale est insoutenable","r":"Le coût de l'inaction est supérieur : un passage aux urgences non justifié coûte 250€, une consultation préventive 30€. Le programme de prévention est un investissement à ROI de 3 à 7 pour 1."},{"q":"Les professionnels de santé s'y opposeront","r":"Les jeunes médecins et infirmières plébiscitent les nouvelles formes d'exercice. Les syndicats des anciens s'opposent à chaque réforme depuis 50 ans. On négocie ET on avance."},{"q":"La qualité des soins va baisser","r":"La qualité est déjà dégradée par les déserts médicaux et la surcharge hospitalière. Un système avec 18 mois d'attente et des urgences saturées n'est pas un système de qualité."}]},{"id":163,"t":"Plan grand âge — 5e risque social, dignité garantie jusqu'au bout","c":"Santé","e":"👴🏥","s":"urgent","a":"⚖️ +5 à 7 Md€/an — financement par contribution autonomie + assurance privée obligatoire","sig":"neutre","sit":"2,5 millions de personnes dépendantes en France. Ce chiffre atteindra 4 millions en 2050. Un EHPAD coûte en moyenne 2 500€/mois dont 2 000€ à charge de la famille — impossible pour une retraite médiane de 1 400€/mois. 500 000 personnes en liste d'attente EHPAD. 80 000 postes d'aides-soignants non pourvus. La 5e branche de la Sécurité sociale (perte d'autonomie) a été créée en 2020 — sans financement réel. La journée de solidarité (0,3% de CSG) rapporte 3 Md€/an pour un besoin estimé à 10 Md€. L'Allemagne, le Japon et les Pays-Bas ont résolu ce problème avec une assurance dépendance obligatoire","sol":"Financement en 3 couches : (1) Contribution autonomie portée de 0,3% à 0,6% de la CSG — +3 Md€/an. (2) Assurance dépendance privée obligatoire dès 50 ans — prime de 30€/mois, capital garanti en cas de dépendance. (3) Réforme du reste à charge : plafonnement à 1 200€/mois en EHPAD (vs 2 000€ actuellement). Parallèlement : revalorisation massive des aides-soignants (+200€/mois minimum), plan construction 150 000 places nouvelles en EHPAD et résidences autonomie.","l":"✅ Légal — 5e branche de la Sécurité sociale créée en 2020 — à financer réellement","k":["CSG autonomie portée de 0,3% à 0,6% — +3 Md€/an dédiés exclusivement au grand âge","Assurance dépendance obligatoire dès 50 ans : 30€/mois, gérée par les mutuelles sous contrôle public — capital dépendance garanti","Plafonnement du reste à charge en EHPAD à 1 200€/mois — fin de la ruine des familles pour un proche dépendant","Revalorisation aides-soignants : +200€/mois minimum + prime de nuit portée à 80€ (vs 40€) — 80 000 postes non pourvus à combler","Plan 150 000 places nouvelles : 100 000 en EHPAD public, 50 000 en résidences autonomie — appel d'offres national avec préférence bâti social"],"con":[{"q":"L'assurance dépendance obligatoire est une taxe déguisée","r":"L'assurance maladie obligatoire aussi — depuis 1945. L'assurance chômage aussi. Le principe de solidarité par cotisation obligatoire est le fondement de notre modèle social. 30€/mois à partir de 50 ans, c'est moins que l'assurance auto. Et le risque de dépendance concerne 40% des"},{"q":"On n'a pas les soignants pour ouvrir 150 000 lits","r":"On n'aura les soignants que si on revalorise les salaires. Un aide-soignant à 1 600€ net ne recrute personne. À 1 800€ net avec des primes de nuit décentes, les candidatures reviennent — c'est documenté dans les établissements qui ont expérimenté. La revalorisation est la conditi"},{"q":"L'Allemagne fait faillite avec son assurance dépendance","r":"L'assurance dépendance allemande (Pflegeversicherung) fonctionne depuis 1995 sans déficit structurel. Le Japon (2000) et les Pays-Bas (1968) idem. La France est l'exception qui n'a toujours pas de financement réel 30 ans après. C'est le retard qui coûte — pas le modèle."}]},{"id":164,"t":"Culture, audiovisuel et presse — souveraineté culturelle et pluralisme","c":"République","e":"🎭📺📰","s":"ambitieux","a":"⚖️ +500 M€/an pour l'audiovisuel public + réforme du financement de la presse","sig":"neutre","sit":"L'audiovisuel public français (France Télévisions, Radio France, France Médias Monde) a perdu 400 M€ de financement avec la suppression de la redevance en 2022 — remplacée par une fraction de TVA qui n'indexe pas automatiquement le budget sur l'inflation. France 2 et France 5 perdent 15% de leurs audiences face aux plateformes américaines (Netflix, Disney+, Amazon). La presse écrite quotidienne a perdu 60% de sa diffusion en 10 ans. Les aides à la presse (600 M€/an) subventionnent des groupes qui n'en ont pas besoin. La langue française recule dans les institutions internationales — l'anglais ","sol":"Quatre volets : (1) Financement stable de l'audiovisuel public indexé sur l'inflation — budget garanti par loi quinquennale. (2) Soutien à la création française sur les plateformes numériques — quota renforcé de contenu français (40% actuellement, objectif 60%). (3) Réforme des aides à la presse — cibler les titres indépendants et locaux, plafonner les aides aux groupes rentables. (4) Diplomatie de la langue française — renforcer TV5Monde, l'Institut français et l'enseignement du français dans les pays francophones.","l":"✅ Légal — loi ordinaire sur l'audiovisuel + réforme des aides à la presse","k":["Budget audiovisuel public garanti par loi quinquennale : +500 M€/an indexés sur l'inflation — fin de la dépendance aux arbitrages budgétaires annuels","Quota de contenu français sur les plateformes numériques porté à 60% — Netflix, Disney+, Amazon investissent en France ou paient une taxe compensatoire","Réforme des aides à la presse : cibler les titres locaux indépendants et les pure players d'information — plafonner les aides aux grands groupes (Bolloré, LVMH, Lagardère) qui n'en","Fond de soutien à la presse locale : 200 M€/an pour les titres de moins de 50 000 exemplaires — condition : indépendance capitalistique vis-à-vis de grands groupes industriels","Diplomatie linguistique : budget TV5Monde +100 M€, Institut français +50 M€, enseignement du français prioritaire dans les 88 pays francophones"],"con":[{"q":"L'audiovisuel public est inefficace — il faut le privatiser","r":"BBC, ARD, NHK — les meilleures chaînes publiques mondiales n'ont jamais été privatisées. L'audiovisuel public n'a pas à être rentable — il a à être indépendant du marché et des actionnaires. Un pays qui confie toute son information à des groupes privés (dont certains possèdent de"},{"q":"Les quotas sur les plateformes vont faire fuir les investissements","r":"Netflix investit déjà 1 Md€/an en France sous la contrainte du quota actuel de 20% de reversement à la création française. La contrainte incite à l'investissement, pas à la fuite. L'Espagne a imposé des quotas stricts — Netflix y a ouvert son premier grand studio européen."},{"q":"La langue française recule — c'est une bataille perdue","r":"Le français est la 5e langue mondiale, la 2e langue diplomatique internationale, la langue officielle de 29 pays et parlée par 320 millions de personnes. Ce n'est pas une bataille perdue — c'est une bataille non menée. TV5Monde avec un budget décent touche déjà 350 millions de fo"}]},{"id":165,"t":"PME, artisans et commerçants — simplification, financement et reconnaissance","c":"Économie","e":"🔧🏪💼","s":"urgent","a":"➕ Économies charges : +3 Md€/an pour les PME — recettes fiscales supplémentaires via croissance","sig":"plus","sit":"3,2 millions de PME et 1 million d'artisans en France. Ils emploient 60% des salariés du secteur privé mais font face à une fiscalité 3 à 5 fois plus lourde que leurs équivalents allemands ou espagnols (impôts de production : CFE, C3S, taxe foncière industrielle = 77 Md€/an). Un artisan crée son entreprise en 7 jours en France — c'est bien. Mais il passe ensuite 77 jours/an en démarches administratives — c'est le pire d'Europe. Et la transmission d'une PME familiale est pénalisée par des droits de succession et des délais qui conduisent souvent à la fermeture plutôt qu'à la transmission.","sol":"Trois axes : (1) Fiscalité allégée — IS à 15% étendu à 200 000€ de bénéfice (vs 38 120€ actuellement), C3S supprimée, CFE plafonnée. (2) Simplification administrative radicale — principe 'once only', DOGE français ciblé sur les PME, délai de paiement public réduit à 20 jours. (3) Transmission facilitée — abattement succession PME familiale porté à 500 000€, délai de paiement étalé sur 10 ans.","l":"✅ Légal — loi ordinaire + loi de finances + décrets de simplification","k":["IS PME : taux de 15% étendu aux 200 000 premiers euros de bénéfice — aligner sur les Pays-Bas et l'Espagne pour les entreprises de moins de 250 salariés","C3S supprimée : taxe de 0,16% du CA qui frappe les entreprises même déficitaires — 4,2 Md€/an supprimés","Délai de paiement public réduit à 20 jours (vs 30 actuellement) — les TPE ne doivent plus faire crédit à l'État","Transmission PME familiale : abattement fiscal porté à 500 000€ (vs 300 000€ avec pacte Dutreil) + paiement étalé sur 10 ans — éviter les fermetures par impossibilité de transmettr","Chèque conseil artisan : 500€/an de conseil juridique, fiscal et numérique pris en charge par l'État pour toute entreprise de moins de 10 salariés"],"con":[{"q":"Supprimer la C3S prive l'État de 4 Md€ de recettes","r":"La C3S est une taxe sur le chiffre d'affaires — elle frappe les entreprises déficitaires. Une PME qui perd de l'argent paie quand même la C3S. C'est anti-économique. Sa suppression stimule l'investissement et la croissance des PME, ce qui génère plus d'IS et de cotisations social"},{"q":"Les artisans ne veulent pas de simplification — ils veulent de la protection","r":"Les deux ne s'excluent pas. La simplification administrative libère du temps pour le métier. La protection contre la concurrence déloyale (plateformes, auto-entrepreneurs au statut flou) est dans les propositions sur le code du travail. Un plombier qui passe 2 heures de moins par"},{"q":"La transmission facilitée profite aux héritiers riches","r":"Un artisan boulanger qui transmet sa boulangerie à son fils ne fait pas partie des riches héritiers. Son fonds de commerce vaut 300 000 à 600 000€ — c'est sa vie entière. Faciliter cette transmission c'est préserver 3 millions de PME familiales et les emplois qui vont avec. Les t"}]},{"id":166,"t":"Justice civile et accès au droit — délais, coûts et médiation","c":"Sécurité","e":"⚖️📋","s":"ambitieux","a":"➕ +800 M€/an pour la justice civile — économie sur les litiges non résolus : 15 Md€/an","sig":"plus","sit":"La justice civile française est en état de crise documenté. Délai moyen pour un jugement en 1ère instance : 17,6 mois devant le tribunal judiciaire. 3 à 5 ans pour un litige commercial complexe. Un divorce contentieux dure en moyenne 2 ans. La France a 8,4 magistrats pour 100 000 habitants — contre 21 en Allemagne et 24 en Slovénie (moyenne UE : 17). Le taux d'aide juridictionnelle plafond est de 1 700€ pour un plaideur modeste — insuffisant pour un litige moyen. Résultat : les Français renoncent à leurs droits. 40% des litiges locatifs ne sont jamais portés en justice faute de moyens et de te","sol":"Quatre leviers : (1) +3 000 magistrats sur 5 ans — objectif 12 magistrats pour 100 000 habitants. (2) Médiation obligatoire avant tout litige civil inférieur à 50 000€ — règle 80% des litiges sans passer par le tribunal. (3) Aide juridictionnelle revalorisée à 3 000€ pour les revenus sous 2 SMIC. (4) Dématérialisation des petits litiges (< 5 000€) — procédure 100% numérique avec délai garanti de 3 mois.","l":"✅ Légal — loi ordinaire de programmation judiciaire","k":["+3 000 magistrats recrutés sur 5 ans — école nationale de la magistrature doublée en capacité","Médiation obligatoire avant tout litige civil < 50 000€ : médiateur agréé, délai 3 mois, coût partagé — 80% des litiges résolus sans tribunal","Aide juridictionnelle revalorisée : plafond porté à 3 000€ pour les revenus sous 2 SMIC — accès effectif au droit pour les classes populaires","Procédure dématérialisée pour les petits litiges < 5 000€ : formulaire en ligne, délai garanti 3 mois, décision exécutoire immédiatement","Tribunal des baux : juridiction spécialisée dans chaque TGI pour les litiges locatifs — délai garanti 6 mois (vs 18 actuellement)"],"con":[{"q":"La médiation obligatoire est une justice au rabais","r":"La médiation n'est pas au rabais — elle est souvent meilleure. Un accord de médiation respecté vaut mieux qu'un jugement ignoré. 80% des médiations aboutissent à un accord. En Allemagne, la médiation préalable est la norme pour les litiges civils depuis 2012 — la satisfaction des"},{"q":"Il faut plus d'argent — pas plus de magistrats","r":"Les deux. L'argent seul ne suffit pas : sans magistrats formés, les salles d'audience restent vides. La France recrute 300 magistrats/an — il en faudrait 900 pour rattraper le retard. La formation est la contrainte principale — c'est pourquoi on double la capacité de l'ENM."},{"q":"La dématérialisation exclut les personnes qui ne maîtrisent pas internet","r":"La procédure dématérialisée est une option, pas une obligation. Les guichets physiques restent ouverts pour les personnes non-numérisées. Et les maisons France Services offrent un accompagnement pour les démarches numériques — y compris judiciaires."}]},{"id":167,"t":"Logement social — construire, rénover, attribuer plus vite","c":"Emploi","e":"🏘️🔑","s":"urgent","a":"⚖️ +3 Md€/an — 150 000 logements sociaux construits/an (vs 90 000 actuellement)","sig":"neutre","sit":"5,5 millions de logements sociaux en France. 2,3 millions de demandes en attente — record absolu. Délai d'attente moyen : 6 ans en zone tendue, 3 ans en zone détendue. On construit 90 000 logements sociaux par an — il en faudrait 150 000. Les raisons du déficit : manque de foncier (les maires résistent aux constructions), financement insuffisant des bailleurs sociaux (hausse des taux a explosé leurs coûts), délais de permis de construire (18 à 24 mois en zone tendue). Et le système d'attribution est opaque : 40% des attributions se font hors des critères officiels selon la Cour des comptes.","sol":"Cinq leviers simultanés : (1) Foncier libéré — obligation pour les communes de SRU de mettre du foncier public à disposition sous 6 mois. (2) Financement bonifié — prêt à taux 0 de la Caisse des Dépôts pour les bailleurs sociaux vertueux. (3) Délais permis réduits à 9 mois en zone tendue. (4) Attribution transparente — système national de file d'attente numérique, décision motivée obligatoire. (5) Rénovation thermique — 200 000 logements sociaux rénovés/an (actuellement 60 000).","l":"✅ Légal — loi de finances + réforme des règles d'attribution + PLU","k":["Prêt à taux zéro de la CDC pour 50 000 logements sociaux supplémentaires/an — financement sans subvention directe de l'État","Permis de construire logement social réduit à 9 mois en zone tendue — procédure accélérée avec instructeur dédié","Système national d'attribution numérique : file d'attente transparente, motivée, opposable — fin des attributions discrétionnaires","Rénovation thermique : 200 000 logements sociaux rénovés/an (vs 60 000) — économies de charges pour les locataires et réduction des passoires thermiques","SRU renforcée : les communes qui n'atteignent pas 25% de logements sociaux paient une pénalité doublée ET cèdent du foncier public à prix symbolique aux bailleurs sociaux"],"con":[{"q":"Les maires vont bloquer les constructions","r":"La SRU avec pénalité doublée ET cession de foncier public oblige sans interdire. Et les maires qui construisent reçoivent une dotation bonifiée — carotte ET bâton. Les 300 communes les plus en retard ont des préfets qui peuvent se substituer à elles pour délivrer les permis — le "},{"q":"Les bailleurs sociaux sont déjà endettés — les prêts supplémentaires les étouffent","r":"Le prêt à taux 0 de la CDC n'est pas de la dette classique — c'est un financement à coût nul dont les intérêts sont nuls. Le seul risque est de ne pas trouver de locataires — qui en logement social n'existe pas avec 2,3 millions de demandes en attente."},{"q":"Construire plus ne résout pas le problème si l'attribution est mal faite","r":"C'est précisément pourquoi la réforme de l'attribution (transparence, file numérique, décision motivée) accompagne la construction. Construire sans réformer l'attribution c'est remplir un tonneau percé. Les deux réformes sont indissociables."}]},{"id":168,"t":"Outre-mer — développement endogène, fin de la dépendance et égalité réelle","c":"Outre-mer","e":"🌊🏝️🇫\ud83c","s":"urgent","a":"➖ +2 Md€/an d'investissements — fin de la sur-dépendance aux transferts métropolitains","sig":"moins","sit":"Les Outre-mer français (Guadeloupe, Martinique, Guyane, La Réunion, Mayotte + collectivités) abritent 2,8 millions de citoyens français. Paradoxe : la France possède la 2e ZEE mondiale grâce à eux (11 millions de km²) mais laisse ces territoires dans une dépendance structurelle. Indicateurs 2025 : taux de chômage 20 à 40% selon les territoires (vs 7% métropole), coût de la vie 35 à 50% plus élevé qu'en métropole (monopoles importateurs), eau non potable en Guadeloupe (40% du réseau fonctionne), Mayotte ravagée par le cyclone Chido (décembre 2024). Le modèle actuel — transferts de la métropole ","sol":"Trois ruptures : (1) Fin des monopoles importateurs — ouverture à la concurrence régionale (Caraïbes, Océan Indien, Pacifique) pour réduire le coût de la vie. (2) Développement endogène — zones franches économiques, préférence locale dans les marchés publics, formation aux métiers de la mer et du tourisme. (3) Investissements structurels — eau potable en Guadeloupe (800 M€), reconstruction Mayotte (2 Md€), câbles numériques, énergies renouvelables.","l":"✅ Légal — loi ordinaire + LODEOM + révision constitutionnelle partielle pour l'autonomie élargie","k":["Fin des monopoles importateurs : ouverture des marchés ultramarins à la concurrence régionale (Caraïbes, Océan Indien) — objectif -20% sur le coût de la vie en 3 ans","Zones franches économiques dans chaque DROM : exonération IS 10 ans pour les entreprises qui créent des emplois locaux — développement endogène plutôt que transferts passifs","Eau potable en Guadeloupe : plan d'urgence 800 M€ sur 5 ans — 400 000 citoyens français n'ont pas d'eau potable fiable en 2026, c'est une honte nationale","Reconstruction Mayotte : plan 2 Md€ post-cyclone Chido — logements, écoles, hôpital, réseau d'eau — avec clause de préférence aux entreprises mahoraises","Autonomie élargie : permettre aux collectivités ultramarines de signer des accords économiques régionaux sans passer par Paris — accélération des échanges avec les voisins"],"con":[{"q":"Les Outre-mer coûtent trop cher à la métropole","r":"Les Outre-mer donnent à la France la 2e ZEE mondiale — 11 millions de km² de ressources maritimes, de biodiversité, de présence géopolitique dans 3 océans. Ce n'est pas un coût — c'est un investissement stratégique. Et les transferts actuels créent de la dépendance sans développe"},{"q":"Ouvrir aux importations régionales va tuer la production locale","r":"La production locale est déjà tuée par les monopoles importateurs qui imposent des prix métropolitains majorés. La concurrence régionale (avec les Caraïbes voisines, l'Océan Indien) permet des prix plus bas ET peut stimuler des productions locales compétitives pour le marché régi"},{"q":"L'autonomie élargie c'est l'indépendance déguisée","r":"L'autonomie élargie n'est pas l'indépendance — c'est la capacité à signer des accords économiques régionaux sans délai. La Polynésie française le fait déjà dans certains domaines. Ça n'affecte ni la citoyenneté française, ni l'euro, ni la défense nationale."}]},{"id":171,"t":"Numérique souverain — cloud français, IA nationale, cybersécurité des PME","c":"Numérique","e":"💻🛡️🇫\ud83c","s":"urgent","a":"➖ +1,5 Md€/an d'investissement — marché cloud souverain français estimé à 15 Md€ d'ici 2030","sig":"moins","sit":"Les données de 67 millions de Français sont hébergées sur Azure (Microsoft) et AWS (Amazon) — soumises au Cloud Act américain qui permet aux autorités US d'y accéder sans notification. La France est 22e en Europe sur la dématérialisation des services publics (rapport DESI 2025). Les PME françaises subissent 350 cyberattaques par jour en moyenne — seules 18% ont une politique de cybersécurité documentée. L'ANSSI a 600 agents pour protéger 67 millions de Français contre 6 000 au GCHQ britannique. L'IA française est dominée par les modèles américains (OpenAI, Google) et chinois (DeepSeek) — la Fr","sol":"Trois axes simultanés. (1) Cloud souverain obligatoire : toutes les données sensibles de l'État (santé, fiscales, judiciaires, militaires) hébergées exclusivement sur cloud certifié SecNumCloud d'ici 2028 — OVHcloud, Scaleway, Outscale. (2) IA nationale : Mistral AI comme modèle de référence de l'administration française — contrat pluriannuel État-Mistral, formation de 50 000 agents publics à l'IA d'ici 2028. (3) Cybersécurité PME : chèque cyber 5 000€ pour toute PME de moins de 50 salariés réalisant un audit de sécurité — 100 000 PME sécurisées par an. Budget ANSSI triplé : 250 M€ → 750 M€/an.","l":"✅ Légal — plan France 2030 + décret sur la qualification SecNumCloud obligatoire","k":["Cloud souverain obligatoire pour toutes les données sensibles de l'État d'ici 2028 — SecNumCloud comme standard minimum non négociable","Contrat pluriannuel État-Mistral AI : Mistral comme modèle de référence de l'administration — commande publique qui sécurise et développe le champion national","Chèque cyber 5 000€ pour les PME de moins de 50 salariés — audit + plan de sécurisation — 100 000 PME protégées par an","Budget ANSSI triplé à 750 M€/an + 2 000 recrutements sur 3 ans — aligner avec le GCHQ britannique","Formation numérique de 50 000 agents publics/an à l'IA et à la cybersécurité — via le CNFPT et les GRETA"],"con":[{"q":"Le cloud américain est moins cher et plus performant","r":"OVHcloud et Scaleway sont compétitifs sur les prix depuis 2023. Et le coût d'une fuite de données de santé de 67 millions de Français (accessible par le Cloud Act) se mesure en milliards — pas en économies de quelques millions sur l'hébergement. La souveraineté a un prix — qui es"},{"q":"Mistral AI ne peut pas concurrencer ChatGPT","r":"Mistral Mixtral surpasse GPT-3.5 sur la plupart des benchmarks. Et pour les usages de l'administration française (rédaction administrative, traduction, analyse juridique), Mistral finetuné sur les données publiques françaises sera supérieur à un modèle généraliste américain. La c"},{"q":"Les PME ne savent pas utiliser un chèque cyber","r":"Le chèque est utilisable uniquement chez des prestataires labellisés ExpertCyber (ANSSI) — l'accompagnement est inclus dans la prestation. Et BPI France a déjà le réseau pour diffuser ce type d'aide — elle le fait avec le chèque transformation numérique depuis 2021."}]},{"id":172,"t":"Justice pénale — peines effectives, réinsertion réelle, prison digne","c":"Sécurité","e":"⚖️🔒🔄","s":"urgent","a":"➕ +1,2 Md€/an — économie sur la récidive : −5 Md€/an à horizon 10 ans","sig":"plus","sit":"La France a le taux de surpopulation carcérale le plus élevé d'Europe : 120 détenus pour 100 places. 70 000 peines de prison ferme ne sont pas exécutées faute de places. Le taux de récidive à 5 ans est de 60% — le plus haut d'Europe occidentale. Pourtant la France dépense 50€/jour/détenu pour des conditions indignes. Les Pays-Bas ont un taux de récidive de 30% et ferment des prisons — parce qu'ils ont investi dans la réinsertion et les alternatives à l'incarcération. Une journée de prison coûte 128€ en France. Un programme de réinsertion coûte 30€/jour et réduit la récidive de 40%.","sol":"Trois axes indissociables : (1) Peines effectives — les condamnations sont exécutées. Point. Fin du stock de 70 000 peines non exécutées. Mais peines alternatives développées massivement (bracelet, TIG, semi-liberté) pour les délits sans violence — libérer les places pour les crimes graves. (2) Réinsertion réelle — programme travail obligatoire en prison, formation professionnelle certifiante, suivi à la sortie pendant 2 ans. (3) Prison digne — 15 000 places nouvelles sur 10 ans pour sortir de la surpopulation + rénovation des 50 établissements les plus vétustes.","l":"✅ Légal — loi ordinaire pénale + plan pluriannuel prison","k":["Exécution des peines : résorber le stock de 70 000 peines non exécutées en 3 ans — via développement massif des alternatives (bracelet, TIG, semi-liberté)","Travail en prison obligatoire et rémunéré (20% SMIC minimum) — formation professionnelle certifiante pour 100% des détenus de moins de 35 ans","Suivi post-libération 2 ans : référent emploi-logement dédié pour chaque sortant — modèle norvégien (30% de récidive vs 60% en France)","15 000 places de prison nouvelles sur 10 ans — priorité aux maisons d'arrêt et centres de semi-liberté","Peines alternatives doublées : 100 000 TIG/an (vs 50 000 actuellement), bracelets élargis aux récidivistes de délits sans violence"],"con":[{"q":"Des prisons dignes c'est récompenser les criminels","r":"Une prison indigne produit des récidivistes — et la récidive coûte à la société 10 fois plus que le coût d'une prison décente. Les Pays-Bas ont les prisons les plus humaines d'Europe et le taux de récidive le plus bas. Ce n'est pas de l'angélisme — c'est de la comptabilité. On ch"},{"q":"Le travail en prison c'est de l'exploitation","r":"Le travail en prison est rémunéré (minimum 20% du SMIC dans notre proposition), il est formatif (certification professionnelle reconnue), et il prépare à l'emploi à la sortie. L'alternative — être enfermé 23h/24 sans activité — est humainement et socialement dévastatrice. 80% des"},{"q":"Les alternatives à la prison laissent les criminels dehors","r":"Les alternatives concernent les délits sans violence (vol simple, conduite sans permis, petits trafics). Les crimes violents, viols, meurtres — prison ferme systématique et longue. Les bracelets libèrent des places pour les cas graves. Une personne avec un bracelet électronique e"}]},{"id":173,"t":"Sport pour tous — 1 heure de sport par jour à l'école, clubs accessibles, héritage Paris 2024","c":"Santé","e":"🏅🏃💪","s":"ambitieux","a":"➕ +500 M€/an — économie santé prouvée : −3 Md€/an sur l'obésité et maladies cardiovasculaires","sig":"plus","sit":"La France a organisé les Jeux Olympiques de Paris 2024 — le plus grand événement sportif de l'histoire française. Et dans les semaines qui ont suivi, rien n'a changé pour les 67 millions de Français. 37% des adultes français ne pratiquent aucun sport régulier. L'obésité touche 17% des adultes et 16% des enfants. Chaque Euro investi dans la pratique sportive en économise 7 en dépenses de santé (OMS 2023). Pourtant, les enfants français n'ont que 3h de sport par semaine à l'école primaire — contre 5h dans les pays nordiques. Les clubs sportifs voient leurs adhésions stagner faute de financement ","sol":"Capitaliser sur l'héritage Paris 2024 pour ancrer une culture sportive durable. Trois axes : (1) 1 heure de sport par jour à l'école primaire et collège — en utilisant les équipements existants et en formant les enseignants. (2) Pass Sport universel : 100€/an pour toute personne inscrite dans un club sportif agréé, quel que soit son revenu — pas seulement les boursiers. (3) 10 000 équipements sportifs rénovés sur 5 ans dans les quartiers prioritaires et zones rurales — avec les fonds héritage des JO 2024.","l":"✅ Légal — loi ordinaire + circulaire éducation nationale","k":["1 heure de sport obligatoire par jour à l'école primaire et collège — en intégrant les créneaux dans l'emploi du temps sans réduire les autres matières (modèle finlandais : pause a","Pass Sport universel 100€/an pour toute inscription en club sportif — plus de critères de revenus, universalisation de ce qui était réservé aux boursiers","10 000 équipements sportifs rénovés sur 5 ans : gymnases, terrains de foot, pistes d'athlétisme dans les QPV et zones rurales — fonds héritage JO 2024","1 000 emplois de médiateurs sportifs dans les QPV : anciens sportifs professionnels rémunérés pour animer les quartiers via le sport","Sport sur ordonnance : généralisation du dispositif expérimental — les médecins prescrivent une activité physique remboursée à 60% pour les pathologies chroniques"],"con":[{"q":"Les enseignants ne sont pas formés pour faire du sport 1h/jour","r":"En primaire, 30 minutes sont déjà prévues — on les rend effectives et on ajoute 30 minutes de pause active (marche, jeux de cour structurés) qui ne nécessitent pas d'enseignant spécialisé. En collège, les professeurs d'EPS prennent en charge 3 créneaux supplémentaires, compensés "},{"q":"Il n'y a pas assez de gymnases et terrains pour 1h/jour","r":"En primaire, 50% du sport peut se faire dans la cour (jeux actifs, yoga, renforcement musculaire) sans infrastructure spécifique. Et les 10 000 équipements rénovés en 5 ans — priorité aux communes qui manquent le plus. L'inventaire des équipements sportifs publics sous-utilisés ("},{"q":"Le Pass Sport universel coûte trop cher","r":"100€ × 15 millions de pratiquants en club = 1,5 Md€. Mais le Pass Sport stimule 5 millions de nouvelles inscriptions — personnes qui pratiquaient sans club (et ne recevaient rien) et rejoignent les clubs. Les clubs créent des emplois, l'État récupère des cotisations sociales. Et "}]},{"id":174,"t":"Casseurs et violences urbaines lors des événements — responsabilité financière et réponse pénale rapide","c":"Sécurité","e":"🚨🛡️⚖️","s":"urgent","a":"⚖️ NEUTRE pour l'État — les casseurs paient les dégâts qu'ils causent (recouvrement sur condamnés + clubs responsables)","sig":"neutre","sit":"L'IMPUNITÉ DES CASSEURS — UN RITUEL FRANÇAIS↵↵La France est le seul pays où la victoire d'un club de football provoque des émeutes. Le 31 mai 2025, après la victoire du PSG en Ligue des champions, les débordements ont fait : 2 morts, plus de 200 blessés, 563 interpellations (dont 491 à Paris), des commerces pillés (Foot Locker des Champs-Élysées saccagé), des voitures incendiées, un commissariat pris pour cible, 7 policiers blessés.↵↵UNE VIOLENCE EN EXPLOSION↵Depuis le début de la saison 2024/2025, 64 rencontres de football professionnel ont été émaillées d'incidents graves. 627 interpellation","sol":"LE PRINCIPE APR : CELUI QUI CASSE PAIE, ET IL PAIE VITE↵↵L'objectif n'est pas de criminaliser les supporters — l'immense majorité sont pacifiques. C'est de rendre la violence personnellement coûteuse pour ceux qui la commettent, et de retirer au contribuable la charge des dégâts.↵↵VOLET 1 — RESPONSABILITÉ FINANCIÈRE PERSONNELLE DES CASSEURS↵Tout individu condamné pour dégradation, pillage ou violence lors d'un événement rembourse l'intégralité des dégâts qu'il a causés — saisie sur salaire, sur compte, sur biens, étalée sur plusieurs années si nécessaire. La collectivité avance les frais de réparation puis se retourne contre les condamnés. Fini les dégâts payés par le contribuable.↵↵VOLET 2 ","l":"✅ Légal — renforce le Code pénal existant + responsabilité civile des associations de supporters","k":["Responsabilité financière personnelle : tout casseur condamné rembourse l'intégralité des dégâts qu'il a causés — saisie sur salaire et biens, étalée si nécessaire","Comparution immédiate systématique sous 48h pour tous les casseurs interpellés en flagrant délit — chambres correctionnelles dédiées activées les soirs d'événements à risque","Responsabilité civile et dissolution des associations de supporters responsables de violences répétées — sanction financière des clubs non coopératifs","Interdiction de périmètre urbain les soirs d'événements pour les individus déjà condamnés — extension des interdictions de stade existantes","Identification a posteriori par vidéosurveillance et réseaux sociaux — poursuite systématique même après les faits (modèle britannique et allemand)"],"con":[{"q":"C'est une mesure répressive qui criminalise tous les supporters","r":"Au contraire — elle protège les supporters pacifiques, qui sont l'immense majorité. La mesure cible uniquement ceux qui commettent des violences et des dégradations. Sanctuariser des zones de fête sécurisées permet justement à la grande majorité de célébrer sans crainte. On ne to"},{"q":"Faire payer les casseurs ne marchera jamais, ils n'ont pas d'argent","r":"La saisie peut être étalée sur des années, prélevée sur les salaires futurs comme une pension alimentaire. Même partiel, le recouvrement change la logique : aujourd'hui casser est gratuit pour le casseur et coûteux pour le contribuable. Demain, ce sera l'inverse. Et la dette de r"},{"q":"La comparution immédiate systématique va engorger les tribunaux","r":"C'est pourquoi APR crée des chambres correctionnelles dédiées, activées uniquement les soirs d'événements à risque (finales, derbys) — quelques dizaines de soirs par an. La justice rapide est plus dissuasive que la justice sévère mais lointaine. Le Royaume-Uni juge ses hooligans "}]},{"id":175,"t":"Responsabilité parentale et contrepartie des aides — sanction graduée, jamais aveugle","c":"Sécurité","e":"👨‍👩‍👧","s":"ambitieux","a":"⚖️ NEUTRE — la suspension est temporaire et conditionnelle, réversible dès le retour à l'engagement éducatif","sig":"neutre","sit":"LA RESPONSABILITÉ PARENTALE : UN DÉBAT MAL POSÉ DEPUIS 15 ANS↵↵Les mineurs représentent environ 18% des mises en cause dans les infractions pénales — un chiffre en augmentation. Face à cela, le débat politique oscille entre deux impasses :↵↵L'IMPASSE DE LA SUPPRESSION AVEUGLE↵Les propositions de suppression sèche des allocations familiales ont été rejetées à plusieurs reprises (octobre 2023, janvier 2025) — et à juste titre. Supprimer toutes les allocations d'une famille parce qu'un enfant a commis un délit punit aussi les frères et sœurs innocents, aggrave la précarité qui nourrit la délinqua","sol":"LE PRINCIPE APR : SANCTIONNER LA DÉMISSION PARENTALE, PAS LA PAUVRETÉ↵↵La sanction ne vise jamais la famille entière ni l'enfant. Elle vise le comportement de démission éducative d'un parent — et elle est toujours graduée, temporaire et réversible.↵↵VOLET 1 — MISE SOUS CONDITION, PAS SUPPRESSION↵En cas de délit grave ou répété d'un mineur, les allocations familiales liées à CET enfant (pas celles de la fratrie) peuvent être placées sous condition — versées sur un compte dédié fléché vers des dépenses éducatives encadrées (cantine, soutien scolaire, activités), plutôt que supprimées. L'argent continue de servir l'enfant — mais de façon contrôlée.↵↵VOLET 2 — SUSPENSION GRADUÉE ET RÉVERSIBLE EN","l":"✅ Légal — s'appuie sur le revirement Cour de cassation juin 2024 + article 227-17 du Code pénal (loi février 2025)","k":["Mise sous condition (compte dédié éducatif) plutôt que suppression — l'argent continue de servir l'enfant concerné, jamais la fratrie n'est pénalisée","Suspension graduée et réversible uniquement en cas de démission parentale caractérisée constatée par un juge — levée immédiate dès reprise des obligations","Stage de responsabilité parentale obligatoire AVANT toute sanction financière — logique d'accompagnement, pas de punition automatique","Pour les majeurs : conditionnalité du RSA à un parcours d'insertion et de réparation en cas de délits répétés — pas de suppression de l'aide vitale","Évaluation systématique par un juge des enfants ou travailleur social : distinguer la détresse (qui appelle un soutien) de la démission (qui appelle une sanction)"],"con":[{"q":"Supprimer les allocations punit les familles pauvres et aggrave la précarité","r":"C'est exactement pourquoi l'APR ne fait PAS de suppression sèche — qui a été rejetée à raison plusieurs fois. Notre dispositif met l'argent sous condition (compte dédié à l'enfant) plutôt que de le supprimer, ne touche jamais la fratrie, et distingue systématiquement la détresse "},{"q":"Ça ne marchera pas — la loi Ciotti de 2010 a été abrogée pour inefficacité","r":"La loi Ciotti supprimait les allocations de façon automatique et aveugle pour absentéisme scolaire — sans accompagnement, sans gradation, sans évaluation. Notre dispositif est l'inverse : stage de parentalité d'abord, mise sous condition plutôt que suppression, évaluation au cas "},{"q":"Un parent n'est pas responsable de tout ce que fait son enfant","r":"Juridiquement, depuis le revirement de la Cour de cassation de juin 2024, les parents sont solidairement responsables des dommages causés par leur enfant mineur. Mais notre dispositif ne sanctionne que la démission caractérisée — le parent qui refuse toute convocation, toute mesu"}]},{"id":176,"t":"Souveraineté de l'uranium — sécuriser l'approvisionnement des centrales françaises","c":"Énergie","e":"⚛️🛡️","s":"ambitieux","a":"⚖️ NEUTRE / investissement stratégique amorti — stocks et partenariats financés par EDF, Orano et le Fonds Souverain","sig":"neutre","sit":"LA FRANCE NUCLÉAIRE, MAIS DÉPENDANTE À 100% DE L'ÉTRANGER↵↵La France produit 70% de son électricité par le nucléaire — mais n'extrait plus un gramme d'uranium sur son sol depuis 2001. Les centrales françaises ont besoin d'uranium importé à 100%.↵↵UNE DÉPENDANCE CONCENTRÉE ET FRAGILE↵Entre avril 2024 et mars 2025, plus de 14 000 tonnes d'uranium ont été importées, principalement du Kazakhstan, du Niger et d'Ouzbékistan. Pire : sur l'uranium enrichi, près de 20% provient de Russie. Sur dix ans, la France a importé 88 200 tonnes d'uranium naturel concentrées sur 4 pays : Kazakhstan (27%), Niger (","sol":"FAIRE DE L'URANIUM UNE PRIORITÉ DE SOUVERAINETÉ NATIONALE↵↵Au même titre que la défense, l'approvisionnement en uranium doit devenir un enjeu stratégique de premier rang.↵↵CONSTITUER UN STOCK STRATÉGIQUE NATIONAL↵Cinq ans de consommation stockés et gérés par l'État, comme les réserves pétrolières, pour absorber tout choc d'approvisionnement et donner le temps de réorienter les contrats sans rupture.↵↵DIVERSIFIER VERS DES DÉMOCRATIES STABLES↵Renforcer les contrats avec le Canada et l'Australie, qui détiennent d'énormes réserves, pour réduire la dépendance aux zones sous influence russo-chinoise.↵↵METTRE FIN À LA DÉPENDANCE RUSSE SUR L'ENRICHISSEMENT↵Investir dans les capacités d'Orano (usine ","l":"✅ Légal — contrats commerciaux + relance minière encadrée par le Code minier","k":["Constituer un stock stratégique national de 5 ans de consommation d'uranium, géré par l'État comme les réserves pétrolières","Diversifier les contrats vers le Canada et l'Australie — démocraties stables aux réserves importantes — pour sortir de la dépendance russo-chinoise","Investir dans l'usine d'enrichissement Orano du Tricastin pour mettre fin à la dépendance russe sur l'uranium enrichi (20% des volumes aujourd'hui)","Soutenir le recyclage du combustible usé (MOX) qui réduit de 25% le besoin d'uranium neuf","Étudier la réouverture encadrée de gisements français (Limousin, Forez, Vendée) selon les normes environnementales actuelles"],"con":[{"q":"Rouvrir des mines d'uranium en France, c'est un désastre écologique","r":"La réouverture n'est qu'une option à étudier, soumise aux normes environnementales strictes d'aujourd'hui — très différentes de celles des années 1980. La priorité reste le stock stratégique et le recyclage MOX, qui réduit déjà le besoin d'uranium neuf de 25% sans nouvelle extrac"},{"q":"On ne peut pas se passer du Kazakhstan ni de la Russie du jour au lendemain","r":"Exact, c'est précisément le rôle du stock stratégique de 5 ans : il donne le temps de réorienter les contrats vers le Canada et l'Australie sans aucune rupture d'approvisionnement. La souveraineté se construit progressivement, pas par un claquement de doigts."},{"q":"L'uranium ne représente qu'une faible part du coût de l'électricité, pourquoi s'inquiéter ?","r":"Le problème n'est pas le coût mais le risque de rupture. Si nos fournisseurs basculent sous contrôle russe ou chinois, ils peuvent couper le robinet pour faire pression sur la France. Dépendre à 100% de l'étranger pour 70% de notre électricité est une vulnérabilité stratégique ma"}]},{"id":177,"t":"Expulsion accélérée des squatteurs — protéger réellement les propriétaires","c":"Sécurité","e":"🏠🔑","s":"ambitieux","a":"⚖️ NEUTRE — coût administratif marginal, compensé par la réduction des procédures judiciaires longues","sig":"neutre","sit":"LA LOI EXISTE, MAIS L'EXPULSION RESTE TROP LENTE DANS LES FAITS↵↵La loi Kasbarian du 27 juillet 2023 a beaucoup progressé : procédure administrative via le préfet, sanctions portées à 45 000€ d'amende et 3 ans de prison, fin de la trêve hivernale pour les squatteurs, extension aux résidences secondaires et aux logements vacants.↵↵MAIS DANS LA PRATIQUE, ÇA COINCE↵Le délai de réponse préfectoral est de 48 à 72 heures, puis l'évacuation intervient sous 3 à 10 jours — quand tout se passe bien. De nombreux squats continuent pourtant de perdurer car les démarches restent longues et complexes, comme ","sol":"RENDRE LA LOI RÉELLEMENT EFFECTIVE, SANS TOUCHER AUX LOCATAIRES DE BONNE FOI↵↵L'objectif n'est pas une nouvelle loi mais l'application réelle de la loi existante, tout en préservant les protections des locataires en difficulté.↵↵GARANTIR LE DÉLAI DE 72 HEURES DANS LES FAITS↵Obliger le préfet à statuer sous 72 heures et à mobiliser les forces de l'ordre sous 48 heures après décision, avec un recours hiérarchique automatique si le préfet ne répond pas dans les délais.↵↵GUICHET UNIQUE ANTI-SQUAT DANS CHAQUE PRÉFECTURE↵Un interlocuteur dédié qui accompagne le propriétaire dans la constitution du dossier (preuve de propriété, dépôt de plainte) pour éviter les blocages administratifs qui font perd","l":"✅ Légal — renforce la loi Kasbarian de 2023 (loi n°2023-668)","k":["Garantir le délai de 72h : préfet obligé de statuer sous 72h, forces de l'ordre mobilisées sous 48h, recours hiérarchique automatique en cas de non-réponse","Créer un guichet unique anti-squat dans chaque préfecture pour accompagner le propriétaire dans la constitution de son dossier","Présomption de propriété élargie : l'acte notarié ou la taxe foncière suffisent à déclencher la procédure, sans prouver qu'on habitait les lieux","Indemnisation du préjudice : le squatteur condamné rembourse loyers perdus et dégradations par saisie sur revenus futurs","Distinguer fermement squatteur (expulsé sans délai) et locataire de bonne foi en difficulté (protégé et orienté vers le Fonds de Solidarité Logement)"],"con":[{"q":"Vous allez jeter des familles à la rue","r":"La proposition distingue clairement le squatteur (intrusion illégale) du locataire en difficulté (protégé et accompagné par le Fonds de Solidarité Logement). On ne touche pas aux locataires de bonne foi — on cible ceux qui occupent illégalement le domicile d'autrui, souvent au dé"},{"q":"La loi Kasbarian existe déjà, à quoi bon en rajouter ?","r":"La loi existe mais son application reste lente dans les faits — de nombreux squats perdurent malgré elle. Notre proposition ne crée pas une nouvelle loi : elle rend la loi existante réellement effective par des délais contraignants pour le préfet et un guichet unique d'accompagne"},{"q":"Et les sans-abri qui n'ont nulle part où aller ?","r":"La réponse au mal-logement, c'est la construction de logements et l'hébergement d'urgence, traités ailleurs dans le programme. Ce n'est pas l'occupation illégale du domicile d'un particulier — qui est souvent lui-même un propriétaire modeste ayant économisé toute sa vie pour ce b"}]},{"id":178,"t":"Résilience climatique du parc nucléaire — adapter les centrales aux canicules","c":"Énergie","e":"⚛️🌡️","s":"ambitieux","a":"➖ ~250 M€/an sur 15 ans (≈3-4 Md€ total) — socle Grand chaud déjà budgété 612 M€ + conversions ciblées 500 M€/réacteur — financé par EDF et le Fonds Souverain","sig":"moins","sit":"LE NUCLÉAIRE FRANÇAIS FACE AU MUR DES CANICULES↵↵Les centrales nucléaires ont besoin d'eau pour évacuer leur chaleur. Quand un fleuve est trop chaud ou trop bas, EDF doit réduire ou arrêter la production pour ne pas dépasser les seuils qui protègent la faune aquatique — à Golfech, la limite est de 28°C sur la Garonne.↵↵UN IMPACT AUJOURD'HUI MARGINAL, MAIS QUI VA CROÎTRE↵Les pertes de production pour cause environnementale (chaleur, faible débit) représentent en moyenne 0,3% de la production annuelle du parc depuis 2000 — donc faible aujourd'hui. Mais des arrêts ont déjà eu lieu en 2018, 2019, ","sol":"ADAPTER LE PARC EXISTANT, SANS PRÉTENDRE À LA SOLUTION MIRACLE↵↵L'objectif est de réduire fortement l'impact des canicules sur la production — en sachant qu'on ne peut pas le ramener totalement à zéro.↵↵ACCÉLÉRER LE PROGRAMME GRAND CHAUD D'EDF↵EDF a déjà lancé ce programme pour rehausser les seuils de fonctionnement des équipements par forte chaleur. L'État actionnaire le finance et l'accélère, en priorité lors des visites décennales des réacteurs de 900 MW.↵↵CONVERTIR LES RÉACTEURS LES PLUS EXPOSÉS EN CIRCUIT FERMÉ↵Un circuit fermé avec tour aéroréfrigérante prélève 25 fois moins d'eau (2 m³/s contre 50) et ses rejets thermiques sont quasi négligeables. Convertir progressivement les réacteu","l":"✅ Légal — relève de la politique énergétique de l'État actionnaire d'EDF","k":["Accélérer et financer le programme Grand chaud d'EDF lors des visites décennales des réacteurs de 900 MW","Convertir progressivement en circuit fermé (tour aéroréfrigérante) les réacteurs en circuit ouvert les plus exposés sur la Garonne, la Loire et la Vienne","Augmenter les capacités d'entreposage des effluents pour décaler les rejets aux heures fraîches plutôt que d'arrêter les réacteurs","Optimiser le calendrier de maintenance pour concentrer les arrêts programmés sur l'été","Développer la récupération de chaleur fatale vers des réseaux de chauffage urbain et des serres agricoles"],"con":[{"q":"Le nucléaire est foutu à cause du réchauffement, autant en sortir","r":"C'est faux : l'impact actuel est de 0,3% de la production seulement, et il n'y a jamais de risque de sûreté. Le nucléaire reste la colonne vertébrale d'une électricité décarbonée. Le réchauffement impose de l'adapter, pas de l'abandonner — sortir du nucléaire nous renverrait au g"},{"q":"Convertir les centrales en circuit fermé coûte une fortune","r":"C'est vrai, c'est pourquoi on ne le fait pas partout : on cible les réacteurs les plus exposés sur les fleuves sensibles, pas tout le parc. Pour les autres, des mesures moins lourdes suffisent (programme Grand chaud, entreposage, calendrier de maintenance). Et le coût est amorti "},{"q":"Les tours aéroréfrigérantes consomment encore plus d'eau par évaporation","r":"C'est exact et on le dit honnêtement : le circuit fermé prélève 25 fois moins d'eau mais en évapore une partie qui ne retourne pas au fleuve. C'est un arbitrage : moins de prélèvement et moins de rejets chauds, mais une consommation nette d'eau. C'est pertinent sur les fleuves où"}]}];
