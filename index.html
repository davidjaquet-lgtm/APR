fonctionne pas","r":"Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est inefficace."},{"q":"Les droits fondamentaux seront bafoués","r":"Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes comparables."}]},{"id":36,"t":"Frontières solides — +3 000 PAF, 200 drones, 50 vedettes, biométrie — dans le cadre Schengen","c":"Sécurité","e":"🛂🚁","s":"ambitieux","a":"⚖️ +800 M€ à +1,5 Md€/an — solution opérationnelle sans sortir de Schengen","sig":"neutre","sit":"La France maintient des contrôles aux frontières depuis novembre 2015 — validés par le Conseil d'État en mars 2025 sous le règlement Schengen réformé de juin 2024. Le problème est 100% opérationnel : les contrôles existent sur le papier, pas les moyens humains et technologiques pour les rendre réels","sol":"La France a réintroduit les contrôles aux frontières en 2015 suite aux attentats. Elle dispose légalement de la clause de sauvegarde Schengen. Mais sans les moyens humains et technologiques correspondants, ces contrôles sont symboliques. +3 000 agents PAF, 200 drones, 50 vedettes maritimes — ce sont","l":"✅ Légal — dans le cadre Schengen actuel, sans en sortir","k":["🚔 +3 000 agents PAF supplémentaires — déployés en priorité sur les 5 points chauds (Vintimille, Pyrénées, Calais/Dunkerque, frontière belge, Strasbourg)","🛩️ 200 drones de surveillance longue endurance — couverture 24h/24 des zones de passage irrégulier, transmission en temps réel aux unités d'interception","⛵ +50 vedettes maritimes PAF/douanes — renforcement Méditerranée (Vintimille, PACA), Manche (Calais, Dunkerque) et Atlantique","📡 Capteurs sismiques et caméras IA sur les 500 km de frontières terrestres sensibles — détection automatique des passages hors points officiels","🛂 Biométrie systématique à tous les points de passage : reconnaissance faciale, scan documentaire instantané, interopérabilité Europol/Interpol en temps réel"],"con":[{"q":"C'est une politique qui stigmatise les populations","r":"Les premières victimes de l'insécurité sont les habitants des quartiers touchés. Ils demandent plus de sécurité. Protéger ces quartiers n'est pas les stigmatiser — c'est leur rendre la liberté."},{"q":"La répression seule ne fonctionne pas","r":"Exact — le programme associe systématiquement répression (peines effectives) et prévention (réinsertion, école, emploi). L'un sans l'autre est inefficace."},{"q":"Les droits fondamentaux seront bafoués","r":"Le cadre constitutionnel et la supervision judiciaire s'appliquent pleinement. Chaque mesure a des précédents dans des démocraties européennes comparables."}]},{"id":169,"t":"Immigration par les compétences — modèle australien et néo-zélandais adapté à la France","c":"Sécurité","e":"🌏🎯🇦🇺","s":"ambitieux","a":"⚖️ Immigration utile : +50 000 travailleurs qualifiés/an ciblés — réduction immigration subie","sig":"neutre","sit":"LA FRANCE CHOISIT PEU ET INTÈGRE MAL↵↵La France accueille chaque année environ 320 000 immigrants légaux (hors UE). La répartition est révélatrice du problème : 30% pour le travail, 35% pour le regroupement familial, 20% pour l'asile et 15% pour les étudiants. La grande majorité de l'immigration économique ne passe par aucune sélection sur les compétences ou les besoins du marché du travail.↵↵Résultat : la France a simultanément 500 000 offres d'emploi non pourvues dans des secteurs en tension (santé, BTP, hôtellerie-restauration, agriculture) ET un taux de chômage des immigrés de 15 à 18% (de","sol":"LE MODÈLE COMBINÉ AUSTRALIE + NOUVELLE-ZÉLANDE ADAPTÉ↵↵VOLET 1 — SYSTÈME DE POINTS À LA FRANÇAISE (modèle australien Subclass 189)↵L'Australie sélectionne ses migrants permanents par un système de points sur 100 critères mesurables. La France adopte un système équivalent — transparent, objectif, opposable :↵↵Points attribués sur :↵• Compétences professionnelles (liste des métiers en tension actualisée chaque trimestre) — 30 pts max↵• Niveau de langue française (TCF/DELF) — 20 pts max↵• Âge (25-32 ans optimum) — 15 pts max↵• Formation et diplômes reconnus en France — 15 pts max↵• Expérience professionnelle (en France ou dans un pays partenaire) — 10 pts max↵• Emploi confirmé avec contrat fran","l":"✅ Légal — loi ordinaire sur l'immigration + révision des critères d'admission","k":["Créer le système de points français (65 points minimum sur 100) — transparent, publié, mis à jour chaque trimestre en fonction des besoins réels du marché du travail","Green List française : résidence permanente directe en 6 mois pour les 50 métiers les plus en tension — médecins, ingénieurs nucléaires, chercheurs IA, enseignants en REP+","Quota annuel voté au Parlement : 110 000 visas permanents/an répartis par catégorie (50 000 travail + 30 000 famille + 20 000 humanitaire + 10 000 talents)","Visa travail conditionné à l'emploi actif — perd sa validité après 6 mois de chômage sans formation engagée (modèle néo-zélandais AEWV)","Contrat d'intégration renforcé : français niveau B1 obligatoire dans les 2 ans, formation civique certifiante, suivi individualisé par France Travail"],"con":[{"q":"C'est du tri ethnique déguisé — vous choisissez les immigrés selon leur origine","r":"Le système de points est strictement ethniquement neutre — il ne contient aucun critère d'origine nationale ou ethnique. Un médecin sénégalais qui parle français couramment, a son diplôme reconnu et une offre d'emploi obtient 90 points. Un ingénieur canadien sans emploi obtient 4"},{"q":"Vous allez casser le regroupement familial — c'est un droit fondamental","r":"Le regroupement familial reste intact dans le quota (30 000 visas/an). Les conjoints et enfants des résidents légaux de plus de 5 ans peuvent rejoindre en France. Ce que nous limitons c'est le regroupement familial étendu (frères, parents, cousins) qui n'est pas un droit fondamen"},{"q":"L'Australie a eu des problèmes avec son système — pourquoi le copier ?","r":"L'Australie a eu des problèmes de VOLUME — trop de migrants temporaires (étudiants, saisonniers) qui restent et créent une pression sur le logement. Le système de points en lui-même fonctionne parfaitement : 85% des migrants admis par points sont en emploi dans l'année. La leçon "}]},{"id":37,"t":"Plan démographique retraites — 6 leviers pour sauver la répartition","c":"Retraites","e":"👶📈🧓","s":"urgent","a":"➖➕ Investissement : 3 à 5 Md€/an vers le FRR — recettes : +1,8 Md€ An 1 → +6 Md€ An 5 → +10,5 Md€ An 10","sig":"mixte","sit":"LE SYSTÈME DE RÉPARTITION EN DANGER — DIAGNOSTIC PAR LEVIER↵↵Déficit actuel : 5 Md€/an. Déficit projeté 2035 : 15 Md€/an. La réforme Macron traite le problème avec un seul levier (âge légal) pour 1,5 Md€/an d'économies. Six leviers existent — un seul a été activé.↵↵POURQUOI 6 LEVIERS ET PAS UN SEUL ?↵Chaque levier a ses limites. L'âge légal seul crée de l'injustice. La natalité seule prend 25 ans. La CSG capital seule ne suffit pas. Activés ensemble, les six leviers génèrent 10 à 21 milliards en An 10 — suffisant pour équilibrer le système sans injustice sociale.↵↵DÉLAIS RÉELS DE CHAQUE LEVIER","sol":"LES 6 LEVIERS EN DÉTAIL — CHIFFRÉS ET DATÉS↵↵LEVIER 1 — CSG PROGRESSIVE SUR LES REVENUS DU CAPITAL (An 1 : +1,5 Md€)↵Flat tax uniforme actuelle à 31,4% quelle que soit la taille du revenu. APR applique la progressivité au-delà de 100 000€ : 36% de 100 à 250 000€, 40% de 250 à 600 000€, 45% au-delà. En dessous de 100 000€ — bailleurs avec 6 appartements et moins, petits épargnants — rien ne change. Gain fléché vers les retraites : +1,5 Md€/an dès An 1.↵↵LEVIER 2 — EMPLOI DES SENIORS (An 3 : +2 Md€ / An 5 : +3 Md€)↵Taux d'emploi 55-64 ans : 58% en France vs 70% Allemagne, 74% Suède. Objectif APR : 65% d'ici An 5. Outils : index seniors avec sanctions réelles, aménagement de poste obligatoire s","l":"✅ Légal — PLF + PLFSS + loi organique pour la règle d or","k":["CSG progressive > 100 000€ de revenus du capital : loi votée en Mois 6 — +1,5 Md€/an fléchés vers la CNAV immédiatement","Index seniors obligatoire avec sanction réelle : 1% de la masse salariale pour les entreprises > 50 salariés qui n'atteignent pas 65% de maintien en emploi des 55-64 ans","FRR réarmé : 15% des recettes de fraude fiscale récupérée fléchés vers le FRR — objectif 40 Md€ en 10 ans, 100 Md€ en 20 ans","Réindustrialisation : les leviers économiques (permis 6 mois, fonds régionaux, commandes publiques 50% françaises) génèrent des cotisations supplémentaires à partir d'An 5","Superannuation obligatoire : 3% du salaire brut (2% employeur + 1% salarié) — plafond 5 SMIC — capital individuel transmissible"],"con":[{"q":"Vos leviers ne compensent pas immédiatement le coût de la retraite à 60 ans","r":"Exact — et on le dit. En An 1 : +1,8 Md€ de recettes pour −5 Md€ de coût. Déficit net de 3,2 Md€ pendant 4 ans, couvert par l'excédent global du programme (+17,6 Md€ An 1). En An 5 : équilibre propre atteint sur la retraite à 60 ans. Nous sommes le seul programme qui donne la tra"},{"q":"La natalité et le FRR ne servent à rien sur le quinquennat","r":"C'est honnêtement vrai pour le quinquennat. Mais un programme de gouvernement sérieux doit penser à 20 ans, pas seulement à 5. Le FRR génère ses effets à An 10. La natalité à An 25. Ce sont des investissements inter-générationnels — pas des promesses à court terme."},{"q":"L'emploi des seniors est une belle intention mais les entreprises ne jouent pas le jeu","r":"Sans sanction, c'est une belle intention. Avec sanction réelle (1% de la masse salariale pour les entreprises qui ne maintiennent pas leurs seniors), les entreprises s'adaptent. L'Allemagne a atteint 70% de taux d'emploi 55-64 ans avec des outils similaires. La France à 58% n'est"}]},{"id":38,"t":"Réduction du déficit public — trajectoire crédible vers 3% du PIB","c":"Économie","e":"📉💶","s":"urgent","a":"⚖️ Objectif : réduire le déficit de 152 Md€ (2025) à <70 Md€ (3% PIB) en 5 ans — effort de 80 Md€","sig":"neutre","sit":"Situation : déficit 2025 = 152,5 Md€ soit 5,1% du PIB. Dette = 3 416 Md€ = 115,6% du PIB. Charges d'intérêts : déjà >60 Md€/an, cap vers 100 Md€/an d'ici 2029 si rien n'est fait (Cour des comptes). Objectif du programme : retour sous 3% du PIB (≈70 Md€ de déficit) d'ici 2030, soit réduction de 80 Md","sol":"La France a un déficit structurel depuis 1975 — 50 ans de gouvernements qui promettent financé par la dette et laissent la facture aux suivants. Résultat : 3 300 Md€ de dette, 55 Md€ d'intérêts par an (plus que le budget de l'Éducation nationale). L'Allemagne a inscrit la règle d'or dans sa Constitu","l":"✅ Légal — engagement européen (Pacte de stabilité) + loi de programmation des finances publiques","k":["📋 Règle d'or constitutionnelle : inscrire dans la Constitution l'obligation de réduire le déficit de 0,5 point de PIB par an jusqu'à 3% — rendre la trajectoire contraignante et cr","🔍 Fraude fiscale : +5 à 15 Md€/an (déjà dans le programme) — levier le plus rentable, sans toucher aux contribuables honnêtes","⚡ Merit order nucléaire : +7 à 13 Md€/an de gain économique (déjà dans le programme) — réduit la dépense des ménages et améliore la compétitivité","✂️ Niches fiscales inefficaces : +5 à 15 Md€/an (déjà dans le programme) — supprimer les avantages fiscaux sans contrepartie prouvée","🏛️ Doublons territoriaux et opérateurs : +4 à 10 Md€/an (déjà dans le programme) — simplification sans impact services"],"con":[{"q":"Le coût est trop élevé pour les finances publiques","r":"Cette mesure (Objectif : réduire le déficit de 152 Md€ (2025) à <70 Md€ (3% PIB) en 5 ans) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde budgétaire global reste excédentaire dès 2026."},{"q":"Cela va créer de l'inflation","r":"La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le cas ici."},{"q":"Ce n'est pas le rôle de l'État","r":"L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger."}]},{"id":39,"t":"Plan national de patriotisme et cohésion — hommage aux serviteurs de la France","c":"République","e":"🇫🇷🏅","s":"ambitieux","a":"⚖️ Coût quasi nul — impact symbolique et unificateur maximal","sig":"neutre","sit":"Mesure de cohésion nationale sans coût budgétaire significatif. Budget estimé : 2 à 5 M€/an (organisation cérémonies, production vidéos, logistique stades). La France dépense des centaines de millions pour des spectacles sportifs — rendre hommage à ceux qui ont servi le pays ne coûte presque rien.","sol":"Le patriotisme n'est pas du nationalisme. C'est un lien civique et affectif avec une communauté nationale. Ce lien s'érode quand les institutions ne valorisent plus ceux qui servent le collectif. La France honore les grands noms au Panthéon mais n'a pas de mécanisme pour honorer les gens ordinaires","l":"✅ Légal — initiative gouvernementale, aucun texte requis","k":["🏟️ Avant chaque match équipe de France : hommage de 2 min sur grand écran à un Français qui a servi le pays — présenté par le capitaine de l'équipe","🎖️ Catégories représentées : militaires blessés en OPEX, pompiers, soignants, enseignants, agriculteurs, policiers, entrepreneurs créateurs d'emplois en France","📺 Diffusion nationale obligatoire sur les chaînes qui retransmettent le match — 10-20 millions de téléspectateurs touchés à chaque fois","🏫 Programme 'Héros de la République' dans les écoles : 1 heure/an dédiée à des témoignages de Français exemplaires — anciens combattants, pompiers, soignants en classe","🎗️ Cérémonie nationale annuelle du 8 mai enrichie : remettre une 'Médaille de la République' à 100 Français choisis parmi des nominations citoyennes"],"con":[{"q":"C'est populiste","r":"Rendre les comptes publics transparents, permettre aux citoyens de s'exprimer directement sur les grandes questions — c'est de la démocratie, pas du populisme. Le populisme c'est promettre sans compter. Nous chiffrons tout."},{"q":"Ça va créer de l'instabilité","r":"La Suisse pratique le RIC depuis 1891 et est la démocratie la plus stable et la plus compétitive du monde. L'instabilité ne vient pas de la démocratie directe — elle vient des promesses sans contrepartie."},{"q":"Les citoyens ne sont pas compétents pour voter sur des sujets complexes","r":"Les citoyens suisses votent régulièrement sur des sujets complexes (énergie, fiscalité, immigration) avec des résultats souvent plus sages que les décisions parlementaires. Et les sujets techniques sont exclus du RIC — seules les grandes orientations sont soumises."}]},{"id":40,"t":"Plan national de réindustrialisation — objectif 12% du PIB industriel d'ici 2035","c":"Économie","e":"🏭⚙️","s":"urgent","a":"➖➕ Investissement public : +3 à 5 Md€/an — effet de levier privé estimé ×5 à ×8","sig":"mixte","sit":"La part industrielle du PIB français est passée de 14% en 2000 à 9,5% en 2025 — sous la barre des 10%, seuil critique d'une économie désindustrialisée. Le déficit commercial en biens manufacturés atteint 90 Md€/an. France 2030 a alloué 70% de ses 54 Md€ aux technologies de rupture (start-ups, gigafactories) qui ne représentent que 30% du potentiel de réindustrialisation.","sol":"Rééquilibrage vers les PMI et ETI existantes (Lluansi) : 60% des aides vers elles. Fonds Régionaux Industriels (1% assurance-vie = 18-20 Md€). Sanctuariser 25 000 ha de foncier industriel 10 ans. Commande publique 50% française. Réduction impôts de production (CVAE, CFE, C3S = 77 Md€/an — 3 à 5× plus qu'en Allemagne). Campagne nationale 'Construire la France' pour l'image des métiers industriels.","l":"✅ Légal — loi de finances + décrets simplification + stratégie France 2030 amplifiée","k":["⚡ Avantage énergie : le merit order nucléaire (proposition 04) = 30€/MWh moins cher qu'en Allemagne — le meilleur argument de localisation industrielle en Europe","📋 Choc de simplification radicale : délai max 6 mois pour tout permis de construire industriel (vs 17 mois en moyenne) — créer un guichet unique préfectoral 'Industrie France'","🏭 Zones franches industrielles : IS à 0% pendant 5 ans pour toute usine créée dans un bassin d'emploi sinistré + exonérations sociales employeur 3 ans","🎓 Plan formation massif : 100 000 apprentis industriels supplémentaires/an sur les métiers en tension (soudeurs, opérateurs CNC, techniciens de maintenance, électriciens industrie","🛡️ Préférence nationale dans les marchés publics : 50% de la commande publique industrielle (30 Md€/an) réservée aux entreprises produisant en France — dans le cadre légal europée"],"con":[{"q":"Le coût est trop élevé pour les finances publiques","r":"Cette mesure (Investissement public : +3 à 5 Md€/an) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde budgétaire global reste excédentaire dès 2026."},{"q":"Cela va créer de l'inflation","r":"La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le cas ici."},{"q":"Ce n'est pas le rôle de l'État","r":"L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger."}]},{"id":41,"t":"Fiscalité réduite pour les PME + aide à l'investissement productif","c":"Économie","e":"💼📉","s":"ambitieux","a":"➖➕ Coût fiscal : −2 à −4 Md€/an — effet multiplicateur estimé : +8 à 15 Md€ d'investissement privé levé","sig":"mixte","sit":"Les PME représentent 99,8% des entreprises françaises, 48% de l'emploi, 43% de la valeur ajoutée. Problèmes actuels : CVAE (suppression programmée en 2030 après report) = charge toujours présente, CFE pesant lourdement sur les PMI, taux IS 25% identique aux grandes entreprises pour les tranches haut","sol":"Une PME qui gagne 100 000€ de bénéfice paie 15% d'IS sur les premiers 38 120€ et 25% sur le reste — pour un taux effectif de 21%. Une multinationale qui gagne 10 milliards optimise fiscalement pour payer moins de 15%. Ce n'est pas de l'équité fiscale — c'est une fiscalité régressive qui pénalise les","l":"✅ Légal — loi de finances ordinaire","k":["📉 IS PME : taux réduit à 15% étendu aux 100 000 premiers euros de bénéfices (vs 42 500€ actuellement) — impôt allégé sur la partie réinvestie dans l'entreprise","🏭 Suppression CVAE accélérée à 2027 (déjà programmée pour 2030) + suppression totale CFE pour les PMI de moins de 50 salariés","🔬 CII relevé à 30% (vs 20% actuel après baisse de 2025) — revaloriser l'innovation des PME, pas la brider","💰 IR-PME renforcé : plafond relevé à 25 000€ de réduction/an (vs 10 000€) + taux à 25% permanent — attirer les investisseurs vers les PME françaises","🤖 Crédit d'impôt robotisation-numérisation : 40% des investissements en équipements productifs pour les PME <250 salariés — combler le retard de robotisation vs Allemagne"],"con":[{"q":"Le coût est trop élevé pour les finances publiques","r":"Cette mesure (Coût fiscal : −2 à −4 Md€/an) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde budgétaire global reste excédentaire dès 2026."},{"q":"Cela va créer de l'inflation","r":"La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le cas ici."},{"q":"Ce n'est pas le rôle de l'État","r":"L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger."}]},{"id":53,"t":"Nouvelles recettes pour les mairies — sans toucher à la taxe foncière","c":"Économie","e":"🏛️💰","s":"ambitieux","a":"➕ Gain estimé pour les communes : +2,5 à 5 Md€/an de recettes nouvelles — sans taxe sur les propriétaires","sig":"plus","sit":"Contexte : 82% des communes ont maintenu leur taux de taxe foncière en 2024, mais 17% l'ont augmenté sous pression budgétaire. La DGF reste stable à 27,2 Md€ mais baisse en euros constants. Depuis 2018 : suppression taxe d'habitation (−23 Md€), puis CVAE (−8 Md€). La TF est devenue le seul levier lo","sol":"Cette mesure (Nouvelles recettes pour les mairies) répond à une défaillance documentée. Contexte : 82% des communes ont maintenu leur taux de taxe foncière en 2024, mais 17% l'ont augmenté sous pression budgétaire. La DGF reste stable à 2. L'impact estimé est Gain estimé pour les communes : +2,5 à 5","l":"✅ Légal — loi de finances + décrets collectivités","k":["📈 Fraction de TVA locale : augmenter de 0,5 à 1 point pour le bloc communal = +2,5 à 5 Md€/an distribués selon l'activité économique locale","🏗️ Bonus construction : dotation bonifiée +15% pour les communes qui autorisent la construction de nouveaux logements — inciter à construire plutôt que taxer","📡 Redevance occupation domaine public numérique : antennes 5G, data centers, tuyaux fibre sur emprise communale = +200-400 M€/an","🚴 Redevance plateformes livraison (Uber Eats, Deliveroo) : 0,10€ par livraison sur voirie communale = +20-40 M€/an pour les communes concernées — modeste mais symbolique","☀️ Revenus EnR bâtiments communaux : installer panneaux solaires sur toutes les toitures publiques — revenu estimé 500 M€/an + économies sur factures énergie"],"con":[{"q":"Le coût est trop élevé pour les finances publiques","r":"Cette mesure (Gain estimé pour les communes : +2,5 à 5 Md€/an de recettes nouvelles) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde budgétaire global reste excédentaire dès 2026."},{"q":"Cela va créer de l'inflation","r":"La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le cas ici."},{"q":"Ce n'est pas le rôle de l'État","r":"L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger."}]},{"id":54,"t":"Plan pouvoir d'achat des particuliers — 10 leviers concrets","c":"Pouvoir d'achat","e":"💰🛍️","s":"urgent","a":"➕ Gain moyen estimé : +1 200 à +2 500€/an par foyer selon revenus","sig":"plus","sit":"Synthèse de tous les leviers du programme qui améliorent directement le pouvoir d'achat des ménages : (1) Baisse IR classes moyennes : +300 à 800€/an. (2) Merit order nucléaire : −150 à 280€/an sur facture électricité. (3) Panier 100 produits prix coûtant : −200 à 400€/an famille. (4) TVA bio réduit","sol":"Cette mesure (Plan pouvoir d'achat des particuliers) répond à une défaillance documentée. Synthèse de tous les leviers du programme qui améliorent directement le pouvoir d'achat des ménages : (1) Baisse IR classes moyennes : +300 à 800€/an.. L'impact estimé est Gain moyen estimé : +1 200 à +2 500€/a","l":"✅ Légal — ensemble de mesures du programme","k":["💳 Baisse IR : +300 à 800€/an pour les classes moyennes (tranche 11% → 9%, nouvelle tranche 24% jusqu'à 50k€)","⚡ Merit order nucléaire : −150 à 280€/an sur la facture électricité pour les 30 millions de foyers","🛒 Panier 100 produits à prix coûtant : −200 à 400€/an pour une famille de 4 en grande distribution","🚌 Gratuité transports mineurs : −300 à 600€/an pour les familles avec enfants scolarisés","🏭 Baisse cotisations patronales → partage des gains en salaires : objectif +2 à 3% de salaire net moyen sur 3 ans"],"con":[{"q":"Ces mesures ne profiteront qu'aux riches","r":"La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coûtant concerne les produits de base. Ce sont des mesures universelles à effet proportionnellement plus fort pour les ménages modeste"},{"q":"Cela va alimenter l'inflation","r":"Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop peu de biens — ici on augmente le pouvoir d'achat réel sans création monétaire."},{"q":"L'État ne peut pas intervenir sur les prix","r":"L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autres secteurs en défaillance de marché est légal et légitime."}]},{"id":51,"t":"Baisse de l'impôt sur le revenu pour les classes moyennes","c":"Économie","e":"💳📉","s":"ambitieux","a":"➖➕ Coût : −3 à −6 Md€/an — financé par les gains de fraude fiscale","sig":"mixte","sit":"Barème IR 2026 actuel : 0% jusqu'à 11 600€, 11% de 11 600€ à 29 580€, 30% de 29 580€ à 84 577€, 41% jusqu'à 180 000€, 45% au-delà. 20,2 millions de foyers imposables sur 40 millions. La contribution différentielle sur les hauts revenus (taux minimum 20% pour les très hauts revenus) a été reconduite","sol":"Cette mesure (Baisse de l'impôt sur le revenu pour les classes moyennes) répond à une défaillance documentée. Barème IR 2026 actuel : 0% jusqu'à 11 600€, 11% de 11 600€ à 29 580€, 30% de 29 580€ à 84 577€, 41% jusqu'à 180 000€, 45% au-delà. 20,2 millions de fo. L'impact estimé est Coût : −3 à −6 Md€","l":"✅ Légal — loi de finances ordinaire","k":["Relever le seuil de la tranche à 0% : 11 600€ → 13 500€ — gain 200 à 350€/an pour 8 millions de foyers modestes","Abaisser la tranche à 11% → 9% : gain 300 à 500€/an pour les salariés entre 1 SMIC et 2 500€ bruts/mois","Créer une tranche à 24% entre 29 580€ et 50 000€ (vs 30% actuellement) : gain 500 à 800€/an pour la classe moyenne","Indexer le barème sur l'inflation réelle chaque année sans exception — fin des gels déguisés","Maintenir les tranches à 41% et 45% inchangées — cohérence avec l'objectif de réduction du déficit"],"con":[{"q":"Le coût est trop élevé pour les finances publiques","r":"Cette mesure (Coût : −3 à −6 Md€/an) est financée par les recettes nouvelles : fraude fiscale +12 Md€, simplification −5 Md€. Le solde budgétaire global reste excédentaire dès 2026."},{"q":"Cela va créer de l'inflation","r":"La mesure augmente l'offre productive et réduit les coûts administratifs. L'inflation naît d'une demande sans offre correspondante — ce n'est pas le cas ici."},{"q":"Ce n'est pas le rôle de l'État","r":"L'État corrige les défaillances de marché documentées. Sans intervention, le marché a produit pendant 20 ans le résultat que nous voulons corriger."}]},{"id":52,"t":"Baisse des cotisations patronales — relancer l'emploi sans trappes à bas salaires","c":"Emploi","e":"🏭💼","s":"ambitieux","a":"➖➕ Coût brut : −3 à −5 Md€/an — effet emploi : +80 000 à +150 000 emplois = retour sur investissement positif","sig":"mixte","sit":"Situation actuelle : allègements généraux = 78,4 Md€ en 2024 (+30% depuis 2021). La LFSS 2025 a réformé le système en fusionnant les 3 dispositifs en une réduction générale dégressive unique jusqu'à 3 SMIC (vs 1,6 SMIC avant). Problème résiduel : les charges patronales restent à 42-45% du salaire br","sol":"Cette mesure (Baisse des cotisations patronales) répond à une défaillance documentée. Situation actuelle : allègements généraux = 78,4 Md€ en 2024 (+30% depuis 2021). La LFSS 2025 a réformé le système en fusionnant les 3 dispositifs en . L'impact estimé est Coût brut : −3 à −5 Md€/an — effet emploi","l":"✅ Légal — LFSS (loi de financement de la Sécurité sociale)","k":["Étendre la réduction générale des cotisations jusqu'à 2,5 SMIC (vs 1,6 actuellement dans l'ancien système) — cibler les salaires moyens","Palier intermédiaire : −5 points de cotisations entre 1,6 et 2,5 SMIC — inciter les entreprises à revaloriser sans coût prohibitif","Conditionner les allègements supplémentaires à une grille salariale revalorisée dans l'entreprise — pas d'aubaine sans contrepartie","Exonération totale de cotisations patronales pendant 3 ans sur les 5 premières embauches d'une TPE (<10 salariés) — lever le frein à la première embauche","Exonération spécifique 1 an pour tout CDD transformé en CDI — inciter à la stabilisation des emplois"],"con":[{"q":"Cela va augmenter le coût du travail","r":"La mesure est conçue pour être neutre sur le coût total du travail — redistribution entre types de coûts, pas augmentation nette. L'effet sur l'emploi est positif selon les modélisations."},{"q":"Les syndicats refuseront","r":"Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On négocie en bonne foi et on avance."},{"q":"Ça ne marche pas en France","r":"L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fonctionne dans le contexte français."}]},{"id":42,"t":"Grand âge et dépendance — 5e risque social enfin financé","c":"Santé","e":"👵🏠","s":"urgent","a":"⚖️ +4 à 6 Md€/an — besoin minimum identifié à 9-10 Md€/an d'ici 2030 selon le Haut Conseil","sig":"neutre","sit":"Situation catastrophique : 85% des EHPAD publics en déficit en 2023. 1,3 million de personnes dépendantes en 2024 → 4 millions en 2050 (doublement). 14,7 millions de Français de 65 ans ou plus (22% de la population). 18,6% des EHPAD refusent de nouvelles entrées faute de personnel. Coût moyen EHPAD","sol":"En 2026, avoir un proche en EHPAD coûte en moyenne 2 500€/mois dont 2 000€ à la charge de la famille — soit 24 000€/an. Pour une retraite médiane de 1 400€/mois, c'est mathématiquement impossible. Les familles vendent les biens patrimoniaux, s'endettent, ou placent leurs proches dans des structures","l":"✅ Légal — loi de financement de la Sécurité sociale + création d'une 5e branche autonomie","k":["💰 Reste à charge EHPAD plafonné à 1 500€/mois maximum — fin du scandale du reste à charge insupportable","🏠 Priorité domicile : tripler les heures d'aide à domicile financées par l'APA — 80% des seniors veulent rester chez eux","👩‍⚕️ Revalorisation aides-soignants et auxiliaires de vie : salaire minimum à 1 600€ net — fin du sous-SMIC dans le secteur","🧑‍🤝‍🧑 Statut d'aidant familial : congé aidant rémunéré à 60% du salaire, protection retraite complète (trimestres validés), droit au répit","🏗️ Création de 150 000 places nouvelles d'hébergement intermédiaire d'ici 2035 : résidences autonomie, habitat partagé, familles d'accueil — entre domicile et EHPAD"],"con":[{"q":"Le coût pour la Sécurité sociale est insoutenable","r":"Le coût de l'inaction est supérieur : un passage aux urgences non justifié coûte 250€, une consultation préventive 30€. Le programme de prévention est un investissement à ROI de 3 à 7 pour 1."},{"q":"Les professionnels de santé s'y opposeront","r":"Les jeunes médecins et infirmières plébiscitent les nouvelles formes d'exercice. Les syndicats des anciens s'opposent à chaque réforme depuis 50 ans. On négocie ET on avance."},{"q":"La qualité des soins va baisser","r":"La qualité est déjà dégradée par les déserts médicaux et la surcharge hospitalière. Un système avec 18 mois d'attente et des urgences saturées n'est pas un système de qualité."}]},{"id":43,"t":"Santé mentale — plan d'urgence national pour sortir du déni","c":"Santé","e":"🧠💚","s":"urgent","a":"➖ +1,5 à 3 Md€/an — coût de l'inaction estimé à 23 Md€/an (arrêts maladie + perte productivité)","sig":"moins","sit":"Chiffres alarmants : 13 millions de Français souffrent de troubles psychiques (1 sur 5). La santé mentale est le 1er poste de dépenses de l'Assurance maladie. Délais d'attente CMP : jusqu'à 18 mois. 1,6 million de mineurs présentent un trouble psychique — seulement 750 000 à 850 000 soignés. 8 dépar","sol":"13 millions de Français souffrent de troubles psychiques. 18 mois d'attente pour voir un pédopsychiatre. Un adolescent qui souffre et attend 18 mois risque le décrochage scolaire, l'addiction, le pire. Le coût économique est immense : la dépression coûte 109 Md€/an à l'économie française. Investir 1","l":"✅ Légal — PLFSS + plan national psychiatrie + grande cause nationale déjà proclamée","k":["🎓 Rendre la psychiatrie attractive : prime de 30 000€ à l'installation pour tout psychiatre s'installant en zone sous-dotée, revalorisation des actes de 40%","👦 Plan pédopsychiatrie d'urgence : tripler les postes de pédopsychiatres d'ici 2030, zéro département sans lit pour mineurs","🧑‍⚕️ Formation des médecins généralistes à la santé mentale : module obligatoire de 6 mois — ils voient 70% des troubles légers en premier recours","📱 Téléconsultation psychiatrique remboursée : réduire les délais de 18 mois à 3 mois via la télémédecine pour les cas non urgents","🏫 Infirmier en santé mentale dans chaque collège et lycée : 1 poste pour 500 élèves — détection précoce et intervention rapide"],"con":[{"q":"Le coût pour la Sécurité sociale est insoutenable","r":"Le coût de l'inaction est supérieur : un passage aux urgences non justifié coûte 250€, une consultation préventive 30€. Le programme de prévention est un investissement à ROI de 3 à 7 pour 1."},{"q":"Les professionnels de santé s'y opposeront","r":"Les jeunes médecins et infirmières plébiscitent les nouvelles formes d'exercice. Les syndicats des anciens s'opposent à chaque réforme depuis 50 ans. On négocie ET on avance."},{"q":"La qualité des soins va baisser","r":"La qualité est déjà dégradée par les déserts médicaux et la surcharge hospitalière. Un système avec 18 mois d'attente et des urgences saturées n'est pas un système de qualité."}]},{"id":44,"t":"Déserts médicaux — modèle finlandais : l'infirmière comme porte d'entrée aux soins","c":"Santé","e":"🩺🇫🇮","s":"urgent","a":"➖ +1,5 à 2,5 Md€/an — coût de l'inaction : 5 à 10 Md€/an d'urgences saturées","sig":"moins","sit":"6 millions de Français vivent dans un désert médical (zone sans médecin à moins de 30 min). 80 000 médecins supplémentaires manquent à l'appel. Délai moyen pour un rendez-vous chez un généraliste : 6 jours (vs 2 jours en 2012). Les Françaisrenoncent aux soins dans 26% des cas pour raisons financières ou géographiques. Le numerus clausus a limité les promotions pendant 30 ans — les effets se font sentir maintenant. Un généraliste libéral gagne en moyenne 7 400 à 8 100€ net/mois (CARMF 2024) — un salariat attractif doit s'aligner sur ce niveau, pas en dessous.","sol":"Modèle finlandais : infirmière comme 1ère porte d'entrée (60% des consultations gérables sans médecin). Médecin territorial salarié à 7 500€ net (niveau du libéral mais sans les charges ni le risque), jusqu'à 9 500€ net en zone très sous-dotée avec la prime de désert — package complet : cabinet équipé, logement de fonction, secrétariat, zéro paperasse. 116 117 universel pour éviter les urgences inutiles. Suppression du numerus clausus remplacée par des quotas régionaux. En parallèle : agents de santé communautaires dans les communes sans médecin.","l":"✅ Légal — loi ordinaire pour étendre les compétences IPA + décrets protocoles de soins","k":["🇫🇮 LE MODÈLE FINLANDAIS — Les 5 responsabilités de l'infirmière porte d'entrée :","1️⃣ TRIAGE : évalue la gravité dès l'arrivée, oriente vers le bon professionnel (infirmière, médecin, urgences, spécialiste) — sans attendre un médecin","2️⃣ SOINS COURANTS AUTONOMES : traite seule 50 pathologies courantes — otites, angines, cystites non compliquées, plaies simples, brûlures légères, conjonctivites, mycoses, gastroe","3️⃣ SUIVI DES MALADIES CHRONIQUES : assure le suivi régulier des diabétiques, hypertendus, insuffisants cardiaques stables — bilans, ajustements de traitement dans un protocole méd","4️⃣ PRÉVENTION ET SANTÉ PUBLIQUE : vaccinations, dépistages (tension, diabète, cancer colorectal, IST), éducation thérapeutique, suivi grossesse normale, santé infantile, santé des"],"con":[{"q":"Les infirmières ne peuvent pas remplacer les médecins","r":"Elles ne les remplacent pas — elles gèrent les 60% de consultations que les Finlandais leur confient depuis 40 ans : otites, angines, renouvellements d'ordonnances. Le médecin gère les 40% complexes."},{"q":"Le service territorial obligatoire 2 ans est une atteinte à la liberté","r":"3 ans d'incitations fortes AVANT toute obligation. Si les incitations suffisent (probable vu le salaire offert), l'obligation ne s'applique jamais. Les kinés en zones sur-dotées acceptent déjà des contraintes."},{"q":"Un médecin gagne plus en libéral, pourquoi accepterait-il un salaire ?","r":"Justement, on s'aligne : 7 500€ net, c'est le niveau du libéral moyen (CARMF 2024), mais sans les charges, sans la paperasse, sans le risque de patientèle. Et jusqu'à 9 500€ net en zone très sous-dotée. Surtout, les jeunes médecins privilégient de plus en plus le salariat pour l'"}]},{"id":45,"t":"Moralisation de la vie politique — casier judiciaire incompatible avec mandat","c":"République","e":"🏛️⚖️","s":"ambitieux","a":"⚖️ Coût nul — signal démocratique majeur","sig":"neutre","sit":"Mesure de rupture symbolique et concrète. Proposée par Transparency International, réclamée depuis 2012 (engagement Hollande jamais tenu), régulièrement relancée. Inéligibilité actuelle : peut être prononcée comme peine complémentaire — pas automatique. Proposition : rendre automatique l'inéligibili","sol":"La confiance dans les institutions françaises est à son plus bas historique. 72% des Français estiment que les responsables politiques sont corrompus (Transparency International 2024). Cette défiance n'est pas irrationnelle — elle répond à des scandales réels. La moralisation politique n'est pas du","l":"✅ Légal — loi ordinaire pénale + révision constitutionnelle pour certains points","k":["🚫 Inéligibilité automatique à vie pour corruption, détournement, prise illégale d'intérêts — plus de peine complémentaire facultative","📋 Casier judiciaire B2 vierge obligatoire pour se présenter à toute élection nationale ou locale","💰 Transparence patrimoine : déclaration publique avant et après le mandat + audit contradictoire par la HATVP — enrichissement inexpliqué = inéligibilité","🔄 Non-cumul strict : un seul mandat électif à la fois + deux mandats consécutifs maximum — fin des baronnies locales","📵 Fin des pensions à vie des élus : retraite d'élu calculée comme n'importe quel salarié — pas de régime spécial"],"con":[{"q":"C'est populiste","r":"Rendre les comptes publics transparents, permettre aux citoyens de s'exprimer directement sur les grandes questions — c'est de la démocratie, pas du populisme. Le populisme c'est promettre sans compter. Nous chiffrons tout."},{"q":"Ça va créer de l'instabilité","r":"La Suisse pratique le RIC depuis 1891 et est la démocratie la plus stable et la plus compétitive du monde. L'instabilité ne vient pas de la démocratie directe — elle vient des promesses sans contrepartie."},{"q":"Les citoyens ne sont pas compétents pour voter sur des sujets complexes","r":"Les citoyens suisses votent régulièrement sur des sujets complexes (énergie, fiscalité, immigration) avec des résultats souvent plus sages que les décisions parlementaires. Et les sujets techniques sont exclus du RIC — seules les grandes orientations sont soumises."}]},{"id":46,"t":"Politique familiale autonome — natalité et soutien aux familles","c":"Retraites","e":"👨‍👩‍👧","s":"urgent","a":"➖➕ +2 à 4 Md€/an — retour sur investissement : 1 enfant = 1 cotisant de plus dans 20 ans","sig":"mixte","sit":"Urgence démographique : 1,56 enfant/femme en 2025 — le plus bas depuis 1914. 645 000 naissances en 2025 = −24% vs 2010. La France était champion européen de natalité — elle décroche. Raisons identifiées : coût de la garde d'enfant (2e plus élevé d'Europe), logement inadapté aux familles nombreuses,","sol":"La France a l'un des taux de natalité les plus bas de son histoire (1,56 enfant/femme en 2025). Les femmes françaises veulent en moyenne 2,3 enfants mais en ont 1,56. Le problème n'est pas le désir — c'est l'obstacle. Crèche inaccessible ou trop chère, congé parental insuffisant, logement inadapté a","l":"✅ Légal — loi de finances + Code de la Sécurité sociale","k":["👶 Congé parental rémunéré à 100% du salaire jusqu'à 1 an (vs 400€/mois actuellement) — alignement modèle nordique","👨 Congé paternité étendu à 3 mois obligatoires — les pères qui prennent le congé = +0,15 enfant/femme dans les études","🏠 APL familles nombreuses : majoration de 25% pour les familles dès le 3e enfant en location","🎓 Gratuité totale de la cantine scolaire pour les familles de 3 enfants et plus","💶 Relèvement du plafond du quotient familial : revenir au niveau de 2012 — fin de la pénalisation des familles moyennes avec enfants"],"con":[{"q":"C'est irresponsable financièrement","r":"Les 6 leviers génèrent +10 à 21 Md€/an face à un déficit de 5 Md€. La réforme est financièrement plus robuste que la réforme Macron qui n'activait qu'un seul levier sur six possibles."},{"q":"Cela va faire fuir les entreprises","r":"Le programme ne modifie pas le taux de cotisation patronal — il modifie l'âge de départ et le calcul des pensions. Les entreprises ne sont pas affectées sur leurs charges."},{"q":"Le FRR ne peut pas atteindre 100 Md€","r":"15% des recettes fraude récupérées (4 Md€/an) + recettes péages en 2031 (1,5 Md€/an) + CSG progressive sur le capital = montée progressive en 15 ans. Le modèle norvégien l'a fait."}]},{"id":47,"t":"RIC — Référendum d'Initiative Citoyenne encadré","c":"République","e":"🗳️","s":"sensible","a":"➖ Coût d'organisation : 50-150 M€ par référendum — signal démocratique fort","sig":"moins","sit":"Demande forte depuis les Gilets Jaunes (2018). 40 pays le pratiquent déjà (Suisse, Italie, USA-États). Seulement 1,5% des revendications des cahiers de doléances portaient sur le RIC — mais symboliquement très fort. Proposition encadrée : RIC législatif sur saisine d'1 million de signatures vérifiée","sol":"47% d'abstention aux législatives 2022. Le message est clair : une part croissante des citoyens ne se reconnaît plus dans le système représentatif. Le RIC n'est pas la solution miracle — mais c'est un signal de confiance envoyé aux citoyens. La Suisse pratique la démocratie directe depuis 1891 et es","l":"⚠️ Révision constitutionnelle nécessaire — article 89","k":["📝 RIC législatif : 1 million de signatures vérifiées → débat parlementaire obligatoire + référendum si pas de loi adoptée dans les 6 mois","🗑️ RIC abrogatif : 2 millions de signatures → référendum pour annuler une loi récente","🚫 Sujets exclus du RIC : peine de mort, IVG, droits fondamentaux CEDH, traités internationaux — protection des minorités","🔍 Filtrage constitutionnel obligatoire avant tout référendum — le Conseil constitutionnel valide la recevabilité","📱 Signature numérique sécurisée via FranceConnect — rendre le processus accessible et vérifiable"],"con":[{"q":"C'est populiste","r":"Rendre les comptes publics transparents, permettre aux citoyens de s'exprimer directement sur les grandes questions — c'est de la démocratie, pas du populisme. Le populisme c'est promettre sans compter. Nous chiffrons tout."},{"q":"Ça va créer de l'instabilité","r":"La Suisse pratique le RIC depuis 1891 et est la démocratie la plus stable et la plus compétitive du monde. L'instabilité ne vient pas de la démocratie directe — elle vient des promesses sans contrepartie."},{"q":"Les citoyens ne sont pas compétents pour voter sur des sujets complexes","r":"Les citoyens suisses votent régulièrement sur des sujets complexes (énergie, fiscalité, immigration) avec des résultats souvent plus sages que les décisions parlementaires. Et les sujets techniques sont exclus du RIC — seules les grandes orientations sont soumises."}]},{"id":48,"t":"Souveraineté numérique — taxation GAFAM + cloud français obligatoire","c":"République","e":"💻🇫🇷","s":"ambitieux","a":"➖➕ Recettes taxe GAFAM : +2 à 5 Md€/an — investissement cloud souverain : 500 M€/an","sig":"mixte","sit":"Situation : l'Éducation nationale et l'armée française hébergent leurs données sur Microsoft et Amazon. La taxe GAFAM actuelle : 3% du CA numérique — un amendement au PLF 2026 propose de la porter à 15% (adopté en commission finances oct. 2025, validé constitutionnellement le 12 sept. 2025 par le Co","sol":"Les données de santé de 67 millions de Français sont hébergées sur Azure (Microsoft) — soumises au Cloud Act américain. Les données fiscales des entreprises sont partiellement sur AWS (Amazon). Le Cloud Act permet aux autorités américaines d'accéder à ces données sans notification. Ce n'est pas de l","l":"✅ Légal — taxe validée par le Conseil constitutionnel en 2025","k":["💰 Taxe GAFAM portée à 10% (compromis entre 3% et 15%) — recettes estimées +1,5 à 3 Md€/an, fléchées vers le financement du numérique souverain","🔒 Cloud souverain obligatoire pour toutes les données de l'État, hôpitaux, collectivités, armée — fin des contrats Microsoft/Amazon pour les données sensibles","🤖 Plan IA souveraine : soutien massif à Mistral AI et aux LLM français — 500 M€/an sur 5 ans via BpiFrance","📱 Données personnelles des Français hébergées en France obligatoirement — transposition RGPD renforcée avec obligation de localisation","🎓 Formation numérique : 100 000 apprentis en cybersécurité et développement d'ici 2030 — filière lycée professionnel numérique"],"con":[{"q":"C'est populiste","r":"Rendre les comptes publics transparents, permettre aux citoyens de s'exprimer directement sur les grandes questions — c'est de la démocratie, pas du populisme. Le populisme c'est promettre sans compter. Nous chiffrons tout."},{"q":"Ça va créer de l'instabilité","r":"La Suisse pratique le RIC depuis 1891 et est la démocratie la plus stable et la plus compétitive du monde. L'instabilité ne vient pas de la démocratie directe — elle vient des promesses sans contrepartie."},{"q":"Les citoyens ne sont pas compétents pour voter sur des sujets complexes","r":"Les citoyens suisses votent régulièrement sur des sujets complexes (énergie, fiscalité, immigration) avec des résultats souvent plus sages que les décisions parlementaires. Et les sujets techniques sont exclus du RIC — seules les grandes orientations sont soumises."}]},{"id":49,"t":"Aidants familiaux — reconnaissance et protection des 11 millions de soignants invisibles","c":"Retraites","e":"🤝❤️","s":"urgent","a":"➕ +500 M€ à 1 Md€/an — économie réalisée par les aidants pour la Sécurité sociale : 12 Md€/an","sig":"plus","sit":"11 millions d'aidants familiaux en France — ils accompagnent un proche handicapé, malade ou âgé dépendant. 60% sont des femmes. Sacrifice de carrière : 30% ont réduit leur temps de travail, 20% ont arrêté de travailler. Perte de revenus et de retraite considérable. L'État économise grâce aux aidants","sol":"11 millions d'aidants familiaux font chaque jour l'équivalent de 12 Md€ de travail social non rémunéré. Ils soignent, accompagnent, organisent — souvent au détriment de leur propre carrière et de leur santé. En échange : aucun droit retraite, aucune protection sociale, aucune reconnaissance. La Suèd","l":"✅ Légal — Code du travail + Code de la Sécurité sociale","k":["💰 Congé aidant rémunéré à 60% du salaire (net) pendant 1 an (vs 57€/jour sur 3 mois) — alignement sur le congé maternité","👴 Validation de trimestres de retraite : chaque année d'aidance = 4 trimestres validés — fin de la double peine","🏥 Bilan de santé annuel gratuit pour tout aidant reconnu — détecter l'épuisement avant la rupture","🏠 Droit au répit : 30 jours/an de relève professionnelle financée à 100% par l'Assurance maladie","💼 Protection emploi renforcée : interdiction de licenciement et de sanction pendant toute la durée de l'aidance"],"con":[{"q":"C'est irresponsable financièrement","r":"Les 6 leviers génèrent +10 à 21 Md€/an face à un déficit de 5 Md€. La réforme est financièrement plus robuste que la réforme Macron qui n'activait qu'un seul levier sur six possibles."},{"q":"Cela va faire fuir les entreprises","r":"Le programme ne modifie pas le taux de cotisation patronal — il modifie l'âge de départ et le calcul des pensions. Les entreprises ne sont pas affectées sur leurs charges."},{"q":"Le FRR ne peut pas atteindre 100 Md€","r":"15% des recettes fraude récupérées (4 Md€/an) + recettes péages en 2031 (1,5 Md€/an) + CSG progressive sur le capital = montée progressive en 15 ans. Le modèle norvégien l'a fait."}]},{"id":50,"t":"Politique africaine — rupture avec la françafrique, partenariats d'égal à égal","c":"Défense","e":"🌍🤝","s":"sensible","a":"➖ Réorientation : −500 M€ d'aide budgétaire directe → +500 M€ d'investissements économiques partenariaux","sig":"moins","sit":"La France a perdu le Mali, le Niger, le Burkina Faso, le Tchad entre 2021 et 2024 — 50 ans d'influence évaporée en 3 ans. 8 000 soldats retirés du Sahel. La Russia (Wagner puis Africa Corps) a pris la place. Causes : modèle françafrique perçu comme néo-colonial, soutien à des régimes corrompus, ingé","sol":"La France a été expulsée du Mali, du Niger, du Burkina et du Tchad en 3 ans malgré 8 000 soldats déployés au Sahel. Notre présence militaire est devenue notre principal handicap diplomatique — perçue comme néocoloniale. La Chine n'a pas un seul soldat en Afrique et y a une influence économique massi","l":"✅ Légal — traités bilatéraux + décision exécutive","k":["🏛️ Fermer les bases militaires permanentes et proposer des partenariats de défense sur demande — fin de la présence imposée","💼 Fonds franco-africain d'investissement : 1 Md€/an pour les PME françaises qui investissent en Afrique avec des partenaires locaux","🎓 100 000 étudiants africains en France/an avec obligation de retour valorisé — former les élites africaines francophiles sans les retenir","🪙 Réforme du franc CFA sur demande des États africains : soutenir la transition vers une monnaie africaine souveraine sans l'imposer","🤝 Pacte anti-corruption : conditionner l'aide et les partenariats à des critères de gouvernance mesurables — fin du soutien aux régimes corrompus"],"con":[{"q":"Cela fragilise la sécurité collective","r":"La France indépendante avec 3% du PIB en défense est plus forte. L'Alliance politique article 5 est maintenue. Seul le commandement intégré change — comme de Gaulle de 1966 à 2009."},{"q":"C'est une position pro-russe","r":"De Gaulle a sorti la France du commandement intégré pendant la Guerre froide, face à l'URSS. La souveraineté militaire n'est pas un alignement géopolitique — c'est l'exercice de l'indépendance nationale."},{"q":"Le budget défense à 3% du PIB est impossible","r":"L'Allemagne est passée de 1,4% à 2,1% en 2 ans. La Pologne est à 4%. La France peut atteindre 3% avec une montée progressive sur 5 ans financée par les recettes nouvelles."}]},{"id":55,"t":"Réforme du bac — redonner de la valeur au diplôme","c":"Éducation","e":"📜✏️","s":"ambitieux","a":"⚖️ Coût quasi nul — réorganisation du système existant","sig":"neutre","sit":"Taux de réussite bac général 2025 : 96,4% — 68% avec mention. Le bac ne sélectionne plus, mais 74 800 bacheliers (11,5%) n'ont reçu aucune proposition d'admission via Parcoursup en 2025 — paradoxe total. La réforme de 2019 a créé des spécialités mais 40% du bac repose sur le contrôle continu — soupç","sol":"Cette mesure (Réforme du bac) répond à une défaillance documentée. Taux de réussite bac général 2025 : 96,4% — 68% avec mention. Le bac ne sélectionne plus, mais 74 800 bacheliers (11,5%) n'ont reçu aucune proposition. L'impact estimé est Coût quasi nul — réorganisation du système existant. La prior","l":"✅ Légal — arrêté ministériel + décret","k":["📝 Épreuves terminales portées à 80% du bac (vs 60% actuel) — redonner de la valeur à l'examen national","🏆 Revalorisation du bac technologique et professionnel : passerelles directes vers les BTS/BUT, primes d'installation pour les titulaires en zones en tension","🔍 Parcoursup transparent : publication complète de l'algorithme de sélection + suppression des listes d'attente interminables","📊 Orientation dès la 4e : bilan d'orientation obligatoire, stages en entreprise dès la 3e, information sur les taux d'insertion professionnelle par filière","🚫 Limiter les inscriptions en L1 de droit/psycho/STAPS aux capacités d'accueil réelles — plus de 10 000 étudiants perdus chaque année dans des filières sans places"],"con":[{"q":"Les enseignants s'y opposeront","r":"Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'évaluation des résultats. C'est une position minoritaire."},{"q":"Les résultats ne seront visibles qu'en 10 ans","r":"Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commencer maintenant."},{"q":"Ce n'est pas une question de moyens mais de méthodes","r":"C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. On change les deux."}]},{"id":56,"t":"Sport à l'école — 1 heure par jour en primaire","c":"Éducation","e":"⚽🏃","s":"ambitieux","a":"➕ +300 à 600 M€/an — économies santé à 20 ans : 5 à 10 Md€/an","sig":"plus","sit":"Actuellement : 3h de sport/semaine en primaire — insuffisant. 30% des enfants de 6 ans sont en surpoids ou obèse. Le mouvement est un droit fondamental du développement de l'enfant. Objectif : 1h de sport/jour = 5h/semaine (vs 3h actuelles). Coût : recrutement d'enseignants en EPS supplémentaires ou","sol":"Cette mesure (Sport à l'école) répond à une défaillance documentée. Actuellement : 3h de sport/semaine en primaire — insuffisant. 30% des enfants de 6 ans sont en surpoids ou obèse. Le mouvement est un droit fondamenta. L'impact estimé est +300 à 600 M€/an — économies santé à 20 ans : 5 à 10 Md€/an.","l":"✅ Légal — circulaire ministérielle + recrutement enseignants","k":["⚽ 1h d'activité physique quotidienne dès la maternelle — pas forcément du sport structuré : jeux, danse, marche","🤸 Intervenants sportifs qualifiés en primaire : partenariat avec les clubs sportifs locaux rémunérés","🚴 Pédibus et vélobus : se rendre à l'école à pied ou à vélo = activité physique + éducation environnementale","🏆 Liaison école-club facilitée : tout élève primaire peut s'inscrire dans un club sportif avec aide financière de l'État","📊 Bilan condition physique annuel (non noté) : prévention de l'obésité et du sédentarisme dès l'enfance"],"con":[{"q":"Les enseignants s'y opposeront","r":"Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'évaluation des résultats. C'est une position minoritaire."},{"q":"Les résultats ne seront visibles qu'en 10 ans","r":"Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commencer maintenant."},{"q":"Ce n'est pas une question de moyens mais de méthodes","r":"C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. On change les deux."}]},{"id":57,"t":"Renforcement du français, des maths et de l'anglais dès la maternelle","c":"Éducation","e":"📚🇬🇧","s":"ambitieux","a":"⚖️ +500 M€ à 1 Md€/an — formation enseignants + matériel pédagogique","sig":"neutre","sit":"Résultats PISA 2022 : la France est en-dessous de la moyenne OCDE en lecture et mathématiques. Niveau de français à l'entrée en 6e : 20% des élèves ne maîtrisent pas les compétences de base. Anglais : la France est parmi les moins bons pays européens pour le niveau en anglais (EF English Proficiency","sol":"Cette mesure (Renforcement du français, des maths et de l'anglais dès la maternelle) répond à une défaillance documentée. Résultats PISA 2022 : la France est en-dessous de la moyenne OCDE en lecture et mathématiques. Niveau de français à l'entrée en 6e : 20% des élèves ne. L'impact estimé est +500 M","l":"✅ Légal — programmes scolaires modifiables par arrêté","k":["📖 Méthode syllabique obligatoire dans toutes les écoles dès la GS — fin des expérimentations pédagogiques non prouvées","🔢 Calcul mental quotidien dès le CP, tables de multiplication maîtrisées en CE2 — retour aux fondamentaux","🇬🇧 30 minutes d'anglais oral/jour dès la PS : chansons, comptines, jeux — exposition ludique dès 3 ans","👩‍🏫 Assistants de langue natifs dans toutes les écoles primaires : programme massifié (actuellement 3 500 assistants pour 50 000 écoles)","💻 Outils numériques validés pour l'anglais oral : tablettes avec programmes d'immersion ludique en maternelle"],"con":[{"q":"Les enseignants s'y opposeront","r":"Revalorisation +20%, formation renforcée, soutien pédagogique — ce sont des demandes historiques du corps enseignant. Ceux qui s'opposent refusent l'évaluation des résultats. C'est une position minoritaire."},{"q":"Les résultats ne seront visibles qu'en 10 ans","r":"Certains résultats sont visibles en 1 an : absentéisme, satisfaction des familles, tests CP. Les résultats PISA mettent 5 à 7 ans — raison de commencer maintenant."},{"q":"Ce n'est pas une question de moyens mais de méthodes","r":"C'est les deux. La France dépense 160 Md€/an et obtient des résultats médiocres parce que les méthodes sont inadaptées ET les enseignants sous-payés. On change les deux."}]},{"id":58,"t":"Réforme des aides sociales — conditionnalité et responsabilisation","c":"Emploi","e":"🤝📋","s":"sensible","a":"➕ Économies estimées : +1 à 3 Md€/an — et surtout : retour à l'emploi accéléré","sig":"plus","sit":"Budget total des minima sociaux en France : ~30 Md€/an (RSA, AAH, ASS, ATA...). RSA : 2,3 millions de bénéficiaires, coût ~15 Md€/an. Problème central : le RSA n'est pas conditionnel à une recherche active d'emploi dans les faits — seulement 40% des bénéficiaires sont en contact réel avec un conseil","sol":"Cette mesure (Réforme des aides sociales) répond à une défaillance documentée. Budget total des minima sociaux en France : ~30 Md€/an (RSA, AAH, ASS, ATA...). RSA : 2,3 millions de bénéficiaires, coût ~15 Md€/an. Problème central. L'impact estimé est Économies estimées : +1 à 3 Md€/an — et surtout :","l":"✅ Légal — loi ordinaire + décrets France Travail","k":["⏰ 15h/semaine d'activité obligatoire pour les bénéficiaires du RSA valides : formation, bénévolat, immersion pro, recherche active — déjà expérimenté avec succès dans 18 départemen","🚫 2 refus d'offres raisonnables = réduction de 50% du RSA, 3 refus = suspension temporaire avec maintien du minimum vital","👶 RSA jeunes dès 18 ans : conditionné à un service civique ou une formation qualifiante — pas de revenus sans engagement","💼 Prime de retour à l'emploi renforcée : bonus de 500€ versé au 3e mois de travail + maintien partiel du RSA pendant 6 mois (éviter la trappe à inactivité)","🏥 Exclure de la conditionnalité : personnes malades, handicapées à +80%, aidants familiaux reconnus, parents isolés d'enfants <3 ans"],"con":[{"q":"Cela va augmenter le coût du travail","r":"La mesure est conçue pour être neutre sur le coût total du travail — redistribution entre types de coûts, pas augmentation nette. L'effet sur l'emploi est positif selon les modélisations."},{"q":"Les syndicats refuseront","r":"Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On négocie en bonne foi et on avance."},{"q":"Ça ne marche pas en France","r":"L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fonctionne dans le contexte français."}]},{"id":59,"t":"Souveraineté pharmaceutique — relocaliser les 450 médicaments essentiels","c":"Santé","e":"💊🇫🇷","s":"urgent","a":"➖ +500 M€ à 1 Md€/an d'investissement supplémentaire — coût d'une rupture de stock : incalculable","sig":"moins","sit":"Scandale : le Doliprane, médicament le plus vendu en France, est passé sous contrôle américain en 2024. 193 molécules identifiées comme prioritaires pour relocalisation. Plan France 2030 : 7 nouveaux projets annoncés en janvier 2025 pour les médicaments essentiels — dont production du principe actif","sol":"Cette mesure (Souveraineté pharmaceutique) répond à une défaillance documentée. Scandale : le Doliprane, médicament le plus vendu en France, est passé sous contrôle américain en 2024. 193 molécules identifiées comme prioritaires p. L'impact estimé est +500 M€ à 1 Md€/an d'investissement supplémentai","l":"✅ Légal — amplifie France 2030 existant + accord-cadre CEPS","k":["⚡ Accélérer France 2030 pharma : doubler les financements dédiés (de 500 M€ à 1 Md€/an) pour les 193 molécules prioritaires identifiées","💰 Revaloriser le prix des médicaments relocalisés en France : accepter +20-30% sur le prix réglementé pour les produire ici — coût de la souveraineté assumé","📦 Stock de sécurité porté à 6 mois pour les 450 médicaments essentiels (vs 2 mois actuellement) — jamais plus de pénurie de paracétamol","🏭 Priorité d'approvisionnement du marché français pour les médicaments produits en France — par décret","🇪🇺 Peser pour une politique européenne coordonnée : Critical Medicines Alliance → acte législatif européen d'ici 2026"],"con":[{"q":"Le coût pour la Sécurité sociale est insoutenable","r":"Le coût de l'inaction est supérieur : un passage aux urgences non justifié coûte 250€, une consultation préventive 30€. Le programme de prévention est un investissement à ROI de 3 à 7 pour 1."},{"q":"Les professionnels de santé s'y opposeront","r":"Les jeunes médecins et infirmières plébiscitent les nouvelles formes d'exercice. Les syndicats des anciens s'opposent à chaque réforme depuis 50 ans. On négocie ET on avance."},{"q":"La qualité des soins va baisser","r":"La qualité est déjà dégradée par les déserts médicaux et la surcharge hospitalière. Un système avec 18 mois d'attente et des urgences saturées n'est pas un système de qualité."}]},{"id":60,"t":"Encadrement des frais bancaires — protéger les clients fragiles","c":"Pouvoir d'achat","e":"🏦💳","s":"ambitieux","a":"➕ Coût État : nul — gain consommateurs : +500 M€ à 1 Md€/an","sig":"plus","sit":"La France a parmi les frais bancaires les plus élevés d'Europe. Frais d'incidents de paiement : jusqu'à 8€ par o ment). Élargir ces interventions à d'autres secteurs en défaillance de marché est légal et légitime."}]},{"id":61,"t":"2 heures de parking gratuites en centre-ville — soutenir les commerçants qui travaillent","c":"Pouvoir d'achat","e":"🅿️🛍️","s":"ambitieux","a":"➖ Manque à gagner communes : −300 à 500 M€/an — compensé par la hausse du commerce local","sig":"moins","sit":"Le commerce de centre-ville est asphyxié par Amazon et les zones commerciales périphériques. Le coût du stationnement est souvent la première raison citée pour ne pas aller en centre-ville. Proposition : gratuité des 2 premières heures de parking dans tous les parkings publics des communes >10 000 h","sol":"Cette mesure (2 heures de parking gratuites en centre-ville) répond à une défaillance documentée. Le commerce de centre-ville est asphyxié par Amazon et les zones commerciales périphériques. Le coût du stationnement est souvent la première raison c. L'impact estimé est Manque à gagner communes : −30","l":"✅ Légal — délibération du conseil municipal + loi-cadre nationale","k":["🅿️ 2h gratuites dans tous les parkings publics des communes >10 000 habitants — sans démarche, automatique","🛍️ Contribution de solidarité commerciale : les grandes enseignes (CA >5 M€ en centre-ville) contribuent au financement de la gratuité","📱 Application nationale de localisation des parkings gratuits : transparence et simplification pour les usagers","🏪 Coupler avec taxe sur les locaux commerciaux vacants en centre-ville : inciter les propriétaires à louer — pas à spéculer","🚶 Piétonnisation progressive des rues commerçantes le week-end : terrasses, animations, marchés — créer l'envie de venir"],"con":[{"q":"Ces mesures ne profiteront qu'aux riches","r":"La baisse de l'IR cible les tranches 11% et 24% — les classes moyennes. Le merit order profite à tous les 30 millions de foyers. Le panier à prix coûtant concerne les produits de base. Ce sont des mesures universelles à effet proportionnellement plus fort pour les mén nt","r":"Les syndicats réformistes (CFDT, CFTC, CFE-CGC) sont favorables à ces évolutions. La CGT et FO s'opposeront — comme à chaque réforme depuis 40 ans. On négocie en bonne foi et on avance."},{"q":"Ça ne marche pas en France","r":"L'expérimentation dans 100 entreprises volontaires (modèle islandais) donnera des données françaises. On n'impose rien avant d'avoir prouvé que ça fonctionne dans le contexte français."}]},{"id":102,"t":"Numéro unique médecin de garde — le 116 117 pour tous les Français","c":"Santé","e":"📞🩺","s":"urgent","a":"➕ +100 à 200 M€/an — économies urgences engorgées : 500 M€ à 1 Md€/an","sig":"plus","sit":"Problème quotidien : des millions de Français ne savent pas où appeler en dehors des heures du médecin. Résultat : les urgences hospitalières traitent 30% de cas qui pourraient être pris en charge en ville. Le 15 (SAMU) est saturé. Le 116 117 (numéro européen médecin de garde) existe depuis 2014 mai","sol":"Cette mesure (Numéro unique médecin de garde) répond à une défaillance documentée. Problème quotidien : des millions de Français ne savent pas où appeler en dehors des heures du médecin. Résultat : les urgences hospitalières traitent. L'impact estimé est +100 à 200 M€/an — économies urgences engorgé","l":"✅ Légal — généralisation par arrêté ministériel","k":["📞 Généralisation immédiate du 116 117 sur tout le territoire — actif 24h/24, 7j/7 dans tous les départements","🤖 IA d'orientation : algorithme de triage téléphonique validé médicalement — oriente vers médecin de garde, téléconsultation ou urgences","🏥 Convention avec les urgences : tout appel au 116 117 évite un passage aux urgences non justifié — indicateur de performance public","📱 Application 116 117 : géolocalisation du médecin de garde le plus proche, prise de rendez-vous intégrée","🎓 Campagne nationale de communication : '116 117 avant les urgences' — changer les réflexes de millions de Français"],"con":[{"q":"Le coût pour la Sécurité sociale est insoutenable","r":"Le coût de e la nature","c":"Agriculture","e":"🌳🤝","s":"ambitieux","a":"⚖️ +300 à 500 M€/an — impact environnemental ×10 en valeur de services écosystémiques","sig":"neutre","sit":"Inspiré du Civilian Conservation Corps de Roosevelt (1933) : 3 millions de jeunes, 3 milliards d'arbres plantés, 800 parcs nationaux créés. En France : le service civique existe mais est sous-utilisé pour l'environnement. Proposition : 50 000 missions de service civique écologique/an rémunérées 700€","sol":"Cette mesure (Service civique écologique) répond à une défaillance documentée. Inspiré du Civilian Conservation Corps de Roosevelt (1933) : 3 millions de jeunes, 3 milliards d'arbres plantés, 800 parcs nationaux créés. En France . L'impact estimé est +300 à 500 M€/an — impact environnemental ×10 en","l":"✅ Légal — extension du service civique existant + missions ONF et agences de l'eau","k":["🌳 50 000 missions/an de 6 mois : reforestation, zones humides, littoraux, corridors écologiques","💰 700€/mois : rémunération attractive, alignée sur le service civique standard majoré","🎓 Formation incluse : chaque volontaire reçoit une formation de 2 semaines (faune, flore, gestes techniques) — valeur sur le CV","🤝 Partenariat ONF, agences de l'eau, parcs nationaux, communes rurales — déploiement sur tout le territoire","🏆 Label 'Gardien de la nature' : reconnaissance officielle sur Parcoursup et les candidatures professionnelles"],"con":[{"q":"Les prix planchers vont renchérir l'alimentation","r":"Ils empêchent la vente à perte. Un agriculteur qui vend à perte ferme — et l'importation déloyale remplace. Le prix légèrement plus élevé d'une viande française est la prime d'assurance de notre souveraineté alimentaire."},{"q":"La clause miroir va provoquer des guerres commerciales","r":"La clause miroir impose aux importations de respecter nos normes. Ce n'est pas du protectionnisme — c'est de l'équité. On ne peut pas interdire aux agriculteurs français d'utiliser certains pesticides et importer des produits avec ces mêmes pesticides."},{"q":"Les jeunes agriculteurs ne veulent plus s'installer","r":"Le revenu agricole sous le SMIC est le premier facteur de non-installation. Prix planchers + installation 10 000 jeunes/an + foncier protégé résolvent les 3 obstacles principaux."}]},{"id":170,"t":"Bio en cantines — objectif 50% de bio local d'ici 2030 + sanctions EGalim enfin appliquées","c":"Agriculture","e":"🌿🚜💚","s":"urgent","a":"⚖️ +1,5 à 2 Md€/an de débouchés garantis pour les producteurs bio — 50% de bio dans 81 300 cantines","sig":"neutre","sit":"L'ÉCHEC DOCUMENTÉ DE LA LOI EGALIM : UNE LOI SANS DENTS↵↵La loi EGalim de 2018 fixait 20% de bio dans les cantines publiques dès 2022. En 2026, 4 ans après l'échéance :↵• Moyenne nationale bio : 7% seulement sur l'ensemble des 81 300 cantines↵• Sur les cantines déclarantes sur ma-cantine.fr (40% du total) : 13 à 14% de bio↵• Seulement 44% des cantines déclarantes atteignent les 20% de bio↵• Seulement 30% respectent pleinement la loi EGalim (20% bio + 50% durables)↵• Et la loi EGalim n'impose aucune sanction aux cantines qui ne la respectent pas↵↵POURTANT C'EST FAISABLE — LES EXEMPLES EXISTENT↵","sol":"LE PLAN APR EN 5 VOLETS — PASSER DE 7% À 50% DE BIO EN CANTINE↵↵VOLET 1 — SANCTIONS EFFECTIVES POUR EGALIM (la loi existe — il faut lui donner des dents)↵La loi EGalim est respectée par 30% des cantines en 2026. Sans sanction, c'est une loi symbolique. APR impose :↵• Amende de 5 000€/an par point de pourcentage manquant sous les 20% de bio↵• Contrôle aléatoire annuel de 10% des cantines par les DDPP (déjà dotées pour les contrôles sanitaires)↵• Publication obligatoire du taux bio de chaque cantine sur le site de la commune — transparence citoyenne↵• Délai de mise en conformité : 12 mois pour les communes de moins de 5 000 habitants, 6 mois pour les autres↵↵VOLET 2 — OBJECTIF 50% DE BIO LOCAL","l":"✅ Légal — plan stratégique national PAC 2028-2032 + loi ordinaire sur la restauration collective obligatoire","k":["Sanctions effectives EGalim : 5 000€/an d'amende par point de pourcentage manquant sous 20% de bio — publication obligatoire du taux bio de chaque cantine sur le site de la commune"],"con":[{"q":"50% de bio c'est irréaliste — même 20% n'est pas atteint","r":"20% n'est pas atteint parce qu'il n'y a pas de sanction et pas d'aide financière. Avec 5 000€ d'amende par point manquant ET 0,20€ de dotation par repas bio, les directeurs de cantine ont une carotte ET un bâton. Lyon atteint 70% dans ses collèges. Paris 17e atteint 40%. Lille at"},{"q":"Ça va faire exploser les budgets des communes","r":"Le surcoût réel est de 0,14 à 0,42€ par repas selon l'Agence Bio. Sur 180 jours, c'est 25 à 76€/an/enfant. La dotation APR (0,20€ à 0,30€/repas) couvre 50 à 100% de ce surcoût. Les communes ne paient pas plus — c'est l'État qui finance via la réorientation du reliquat PAC. Et les"},{"q":"Il n'y a pas assez de production bio locale pour alimenter toutes les cantines","r":"Si les cantines garantissent 3 ans d'achat à prix minimum, les agriculteurs convertiront. C'est exactement le sens inverse de ce qu'on fait maintenant : on demande aux agriculteurs de convertir sans garantir les débouchés, puis on s'étonne qu'ils ne convertissent pas. Les platefo"}]},{"id":107,"t":"Musées nationaux gratuits le dimanche — accéder à ce que les impôts ont financé","c":"Pouvoir d'achat","e":"🏛️🎨","s":"ambitieux","a":"➕ −30 à 50 M€/an de recettes — compensé par +10 à 15% de fréquentation totale","sig":"plus","sit":"La France possède les plus grands musées du monde : Louvre (9 millions de visiteurs), Orsay, Pompidou, Versailles, Cluny... Problème : le prix d'entrée (15 à 20€) exclut les familles modestes. Le dimanche gratuit existe déjà pour les -18 ans et les -26 ans UE — l'étendre à tous les adultes le dimanc","sol":"Cette mesure (Musées nationaux gratuits le dimanche) répond à une défaillance documentée. La France possède les plus grands musées du monde : Louvre (9 millions de visiteurs), Orsay, Pompidou, Versaille énages modeste"},{"q":"Cela va alimenter l'inflation","r":"Ces mesures réduisent les prix (panier, électricité) ou augmentent le revenu disponible (IR). L'inflation est provoquée par trop de monnaie pour trop peu de biens — ici on augmente le pouvoir d'achat réel sans création monétaire."},{"q":"L'État ne peut pas intervenir sur les prix","r":"L'État intervient déjà sur les prix de l'électricité (ARENH), des médicaments (CEPS), du loyer (APL, encadrement). Élargir ces interventions à d'autres secteurs en défaillance de marché est légal et légitime."}]},{"id":111,"t":"Protection de l'enfance — réformer l'ASE en urgence","c":"Éducation","e":"🧒🛡️","s":"urgent","a":"➖ +500 M€ à 1 Md€/an — coût de l'inaction : 25 000 jeunes à la rue chaque année","sig":"moins","sit":"397 000 mineurs et jeunes majeurs pris en charge par l'ASE en 2024 — hausse constante de +1,4%/an depuis 20 ans sans augmentation des ressources. Le CESE a rendu en octobre 2024 un rapport alarmant sur la saturation du système. Signalements d'enfants en danger : +20% depuis 2020. 1 enfant sur 10 vic","sol":"Cette mesure (Protection de l'enfance) répond à une défaillance documentée. 397 000 mineurs et jeunes majeurs pris en charge par l'ASE en 2024 — hausse constante de +1,4%/an depuis 20 ans sans augmentation des ressources. Le C. L'impact estimé est +500 M€ à 1 Md€/an — coût de l'inaction : 25 000 jeu","l":"✅ Légal — loi nationale + financement État-Départements","k":["🚫 Fin de l'hébergement hôtelier pour les mineurs : interdiction dans les 2 ans — avec financement État pour créer les places manquantes","👩‍🏫 Revalorisation des éducateurs spécialisés ASE : salaire minimum à 2 000€ net (vs 1 600€ actuellement) — réduire le turnover de 40%/an","📋 Standard national minimal : ratio éducateur/enfant (1 pour 5 maximum), taille des foyers (20 enfants maximum), bâtiments aux normes","🎓 Accompagnement jeunes majeurs jusqu'à 25 ans : fin de la rupture brutale à 18 ans — contrat jeune majeur systématique","👨‍👩‍👧 Priori
